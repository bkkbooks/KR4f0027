body:
  text: 愚菴小集卷九吳江朱鶴齡撰記猛將神祠記祭法曰聖王之制祭祀也能禦大災則祀之能捍大患則祀之夫災患之大莫先農事有能封殖嘉穀除其害災則雖其事不載祀典君子不得以淫祠斥之矣吳俗蓋通祀猛將神相傳神能逐疫驅蝗田夫得之夢兆禱求應若影響而年來尤著神號揚威王又稱吉祥王不知受錫何時其姓名于史傳亦無考惟盧熊郡志曰神姓劉因瓦塔而創王鏊志又曰或云名鋭即宋名將劉武穆錡之弟嘗為先鋒陷敵近人王稚登作修廟疏又以為劉鄜王愛弟鄜王者光世也神之為錡弟歟光世弟歟皆無確據郡志或有所本及考宋史劉錡傳錡有姪曰汜無所謂弟鋭者然古時名將往往闔門戮力子弟之功歸之父兄則姓名隱沒蓋多有之安得以宋史不載遂謂必無其人哉錡于紹興三年官宣撫使統制尋為江東路副總管六年權提舉宿衛親軍帝駐平江解潛王奇兩軍交鬭俱罷令錡並將之錡因請以前護副軍及馬軍通為前後左右中軍與遊奕凡六軍每軍千人為十二將扈從赴金陵錡之功名莫盛于順昌之捷然職主扈從威著平江安知其弟不嘗以是時從戎斬級提戈立效兹土沒而遂歆其廟食耶其生也官封未顯其死也名字不彰則歘奮其殺敵致果之英靈為小民驅蝗逐疫以享千百年牲牢酒醴之祀此亦理之灼然不誣者不得以史文未見而疑之也或以為蝗乃天災驅而殄之于古未聞是又不然大田之詩曰去其螟螣及其蟊賊田祖有神秉畀炎火犍為文學云此四蟲皆蝗也姚崇遣使捕蝗引此詩為證是蝗之可除自古已然矣周禮地官荒政一曰索鬼神鄭注謂求廢祀而修之以宣王之賢猶因旱而禱不敢愛其牲璧是救災之求助於神又自古已然矣神而不為民驅蝗則已神而誠為民驅蝗其功且與勾芒氏厲山氏等民之信而祈之祈而祀之也又曷怪焉北郊舊有猛將祠每嵗三四月里人首纒絳帕手執戈矛旗纛擊鼓吹簫刲羊釃酒相率而祈賽其中曰將以祛旱蝗也苟或不虔則年穀不順成必曰神降之疵癘其事雖出于村童野老之所為而質之以祭法禦災捍患之文與詩禮除蟲籲神之典則大有合焉聖王復興不能廢也余故觀其駿奔而樂之復載筆而為之記苕文曰援經考史典核精詳行文更緊嚴有結搆此必傳之作俞無殊山居記山林之樂入而忘焉者為深夫人久處闉闍喧卑之與俱塵塕之與交必自厭其稠濁一旦適蒼莽登高丘覽夫雲峯之逶迤泉流之淡濧林木之翳蔚無不忽然以喜心曠神開者及興盡而返則稠濁如故彼其于山林之樂如膏粱之子暫甘蔬茹適焉而已而豈其中之所有哉若夫山林高蹈者不然其視連岡接岫也猶之屏障也其視嵌竇絶壑也猶之瓶盎也淡然泊然欣與厭之俱冥然後能以山光潭影藴之為真趣而發之為清音蓋驟而遇之與久而忘其所得淺深大有間矣俞子無殊居光福之士墟故參政劉公錫玄别墅也地當梅花最深處瑶圃瓊林香光數十里不斷高士勝流每鱗集焉今歲春杪余拿舟來訪石徑紆折池水空明草樹一色煙巒萬狀玄墓諸峯之秀可拱而揖之几案之間余解衣狂呌頓若釋炎歊而即清冷無殊方與樵童牧豎遊于無何有之鄉頺乎其若休泛乎其若浮不知身之處于山林也非所謂久而忘焉者耶忘其為山林而此窈然以深鬱然以秀者無不與性情耳目相接宜其詩之澄淡工緻上薄左司而非近時充隱諸人所可得而倣佛也無殊授徒空山日益貧窶或疑吟咏雖工藜羮不糝則奈何余曰蘇子瞻云隱居之適雖南面王不與易也富貴之與山林二者必不能兼享使無殊不幸而占負郭田一頃則里胥之追呼井稅之督迫將望望然去此不暇其尚能挹水木之清華寫雲巒之奇變與松濤瀑雨相響答于蒼崖翠壁之間也耶况乎黃公之紫芝赤松之翠柏李恂之橡栗周顒之晚菘庾杲之瀹韭子美之黃獨天隨生之杞菊又可以充咀嚼而助齋厨者耶吾知無殊之必不以彼易此也明矣詩不云乎衡門之下可以棲遲泌之洋洋可以樂飢蓋惟飢而後能享此山林之樂亦惟樂飢而後能忘此山林之樂也無殊聞余言其必相視而一笑矣夫是為記張虞山曰説出山林人性情之樂大意本王遵巖而用筆俊潔點染生姿則長孺所獨絶江灣草菴記江灣草菴者朱子長孺耕且讀之地也震澤之水徑長橋東北入龎山湖稍北為吳淞江亦曰松陵江吾邑之所由得名也余家江灣在龎山湖東渚去吳淞江不二里重陂巨浸幽溆曲隈彌望皆是茭菰羅生菱芡蔓合漁人網罟之利所在有之其田疇沃以衍其土風清以嘉從前高賢逹士未有卜宅于此者故郡邑志不載其地葺茆菴而居之蓋自朱子始焉菴之制創自田畯門牖略具丹漆不施竹簾紵帷容膝而已東偏一小軒稍潔中設棐几一匡牀一聚圖書數百卷性喜著撰朱墨二毫未嘗輟攬每睹藻網如織輕鯈出遊落花成茵鳥語上下意欣然樂之時復督勒耕奴課其耘耔溝塍浸灌禾黍懷新歲入雖不逮老農亦頗諳田家之味矣興發散步湖濵與村童野叟相狎蕩遙望晴瀾浩渺漁罾估舶出沒荒墟樹杪中指點西山諸峯螺髻逶迤浮青送碧未嘗不拄䇿忘疲如置身瀟湘洞庭之間也客有過而問者曰子之居有園林池沼之觀乎曰無有有賔朋過從可諧談者乎曰無有然則奈此庳陋何曰古之君子豈有擇地而處者哉亦安之而已意所不安雖延閣洞門朱甍玉砌未見其有適也意誠安之雖庳陋如余居安在不與延閣洞門朱甍玉砌同觀乎天下可私之物必非可樂藏舟于壑夜半猶或失之惟此雲水之澄淡卉木之妍華四時物態之生新變化造物所豫富貴不能私也豈惟不能私甚且不能享有一日而遊方之外者乃得以琴書几杖逍遙縱誕于其間今吾草菴之中所考索者皆經史百家古今之義海也所吟諷者非莊列屈宋即陶謝韓杜白蘇諸君子之文章也時而采擷其英華時而穿穴其璺罅時而倣佛其謦咳衣冠與之揖讓而進退時而揣摩鉛鈍振拂觚稜與之後先角逐於翰墨之苑囿其為園林池沼也大矣其為賔朋過從也多矣安見此之庳陋不足居而必延閣洞門朱甍玉砌者之為崇麗哉客退遂撰次其語以為江灣草菴記西郊觀桃花記吾邑城隍逼仄獨西郊濵太湖野趣綿曠士女接迹出西門約里許為江楓菴菴制古朴開士指月熏修之所也折而南一里為石里村桑麻翳野桃栁綴之黃花布金溫黂炙日昔嘉靖中鄉先生陸公金居此地陸公治行有聲今遺構尚存止小聽事三間耳又南則桃花彌望深紅淺紅錯雜如繡者梅里村也地多梅花十年前余猶見老幹數百株名流觴咏每集其下今多就稿里人易種以桃爭紅鬬緋繽紛馥郁園田雞犬疑非人間奚必武陵溪畔始堪避秦哉迤邐而行數百武為朴園園中有墩可以四眺隆萬間高士張朴所居張工畫頗能詩邑令徐公元嘗看梅來訪屏騶從傾壺觴日暮列炬前導人折花一枝以歸茂宰風流升平盛事今不可復睹矣又南數十武有菴菴名獨木萬厯中忽有梓木浮太湖而來木廣二十圍里人異之鋸為棟梁結構具足供大士其中至此為桃花絶勝處花皆映水兩岸約百餘株艷冶如笑醉面垂垂暖暈熏人落英滿袖為咏唐人向日分千笑迎風共一香之句低回久之循菴而西即太湖濵也是日晴瀾如鏡萬頃無波遙望洞庭西山霧靄曚曨明滅萬狀坐盤石濯塵巾意灑然適也回首桃林如霞光一片與暮煙爭紫恨無謝朓驚人語寫此景物耳吾因是有感矣昔徐武寧之降吳江城也其兵自西吳來從石里村入此青原緑野皆鐵馬金戈蹴踏奔騰之地也迄今幾三百年而謀雲武雨之盛猶倣佛在目經其墟者輒寤歎倣徨而不能去况陵谷變遷之感乎哉計三四十年以來吾邑之朱甍相望也丹轂接軫也墨卿騷客相與駢肩而遊集也今多煙銷雲散付之慨想而已孤臣之號庶女之慟南音之戚至有不忍言者矣惟此草木之英華與湖光浩皛終古如故蓋盛衰往復理有固然彼名人顯仕閲時凋謝而不能長享此清娛者余猶得以樗櫟廢材玩郊原之麗景延眺矚于芳林向之可感者不又轉而可幸也哉然則兹遊烏可以無記時同遊者周子安節顧子樵水余則朱長孺也孝章曰感慨遙集煙雲繞其筆端可謂極才人之致靈巖寺新鑄銅鐘記自佛事肇興有象設崇嚴金碧晃耀望之而五體投誠者形教也有威音鏗鍠度越無間聞之而六時深省者聲教也聲之動物尤大而疾是以鐘簴高懸則靈祇列侍將以震浩劫之幽沈驚羣生之大寐非徒宣律吕戒晨昏而已也靈巖山吳中福地草香藥靈雲壑秀麗圖經舊有梵宫歲久陊圮夫山大師頓錫于兹靈泉湧溢法雨迸飛壇殿鬱興駿奔麕集日與方外之侣討論心要印悟宗乘説者謂東林之有惠逺沃洲之有道林至師而三焉以為不誕揚聲聞無以震蕩法界不普覺聾瞶無以導演𢎞慈於是以釁鑄之事詢諸門人學子及往來檀施之徒不謀同辭咸願陳力乃購精金乃徵良冶埏人輻輳鳬氏奔趨槖籥齊興火烈具舉絳液貫於重霄金精燭於百里不侈不弇入竇有聲陰陽太和輪圓順軌蓋經營於闕孟夏之七日詰旦而竣事焉其與會也千人其告成也不日苟非精誠蓄於熏修工巧侔乎神鬼曷以睹此哉簨簴既懸施之杵擊虓響吼而聽徹空輪鯨音鳴而苦蠲曠劫大澤之魚龍欲奮法筵之獅象俱驚四逺聞者無不肅容惕慮如蟄斯起如魘斯醒如長夜斯旦雄雄乎駴駴乎洵可以褰終古之遊蒙靜大千之識浪者已不佞某承聞盛美惝恍厥心自哂無文安容默默乃稽首而作讚曰識情流轉刀輪馳法音破空能制之六時悚息開昏疑名山鎔範始大師混融輪廓神功奇不窕不摦高下宜威力逺揚流聖慈一切龍象咸躨跜聞聲悟法億萬期永拔苦海依禪枝新修文昌閣記松陵之為邑周遭湖泊彌望葭葦城居迫狹煙火幾十萬家以是學宫居邑之南郊在宋時為臞菴盤野故址又南則為龎山原田每每地勢迤坦瓜疇芋區為一邑利先朝萬厯中有形家言其方直學宫震巽之交宜有以鎮之維時邑侯慈溪馮公乃審曲面勢建高閣五楹於其上而奉祠文昌神焉閣去城不二里東西南三面皆控帶平壤北枕龎山湖洞庭西山之勝環映左右遂為邑中偉觀兵燹以來榱棟傾頽榛莾塞路歲在闕邑子董君基等以比年文事弗興乃倡議修飭之崇其象設支其軒楹丹雘有加舊觀頓復因來請余記其事余惟天官書斗魁戴筐六星曰文昌宫魁建平旦主寅寅於五行為木位在東方文明之象也故干祿家多祈請焉所謂六星者上將次將貴相司命司中司祿也化書言神世業儒上帝使主士籍此因貴相司祿而傅會之也又言神故張星為張氏子即周宣時張仲挾弓矢射不祥令人宜子則因司命司中而傅會之且張旁為弓也又言神即梓潼張惡子惡子戰沒為神唐玄僖二宗入蜀嘗陰相之此復傅會上將次將之説皆儒者所不道然惡子廟在今七曲山世祀不絶靈爽暴著似又不得以茫昧疑之者夫列星本萬物之精氣幽則為神明則為人其理一也傅説為箕尾安知箕尾之不復為傅説耶歲星為方朔長庚為太白安知方朔太白之不復為歲星為長庚耶張路斯自人為龍廟食潁上其迹甚怪子瞻尚為文以實之况化書云云事應有徵安得盡斥其荒誕哉文昌之祠遍天下而吾邑獨闕然何以兆禎符而贊文治今幸剟苞蕭整斷礎煥然一新之矣繼此以往雲章寶笈歲啓齋宫絳節霓旌時通肸蠁將見斗魁芒耀燦然長鮮江邑人文稱南國冠豈非不佞某之所齋心而請命為桑梓手額者乎若夫閣之面山踞湖雲水萬變宜燠宜涼可觴可咏此一方遊觀之美而董君修舉祠事之意不在是也姑俟他日更當執簡賦之假我堂文宴記張氏假我堂待詔異度公之故居也地逼胥關園多勝賞丁酉冬日梅村先生僑寓其中山隂朱朗詣選二十子詩以張吳越先生見而歎焉維時孤館風悽嚴城柝靜悵雲巒之非故悲草木之變衰乃命袁重其招邀同好會宴斯堂步趾而來者金子孝章葉子聖野歸子元恭侯子硯德徐子禎起陳子鶴客并余為七人孝章談冶城布衣顧子與治禎起述渭陽舊事姚子文初元恭徵東林本末余叩古文源流聖野約種橘包山硯德期埀綸練水辨難蜂起俳諧間發紅牙按板紫桂燃膏殽豆薦而色飛酒車騰而香烈先生久斷飲是夕歡甚舉爵無算顧余而言曰昔吳中彥會莫盛于祝希哲文徵仲唐子畏王履吉諸公風流文采照耀一時今諸君子其庶幾乎可無賦詩以紀厥盛飲罷重其拈韻先生首唱云歲晚顚毛共惜余明鐙促席坐前除風煙極目無金虎霜露關心有玉魚草殺緑蕪悲故國花殘紅燭感靈胥文章忝竊誠何補慚愧荒郊老荷鋤翼日豫七人各次和一首先生再疊前韻一首翼日豫七人又各次和一首先生又每人贈詩一首翼日豫七人又各次和一首詩多不録先生之詩如幽燕老將介馬衝堅吾輩乃以羸師誘戰有不轍亂旗靡者哉先生顧不厭以隋珠博燕石每奏一章輒色喜復製序辨其端都人詫為美談好事傳之剞劂迄今未及一紀而朗詣聖野鶴客硯德皆赴召修文先生亦上乘箕尾矣南皮才彥半化煙雲臨頓唱酬空存竹樹後之君子登斯堂者當必喟然有感于嘉會之難再也悲夫同里顧氏梅林記同里環湖泊之秀多故家士族元末倪元鎮楊亷夫輩嘗遊憩其地遺迹至今存焉東偏有園林一區故顧氏之居也老梅鐵幹幾二百株中有高丘矗上可十餘丈登其巔則龎山九里諸湖皆在指顧風帆沙鳥滅沒煙波村塢竹樹厯厯可數當花發時高高下下彌望積雪清香聞數里外居其側者章子兩生顧子仲容余昔寓同里與二子為文酒會晨夕過從每至春日暄妍香風馥郁必提壺造其地痛飲狂歌不燭跋不止翩翩致足樂也不十餘年仲容舉進士宦遊去余復徙居邑城鍵户不出萍蹤離合感慨係之蓋不過梅林者三十餘年矣今春避兵棲泊兹土因與兩生至其處則園林已數易主矣東阡西陌皆非舊徑惟老梅尚存百餘株亭亭發秀冷艷迎人鼻觀嫣香沁入肺腑慨然與兩生追數舊遊恍如噩夢自變故以來風俗之古今墟井之盛衰友朋之生死聚散其尚有可問者乎當日與里中數子對案操觚飛揚跋扈之氣不可遏抑而今于何有素髮歷齒已亦自憎其老醜而况後生乎計自兹以往或十年或二三十年此老梅必尚有婆娑如故者而吾與子安得西山之藥駐顔續算然則人夀之不如草木者多矣而猶不深省于石火電光之説豈非莊生之所大哀乎請與老梅約嗣後每歲花發時吾兩人必攜豚蹄載醇酎狂歌痛飲追復舊歡送皓魄于夕陽依清棻而發詠以嬉暮齒以遣流光梅花有靈當必一笑而許我也柯寓匏曰無限悲感寫得淋漓蓴鄉草堂記吾友杜子子亮夙以高才生推重一時亂後隱洚溪迹絶城市顔其居曰蓴鄉草堂自為長歌貽示余且屬為記適沈子聲逺自洚溪來余問草堂若何沈子曰堂之址本工部先生故居歲久傾陊杜子朴斫而新之圬壁以土繚垣以竹北户南榮裁遮風雨杜子體故弱不任耕乃命其子習蒲茅襏襫之事旦晚行田操錢鎛薅荼蓼溝塍相望而桔橰之聲相聞也及十月滌場則黍稷穜稑無不登而葅醢酒漿之須無不備也家故有池一方畜魚其中每臨流而釣可以佐􅀈菜之供或挺義而取可以給賔朋之宴此草堂之樂事也余曰杜子則何為哉沈子曰杜子之隱養真而已不求名悅生而已不求餘雞溝蟹舍鱗次籬間稚笋娃蓮羅生舍側玩峰雲之映沼延竹月之緣階此杜子之所以娛朝夕也穫田下潠兒無懶惰之訶拜客荷衣孫有詩書之寄此杜子之所以怡家庭也紬繹舊聞網羅佚事追數承平則夢華之餘録怛傷時變則桑海之續編灌園不廢操觚抱甕時聞命詠此杜子之所以耗壯心而遣餘年也余作而嘆曰樂哉杜子之隱是可以記矣我觀伐檀之君子深鄙素食故不稼不穡而禾有三百則詩人刺焉後世如徐孺子梁伯鸞之徒皆非其力不食誠以食非其力則必有求於人有求於人則不得不骩骳以從之凍餓厄窮之迫其中而紛華靡麗之誘其外其尚能兀奡自守確然獨遂其初志也哉若杜子者種栁若柴桑而無待于乞食誦經類魯望而不至于忍飢斯可為隱士之法矣昔工部先生嘗榜其書齋曰無求勝在三公上知足常如萬斛餘杜子為其文孫而能衣德言纘祖烈是豈僅以隱士稱者哉詩亦有云繩其祖武受天之祜愚請以為杜子頌焉朱錫鬯曰偏于清趣幽事寫得妍華憺園牡丹文宴記草木之英華未嘗求知於人也然必藉人以為重屈靈均之於蕙蘭陶靖節之於菊林和靖之於梅周元公之於蓮皆是也牡丹世稱花王自唐以前不著至于今而窮妖極麗變態萬方以追逐時好自宫禁梵宇以至縉紳學士文人墨客之家無不寶而玩之蓋物之尤美者初不待人以為重焉雖然古今之詠此花者多矣獨韓魏公千毬紫繡擎香炷萬葉紅雲砌寶冠讀者以為真金華殿中語其宴賞此花者亦不知凡幾獨東坡通判杭州同太守陳公宴吉祥寺花千本品百數酒酣樂作金槃綵籃獻坐客五十三人東坡為作記傳之然則詩非魏公宴非東坡亦不足以寵光此花也草木之英華必待人以為重豈不信然哉玉峰健菴先生好古博學家藏經籍甚富江浙名賢無不羅而致之賔館今年春杪余借書過憺園先生出四部書示余牙籖縹帙觸手爛然因與錢飲光萬季野數子咨質疑義搜考祕文如坐積書巖不待三食脈望已翛然身輕矣維時牡丹方盛放南榮北榭曲檻回廊的皪爭奇綺組奪目庭中假山高十餘仞參差植花其上望之如霞起赤城絳雲天半向夕復燃華鐙照之送態逞姿倍極猗儺是日也監史不設絲肉勿奏觥籌無算客主忘疲其盛雖不及吉祥之會而萃素交徵文史尚清娛則又吉祥所未有庶幾此花之益增而重已乎昔歐陽子嘗有感於牡丹花之絶而無甘實荔支果之絶而無名花歸之造化之至理吾以謂有開落有榮謝者植物之花果也無開落無榮謝者萟林之花果也詩書以發其馨香考索以流其甘液凡憺園中所儲偫而枕籍之者何一非四照之名葩陸離之朱實也乎而必致憾於色味之無兼美此猶局於草木之觀也偶讀歐陽語遂書此為記以貽先生并示同遊諸君子書紳堂記張子𢎞蘧以書紳名其堂屬先友金孝章書之復屬其兄九臨請記于余余語九臨曰𢎞蘧之名此堂也豈以張氏世系出自子張耶九臨曰非也仲尼弟子顓孫師琴開皆字子張非姓也吾張氏發源顓頊春秋時有張老張丙張骼張躍張栁朔與顓孫迥别吾弟自與子遊有志聖賢之學故乞子文以警座右焉余曰若是則雖微子言余固將記之夫聖賢之學止自見其心而已繫辭乾以易知坤以簡能易簡而天下之理得矣忠信篤敬即易所云易簡也人皆體天地之心為心故我心與人心感而必應惟感之者不誠斯應之者不疾譬如懸萬石之鐘于此小叩之則小鳴焉大叩之則大鳴焉以尺筳撞之聲不及尋丈以舂杵撞之聲不過十里以蜀山之桐撞之則響逾百里之外應之有近逺繫乎感之有淺深蓋章章已語云玉在山而草木潤淵生珠而崖不枯又云瓠巴鼓瑟流魚出聽伯牙鼓琴六馬仰秣此言物皆可感感無不應也嗚呼君子其可不務求誠乎哉世有懷咫尺之修矜奮張之義而遽欲開金石動風雷此必無幸若乃長智增私挾權任數日與天地易簡之性相逺則我心與人心益捍格而難親甚且爭怨起于豆觴戈矛興于袵席何况四海九州之逺其能使翕然信順孚若卜筮也哉然則求誠之道若何曰古有惡敗而出妻惡卧而焠掌可謂能忍矣未敦務也誦數以貫之思索以通之求仁賢以翼輔之可謂敦務矣未靜修也屏耳目之欲絶攖鑿之棼可謂靜修矣未全粹也必也奧窔之微惛默之內執一無失積微無怠毋登高而深隕毋基下而墻增如是以幾于誠其庶矣乎今𢎞蘧才日益敏學日益充其以享天下之大名特撥麷而取之爾所可益子者惟猶龍氏戒夫子深藏若虛之言夫冥冥之修未至而世譽焱集其名也猶石火也電光也浮漚也斯聖賢之所畏也魏凝叔曰全從荀蘭陵脫化粹然儒者之文申子純孝行記申氏自按察公天益以下世有文筆子純者按察之孫也父貢士汝思有名於時子純生甫周晬母顧病殁子純啞啞悲啼人以為嬰兒故然及臨殯號泣不休始知其為孺子慕也父異之乃名之曰孝十六歲補博士弟子每試京兆府與諸名俊遊處按察甚憐愛之嘉靖壬寅按察卒與父營葬事于梅里村炎暑中工築之勞皆以身任父嘗病癰幾殆子純朝夕吮其毒穢惡之氣浸淫臟腑間遂悶絶恍惚之上帝所帝曰以汝孝特生汝父賜之青氷乃蹶然醒嘔出毒涎數升許父喜曰吾名爾孝不虛矣後二十二年父復病嘔血子純不解衣帶侍養者踰歲所嘔即承之器而啜之若吮毒時然父竟不起是時祖母吳宜人年已九十矣子純朝暮號于喪次入則愈顔柔色慰視宜人自含襲至大小祥三年無改宜人未久卒子純喪之如喪父其所以養後母袁者一如事祖母晚歲習靜村塢恆歸而謹視甘脆務當袁母心袁亦忘其非腹生矣若其敦睦之行內外無間言仲父某有誣之殺人者避匿不敢出乃逮繫其婦吳宜人不能寢食子純出白之官事得解更資其槖裝使得仕州倅仲弟某袁出也尚少子純撫教之以至成立家庭怡怡不敢抗顔父禮又性好周人急難姻黨知交有以艱窶告者大小必應其友顧曽瑜人誣之重辟乃傾其槖為辨釋之又佐邑令李公遷梧營建石梁以書投過賔溧陽史少卿勸助千金人不病涉他善行多此類萬厯丁亥卒年六十四其吮毒延算聞王元美先生初亦疑之久而論定乃以志其墓劉按察子威復為作傳周太學本音手書之斯以知其必不誣矣嗚呼天人之際至茫昧也然精誠既至則應若桴鼓吾向讀書禮于周公之請代兄死文王之與子三齡未敢深信今得子純事遂釋然無疑夫天人之理恆相貞勝若生死專歸之運數則人事為無權故不可必而時若可必實冥冥者為之以堅人進善之心也世非無忠孝節烈之事然籲天而天卒不應豈非其動于名耶激于氣耶鋭往而未能敦善行不怠耶如是而動曰視天夢夢天果夢夢已耶爭于已定之天而不能爭之于未定或亦其精誠之有未至耶吾請彰子純孝行以曉世之昧天而誣天者孫義士鳴災記歲在庚戌夏雨浹三旬不止至六月十二日颶風西來太湖水橫溢平地湧丈餘浸城郭漂屋廬人畜溺死無算浮槥以千百計風猛濤翻聲如萬弩齊發竟日夕乃稍殺誠百年未有之變云維時耆老縉紳咸聚族謀曰今田禾方淹復遘此奇災是無秋成也無秋成是無課額也勢必當走輦轂叩登聞或可覬蠲貸之令恨今無任此者將奈何衆咸曰非孫君象先不可蓋前此辛卯水災象先以編氓五具疏與撫按兩臺疏先後上得允改折故咸推轂象先而象先亦慷慨願行即日䇿杖擔簦匍匐三千餘里抵燕京繪圖陳情遍告諸臺省幸邀天眷議蠲議折窮黎得少蘇焉甫歸里復為偕行者所纍收繫郡獄半載時圜土疫作已斃數人人咸為象先懼象先曰吾為全吳生靈請命已早辦一死死固吾分也何憚為然竟得無恙當事者為昭雪出之都人士咸嘖嘖稱象先不置嗚呼雖古義俠無以加矣吾觀今之人平居貪冒無恥爭錐刀之末如赴火蛾一旦有事囁嚅不敢出一語雖急難在父兄亦不皇顧何况通國之阽危也象先半菽不充身無賦稅之纍獨冒死驅馳活億萬人埀絶之命非義激于性者能之乎茂倫語余云象先近且屏蝦鱔焚香炷日諄諄以上真寶籙勸誘人類學道者所為豈徒義俠云爾乎誠如是吾殆無以相之矣愚菴小集卷九
