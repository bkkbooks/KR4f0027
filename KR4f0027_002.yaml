body:
  text: 愚菴小集卷二吳江朱鶴齡撰五言古結交行莫以芳桂根而逐槿花榮槿花終不老旦暮容色好一解堅氷雖可踐足底翻波濤人生果意氣何事薄錢刀二解子頡我則頏子衣我則裳衣不因故厭裳豈以下妨三解素心交可久誰能紉荆棘坦步交可親誰能枕矛㦸四解布短不成裯水淺不成流阡陌自有道但恐心悠悠五解葉聖野曰翻得絶妙又曰古淡清深是唐人樂府佳境感遇十三首吾生本天植廓然棲靈根神明坐搖蕩遂與狂流奔風波得深警萬感寒心魂賤貧生易達寂寞吾道存庶幾屏形纍出入無窮門朱明未云滿龍火巳西移日車無續景壯士安能持一葉墜庭柯寒風栗我肌老壯更相迫蚩蚩欲何為榮華爭努力秪供霜霰欺誰見西山藥可駐百年期天道有波瀾山雲誰為主蓬瀛今不流安得朝市古金狄酸秋風銅駝埋宿莽姆豈辨青門人當年乃萬戶蚓蟻升天行潜蛟失其所感此淚悢悢含辛不得語敗葉鳴空階號蟲弔秋影默默誰與娛憂憂互相引達人感無生志士抱遙省苟無繁霜驅安得腐草屏天心警虛華物性趨嚴冷徒深憔悴悲此意誰能領流雲本無隂日昏氣隨變桂蠧非一朝桃蟲生隱患但見一葉秋巳知三隂晏如何守蚩蚩倚伏失前算天運忽巳移山花亦雕換禍樞豈無因徒令識者嘆易填東海波難鏟太行險太行方寸起一步乃九坂鋒矢日相尋毒流及𤣥冕柏梁隨草根瓜蔓終不剪往復見天心殺機還自踐悠悠白馬津千載同憤悶牢籠隨吾身何處得寥廓患害生避趨昧者自相索斷梗豈無依藏舟終走壑坦然任幽貞四隅各有託胡為東西馳徒作雕陵鵲熊貙不相啖梟獍不自戕人則甚于斯生理安得長儒教發大冡隂符蓄不祥古聖貪所務遂開後世殃傷物無獨利愚者乃爭強干戈終未巳勸君且後亡峽中亦有日海外亦有槎我生獨崩迫沈憂浩無涯出門愁滿道入室愁滿家芳蘭骨不立叢菊秋空花萬物非可悅百年誰見賒如何違此性役役隨翻車山南生美棗山北生蒺藜受氣雖有異歲寒同枯枝青林改白道故社成新墟萬物皆隨運吾生何獨悲䇿杖爭絶景徒為後世嗤不如守衾枕昏昏無是非黠鼠貪空倉青蠅慕遺汁但與吾性違驅之恐不力出門各有營蹇步安所適鷹眼自堪憎梟林不可息矯首望髙原烟草方亂色寤言誰與期山川阻良覿憂至充朝飢長嘆聲惻惻神龍無尺木反為蚓蟻陵芳蘭生匝墻亦隨蕭艾零小人甘齪齪安知楹與莛黃鐘奏鏗戛反謂蟲鳥鳴神物不可侮侮之見精靈君看百丈湫怒蛟誰能罾赤日蕩靈魂秋水澄心胸覽觀良巳久何用謀去從蚍蜉享朝景自謂百年躬智愚迭相笑萬古同夢夢西南望懸圃光氣何熊熊玉英無敗色靈草有鮮容誰能追羽駕煉藥瑶池東史弱翁曰諸作感愴時艱出以身心性命之語其中包孕甚深厚髙者可與曲江頡頏麟臺篇什雖繁遜其含藴同茂倫樵水長發庶其小集介白齊中得落字驚飈蕩髙柯肅肅鳴霜蘀江濤引寒烟飛向檐前落激懷不得平感物增凄索維我二三子髙言振靈魄主人方據梧蕭逺命東郭瞻矚生清風嘉尚各有託壁穿竹氣凉座泛山光薄獨樂有清吟草廬非寂寞春雪凍雪合平疇來自隂山窟吹我曲房前奪我瑶臺色嶺雲寒不飛朝幌透無跡春動百物暄一時斂青碧髙下均浸淫衆芳失其質不感隂氣深誰知太陽德介白曰情景沈冥不待著色贈史弱翁白日殘清暉宵光安可補魚鳥失飛沈珠玉成灰土文章不庇身處晦惟園圃嘆子雙鬢斑羈窮共誰語驚飈無靜柯飛鏑多危羽旌旗滿中原簦笠適何所同袍事巳違故琴猶堪撫安得東臯田偕子藝寒暑寫懷寄陳鶴客兼呈禎起諸子物情各有求靜躁殊所秉反幸冠蓋疏趨馳謝榛梗飢來安可驅踰戶即巉嶺以斯鍳薄躬戢志恆內省鶡鷃來新聲棠梨獻晨影淡淡林樾清蕭閒意俱永經史足自娛亦貴晉以猛陟巘必層巔汲深豈短綆睂睫矜所謀止供達人哂此意誰與同沈憂抱怲怲晚交定陳生托懷類便靜真氣照軒楹清文發光頴燕石時易珍良鏐獨留礦知希何足歎立身尚孤耿靖節與文中古道常接軫我將傳髙士風義朂公等俞無殊曰讀古學道之言自與浮采迥别真氣照軒楹請即以贈此詩吳門晤陳言夏漆園尚天放正則敦修名彼皆處塵壒心跡能雙清如何鸞鳳翮下與雞鶩爭陳子秉冲素讀古他無營蔚材托嘉遁抱甕甘柴荆吾觀夸毗子求索何所成古人事枯槁亦在揚德聲幽蘭生菉葹香澤終自明子其寶貞曜軒冕無長榮葉聖野過訪新旭霽南榮松齊淨如滌風牀眠抱書誰與展良覿葉子忽披幃一笑忘主客慰藉無枝言論文遂通昔卷幔月魄鮮篝燈露華白方果同衾期頓深分手惜送子出林閭悵望滄江隔羡彼南征鴻飛鳴逐文鷁介白曰奕奕清令流動自肰葛瑞五同呼德下葉九來過訪草薰麥隴秀花暖楊園烟靜影室生白朝暾啓暄妍有客來衡門巾屨何聨翩一見愜心許中懷罄所宣十載託芳訊疏麻誰為傳今兹攬襟裾如握蘭與荃新知自古樂况乃嘉遁賢君操白雪調我鼓朱絲絃風義既云合䕫蚿豈徒憐綺饌且勿陳斸菘烹小鮮酒酣發髙唱夕露霏長筵雲房見微月撫枕不得眠衆女競謡諑孤芳長棄捐文章非小技鏃礪窮前賢黽勉敦所務何為歎屯邅明發帆去烟浦心旌兩懸懸願因晨風翼寄我瓊瑶篇孫子長曰髙情發以嘉藻古義傳以妍辭人淡如菊文動如烟吾今于長孺見之矣送唐鑄萬移家金陵二十韻江雲覆春渚荻岸風飂飂念子始波濤旅泊何時休子昔來武林笑言未三秋花嶼共巾舄雪籬交唱酬歘焉處衰絰生理攢百憂愧無監河粟周子食指稠交態匪獨今志士當自謀葛帔憐孝標薄俗有此不子今往因人因人慎所投刈薪毋枳棘掬水毋池漚枳棘難為㸑池漚豈成流嗟我薄遲暮畏人寡朋儔親子十載餘形影常相求蒿里方永餞河梁重離愁撫存兼悼往雙淚不可收魯酒缺倉卒把袂聊淹留𤣥甲未云解大江髙浪浮豺虎滿周道豈惟戒陽侯長年正五兩轉眄成阻修行矣自勉愛音書遲去江郵王玠右曰真摯之情浮動行墨中間忽入樂府調頓挫激昂意味淵永讀之使人留連金陵王元倬寄南陔詩有贈大道日􅞏散立名求其真傷哉秦士賤素衣䝉垢塵理色一以辱奔騖徒云云飛蛾赴華燭蹈死誠所欣寧知七尺軀育鞠來苦辛胡為憖置之乃曰榮吾親南陔序詩雅色義敦先民豈必飯脫粟不齊八物珍吾欽太原傑志决無逡巡懸車十餘載甘與樵叟鄰既躬板輿御亦饌清江鱗譬彼雲中翮皎皎儀秋旻安能學􅒗翼低頭飲汙津巃嵸鍾山色植此凌霜筠黃塵縱眯目亦辨玉與瑉丈人且安坐釣瀨終蒲輪介白曰氣格嶙峋如登閬風之臺下視塵界皆蠛蠓耳哭董次公寄歸本恆理斯人抑何遽丹鉛苶此生穅麧甘所遇著書書未成飲恨泉臺路陳篋理遺文拊膺淚如注軒除霜月清髣佛音容度太息天夢夢巫陽不可訴湖波恨渺茫誰與致薄賻秋日有懷四首秋容淨如洗雲衣覆綺席髙桐晨露流素幌映虛碧瓜架蔓巳除蘭畹香猶襲安得同心人相攜度阡陌入門徒有懷出門復何遇隔水稻花香沿村漁火聚霜葉丹平林一望物非故縱有西山童衰顔豈能駐長空蕩金波圎魄盈三五熠耀火穿林蠨蛸絲織戶北里喧笙竽南鄰困簍籔索寞對清樽素琴為誰撫灼灼紅芙蕖有期同采擷遲君君不來薌澤坐銷歇鶴警遙寺鐘烏啼廣庭月撫枕忽長嘆幽懷耿明發申鳬盟曰秀氣閒情清音俊節如此學選體吾亦何嫌其膚革耶寄徐介白美人今何在抱膝靈巖側秋花秀緑階清賞散縹帙閒門羃蔦蘿空翠嵐烟入臨流藻網清掃葉霜痕積瓜田手自鉏抱甕汲深夕新詩題絶巖不使人間得自古髙賢儔入林恐不密愧余婚嫁牽微尚徒怏悒别來歲月遙身世逾逼仄相望五湖西迢迢隔方域離憂結中腸披寫定何日雲停北渚寒雁唳長空澀終當攜春醪醉歌仲長室遲我梅花開松風理瑶瑟茂倫曰淡而綺綺而不繁氣韻欲流匠心獨妙黃陶菴先生殉節乙酉兩世未葬懿弟上枝拮据舉襄賦此志感嗚呼江夏英磊落青雲器持此歲寒心慷慨赴明義晶熒練水濵碧血照天地獨憐淺土中四喪未歸瘞夜臺遺恨深耿耿目猶眂有美見天倫贔屭營所事靈輀出郊原執紼四逺至鬱鬱京兆阡宛宛延陵字庶以答義昆貞魂可稍慰弔鶴空飛回束芻阻迢遰遙瞻隴雲髙攬筆發深喟笻在禪兄過我荒齊殳山夫趙砥之繼至談咏竟日率爾成篇拂拭夏簟清炎歊晚彌熾曳屣迎髙人凉風颯然至笻師久逃禪撥棄人間世一别逾三秋重來起昏寐示我二賦天台雁蕩竒琅琅金石墜興公未足多揚馬可同轡兼攜蔣生馭閼詩卓犖富瑰製陋彼詹詹言陳根徒委翳展讀坐忘疲小巫深豫愧峩峩巾舄來殳趙同夙契諧談無古今所戒雜聲利髙者破𤣥關下者析竒字角論如涌泉胸臆頗得恣是時蘭風清日車轉庭砌瓜茶似僧寮冷淘間乾終年困塵嬰頓爾發神智皆云此晤良惜别屢牽袂吾衰久矣夫心跡多蕪纍公等施鉗錘或足謝天劓所恨相見稀形影俄離異明發隔山川此夕同襆被聚散何足云浮雲本無繫毛大可曰疏疏浩浩頓挫自老此種格韻仍從少陵得來初夏過嚴園二首薰風動隴陌萬類光融融羣木領森秀四野彌青葱名花映朝幌煙霧霏空濛好鳥間關鳴樹頂和絲桐悠然感物化斯意誰與同林氣晨夕佳松竹疊遙翠攤書坐東軒日移花影墜文禽不妄飛野叟時一至苔階有餘清晞髮此焉遂對酒情話多藉草不知醉無殊曰調近韋柳實得選體之深蓋韋柳詩全從陶謝得力左司尤淡逺近古顧華玉謂五古先學左司然後諸家可入誠不誣也今人作五言古類知宗選然掇拾成語神韻索然矯枉者遂以學選為戒豈通論哉寄王西樵吏部兼呈阮亭工部玉質生荆岑光剡櫝中見碔玞冒連城五都誰能衒風騷本同源作者代游衍古調歇不彈新聲曰流變根荄苟不存枝葉徒浮絢夫子實起衰英雅欲兼擅哲弟稱二難珉珣世交羡聨翩翔藝林婉若雙飛燕賤子復何知一經守孤狷徒然仰蓬壺末由侍壇墠峩峩白雪樓蔓草巳深纒琅琊今嗣興風軌扇羣彥慚余非子真名字京華慁迢遞燕山鴻短章託深眷雕蟲秪自嗤敢覬相如薦春日郊行同趙徐二子拘情若鬱陶有如困䦨圈忽思郊原遊山川曠吾眼步屧出城闉同心得嵇阮登頓迤湖濱心目始一展是時朝霽初盈畦露猶泫碧草亂如烟晴絲天外罥鶯啼何處深花雜無煩辨雲濤萬頃平翠屏列西巘波橫樹影新風遞漁歌緩憩石野趣綿臨流古懷緬由來賢逹人何事釋􅑬嵼壯士多荷殳英才或賣畚今吾辭二塗飽飯顔猶靦况值春氣柔暄妍物情善營營欲何為形役滋煩悶縱成榮與名所得贏甀甗放懷不知疲拄䇿竟忘返恨無黃公壚揮酌共沈湎明當攜濁醪餘興盡遊衍吳六益曰道情綿邈非嬉春玩物之言過周安節館齊小飲南莊沈氏居寥落百年後五公號聨珠此地窮蝌蚪到今讀書臺森森䕃榆柳諸孫雖食貧素業頗自守蘭芷紛參差圖書粲左右周子坐其間髙吟動林藪見我來于于四顧問升斗篋中出新詩清音散瓊玖簷靜鳥踏枝簾疏花覆牖主人出留賓羅列陳脯酒深愧空樽愁傾倒情良厚髙軒矜少年吾輩憎老醜陶公素心徒交態能復有感今更懷舊此意向誰剖婆娑暫開顔陶寫忘白首挂策出前村黑雲連林阜阡陌迷所從沿溪問漁叟懷俞無殊昔别春風柔武陵花亂發今兹大火中土膏競耕垡東菑曵孤笻矯首望林樾老去戀舊交情來惜華髮竹風響素琴松露流華月悄然離思盈扁舟待超忽無輕行樂期庭草芳未歇寄笻在乾坤遘明夷志士無坦步艱貞義所激不皇家門顧吾子至性人集蓼甘如素自歸祇樹林藜莧不飽茹清餐柏子香潤裛松花露梵唄逃塵緣空王引覺路去秋叩我門顔色殊非故問答始驚呼涕泗紛如注憶昔旅敬亭與子共情愫聨翩宛溪濵朗詠𤣥暉句翻掌三十年世事霾黃霧相對各吞聲不忍更陳訴愧無巾屨供徒有胸懷吐子今汗漫遊杖錫何方駐風塵忍辱先況在落矰羽金沙道侣稀且往靈巖住靈巖梅花開逸人文詠聚二徐介白昭法皆子儔寒香可同賦㑹當拏扁舟一笑雲中遇遣興五首非廉家不貧非讓身不賤亷讓皆為名名臻行亦偭道腴與俗榮二者中徒戰所以充隱流髙士羞同傳誰能辨妄真勿為浮名牽浮名不可居閃忽巖下電豫章生深山七年巳見竒歲久又得地剪伐無從施霜皮與黛色參天勢崔嵬下無蟲蟻蠧上有神靈持天子建明堂棟梁安得遺匠石一朝顧何嫌采用遲吾有太古琴鼓與不鼓均縱鼓人不聽視同瓦缶鳴況兼筝笛奏恱耳多新聲水調既噍殺入破何砰鍧吾欲匣此琴以俟䕫曠生䕫曠不可作古響終泯泯齊紈製團扇清風凉慢膚炎蒸一以歇棄狷在斯須棕拂雖微物用與白羽俱秋深蚊蠅息爾亦隨屏除豈伊人情變自由時令殊君看園中花幾時色敷腴山木不材夀雁又不材烹材與不材間何用深較量去者漚自滅來者波自揚吾生石中火成虧豈有常蛇蚹與蜩翼一任天機行能以無用用乃遊道德鄉朱錫鬯曰深得䝉莊之㫖氣調逼近香山延安趙玉譜過訪君昔别我去豪氣不可羈君今叩我門似訴津梁疲問君何為爾一官數太竒通籍十五載奔走足常胝昨始令蕭山蓴絲美足怡撫軍疏别補輿蓋不得施理須重赴部行色能無微旅雁催人老江花送客飛不知四海內手板向誰低余聞三歎息宦海古所悲流坎非由巳一任天公移郎官宰百里此職未為卑本期傳循良行役安得辭況君光司馬威望震三陲家聲今可起十年秉戎麾為君歌愛勉勿愁羈旅為侯官陳侍御過訪兼枉贈言次韻奉答急節凌歲除寒威凛森木霜凝負日桐雪覆侵檐竹兀坐守遺經未遑栖抱犢十指成凍皴簡端盈筆録美人振朝纓文字馳卷軸忽枉髙軒過窮巷訪跧伏兼貽金玉音字字堪三復愧我滯衡門祇同握粟卜老忘去似師丹一卷難拄腹稍延炳燭光敢並晨曦炅大業在千秋相期矢巖谷徐健菴太史過訪亭林余畏爻卓犖儒林奮貫穿經史籍事事精考證韻學摧休文尤得不傳藴叩擊恨無從遊轄眇秦晉宅相今巳興珠玉朗輝映三張才並雄景陽名早晟酷似舅家風吾黨推淵鏡惸惸苫土中三禮析幽敻紆駕無巵言經疑勤討問同心計與吳甫草𢎞人存歿多賻贈愍余空槖垂兼金助雕鋟此誼求古人暄色回霜鬢斗酒愧未儲無計留鞍鐙交道從此敦人知重蒿徑朱錫鬯過訪時膺舉將入都相國門廕髙孫枝盛繁衍韋經與魏笏傳家未云忝子蓉懷俊才錫鬯霸文苑相攜入竹林時推大小阮望望一水間韭溪清且淺形跡何參商如隔坡陀逺席門忽見臨蘭風拂僶俯子昔遊京都才名噪軒冕今者徴賢良一舉親禁臠豈無傾國媒行見霜蹄展如余悠忽身自安鑿齒蹇江干肯維舟木榻同息偃周青士曰輕蒨生動白香山所云清脆好詩篇也贈學究周翁九十紺髮逾耄耋方瞳逼期頤非修導引術非具神仙姿乃是元氣全淳行天相之自小戒南陔嗈嗈篤連枝詩禮作襟佩章句當鎡基門廡生徒滿髙座稱經師每逢賜酺飲時見朝月支外臣雖草莽耕鑿皇仁貽銜哀陽九厄是日必漣洏當年乘軒客此義誰能持對翁冲和氣無異遊皇羲羅拜多紳辨推我前致辭我亦太古民貢諛安能為表翁耿耿心勝頌南山詩吳𢎞人示余漢槎秋笳集感而有作古業衰制科紛呶尤六義茅靡萬厯時矯枉啓禎季瞽學趨空枵識者深嗟喟竟陵熖稍熸王李波復漬二軌分中途作力徒贔屭時余謝諸生服古心如醉謂此何足爭當泝三經緯先探騷雅源徐整建安轡六朝與三唐錘爐總一致誰能奏咸韺可使闕懸肆誰能盈囷倉止拾遺秉穗自憐起孤生蹢躅音無嗣延陵有季子俊才拔流輩晤語廓心胸相勗張吾幟奈何急科名此路多軒輊自矜才地髙繳弋安所避一跌遂蹉跎迢遞遐荒置彼土蛇虺都人跡罕能厠雖營板屋居詭狀堪愕眙荏苒二十年音容想憔悴魚雁斷飛沉莫遺相思字忽見制作新卓皪諸美僃排奡摧橛株舂容貫組璲長白賦尤竒班揚堪鼓吹更間走筆就使余心神悸由來放逐塗多是才為祟嚴霜玉汝成瑕垢無終棄蔡雍髠朔方未久弛吏議李白竄夜郎中道䝉恩貰如何間世英長使禦魑魅方今網羅開輇材咸得試輪囷獨見遺搆厦安能遂悁悁勞我思旦晚金雞至獻曹秋嶽侍郎三十韻神劔埋塵匣價無十干酬拭以華隂土晶光燭天流皎皎雲中鶴少時同鷽鳩終藉啄菢力髙鳴羽修修古人悲獨學志士厲冥搜所以昌黎翁柏馬招之罘余生困闤闠著作不一售老思獵經苑目短力苦遒磨丹而漬墨聊以當鉏耰漢宋分軌轍誰與割鴻溝昧者左右之爭馳挾其輈今欲衷至當令彼息啁啾雖云覃考索尚欲窮咨諏愧余孤且陋陳篋無異搜每思經籍廣何啻堆山丘譬如求𤣥珠必為象罔遊又如折若木必上崑岡頭撞鐘今以莛蠡勺祇自羞窮老歲巳晏悁悁抱沈憂夫子文章伯儲書罄九州琅函與玉躞祕冊無不收久思御元禮廡下或見留恣覽甲乙部采掇兼挍讐庶幾成綴緝得以垂千秋今者遇吳趨歡忭不自由屈指儒先撰生平目未謀從此得津逮宿願非悠悠開張鴻寶祕聖涯與沉浮將假梵宇寓或望班廬投所希注愍惻勿使空綢繆答贈吳慎思七十韻具區天目來厥勢何蕩汨七十二溪注濤瀾駭溟渤包山有靈威精怪時出沒松江承下流襟帶控吳越往往異材生山水爭磨戛元季陶謝名陶振謝常鐵崖度津筏陶謝皆楊鐵崖門人西村交巨公史鑑與沈石田吳匏菴交最厚文場建干瞂伐承父與羡長王叔承俞安期才氣嘉隆杰浩瀚千萬言公卿皆折節逹者推周顧周恭肅公用顧學憲大典錘鍊功微乏此外遂寥寥菁英疑欲歇木公有俊聲潘一桂中道俄夭折沈生工西崑沈自然徐史耽幽寂徐白史𤣥偏長頗自矜大山一丘垤世變逾三紀風雅未銷滅漢槎萬夫秉瑰麗才突兀髙笑睨人寰爾曹甕中蠛忽罹繒繳驚邉沙坐囚紲驥去天間空嘶鳴但凡骨塊獨寡朋儔支離守窮跡鳥聲散晨暄花影搖夕月詩成無共酬酒熟惟孤啜露榭風櫺間誰來成主客自謂長寂寥意氣無開斥見君岸幘過頓覺牢愁豁談笑風雲生開誠吐肝鬲新詩更起豫一往才奔軼采擷富青箱何啻千雞跖如觀廣陵潮萬兩車轟輵如張洞庭樂百神聽呵喝君系本韭溪皇初盛門閥至今瓞瓝垂古木繁由枿諸父負時名交籍滿江浙尊公起巍科一官棄飄瞥君曩隨宦遊歷覽凌窮髮貯竒懷抱開攬筆恣超忽嗤彼噉名徒未嘗走干謁鈍翁驚見之嗟賞口不輟他人有是非落落非所屑顧獨窮巷臨贈箋屢搖襞鄙人學殖荒門户尤單子黽勉述作塗時輩動排訐愧如鉛刀鈍朽株安可切中嵗棄儒冠時事遭崩坼興感少陵詩崆峒扈羈靮箋解遂云多正義頗昭晰因及玉溪生艷章示準的本原出風騷非為使事僻嗚呼冊府繁浩浩煙海積六經定聖人苞舉羣言液奈何衆說淆幾使微文溺末學不自量妄意加剖析詩申小序古非與考亭敵書掇二孔義止埤九峰缺春秋辨凡例諸傳敢搪探矻矻草年餘鈔撮窮日夕清羸遂不支筋力空疲苶耳如許丞聾目似張籍瞎尚希探易理象數渺難說近服來瞿唐餘子多㑹稡戴記陋陳氏東發鈔頗核衛湜羅羣義蕞殘須討索惜哉歲月慳逝矣桑榆迫此事託無人憂心耿如剟得君振古才投分比鶼蟨但恐從進士今古分塗轍所禱速騫騰一朝焚帖括罄覽百家言覃精古先籍吾書縱有成安能振被褐遲去君奮南溟為我終剞劂詠史二首南箕誰見簸北斗本無挹提壺非有漿促織不成幅舉世循空名君子須責實王衍罹排牆殷浩終廢踣髙名竟何為徒以禍人國處士盜虛聲自古深歎息雖有聘弓招達士不輕出出者惟隆中髙駕邈難匹鬻爵本秦令漢武兼均輸榷算籠商賈尚未及文儒延熹賣矦爵西園爭騖趨鴻都置文學微蔑皆天衢紛紛立圖贊無乃汙詩書是時殿廷內黑龍十丈餘青虹垂蜿蜒同時見玉除祅變應何速天人理不誣愚菴小集卷二
