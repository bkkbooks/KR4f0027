body:
  text: 愚菴小集卷十五吳江朱鶴齡撰傳松陵名宦人物余别有文獻全書其承用前賢者此皆不録安丘李公傳以下名宦李公遷梧字茂陽山東安丘人舉嘉靖已未進士授吳江知縣邑自倭難之後瘡痍未復公至務與民休息諸故遺科條一切罷去小民有所陳訴就道旁片語立決之歲暮縱遣囚徒及春而來歸如約其德意為人所信如此明年庚申江南大水邑尤甚城陴半崩道殣相望公宵旦焦勞捐俸設糜存活無算撫軍某公業奏請蠲稅大司農以格執不允蠲先所遣曹郎在吳勾校如故公嘆曰國賦出于民間今百姓畢力溝塍以障水猶恐不給况忍驅之鬻妻子供箕斂耶于是悉停諸催科惟以招撫流移築修圍岸為急務或上官譴責符攝里胥即屏去冠帶攜囚服以往御史黃公某適巡倉至聞而賢之表其事為七邑最公乃出視事曰吾民得無有不安故業者乎俗故喜訟豪猾得無有蠧吾民者乎巡行勞來刁黠生事者輒法之民賴少蘇壬戍四月邑民不戒于火延燒公堂公仰而籲天急徙獄囚移帑藏斂圖籍頃之類有神人緋衣者立庭中遽反風而火滅其月即議興復材取垂圮之庾力用鄉民之隙費責失火之家訟屈者罰鍰以繼之越百日告成閎敞過于舊公為治悃愊無華不設鈎筒不尚敲撲慈和豈弟本于至誠即胥吏之叢蠧錢穀者亦不忍紿之以私如革賓餼省供億蠲貰馬減空役簽總計皆有實惠及民至于亷潔之操皭然不滓與羅田張公明道相埓苞苴請謁一無入焉治邑三載政成民和召入為闕後三十餘年萬厯丁亥邑復大水江令鍾亷緩于踏荒反摘訴災者為誑士民追思公賢乃設主城隍廟朝夕籲呼以相感動劉公時俊來令爰采衆論祀之于學宫論曰李公治行不愧古循吏嘗聞諸耆舊云某御史行部至吾邑供億不堪卧榻折足御史怒突入縣庭欲清核庫藏及後堂見東壁一小牀葛帷已敝旁置二竹笥不設鎖鑰問何人敢居此則令之卧具行篋也乃深愧歎邑事一無所問而去又嘗與邑紳吳太守崑飲見以一銀船注酒酒滿則帆張意頗善之吳舉以為贈公受而日以供飲逮去任出境仍緘還之君子曰公之却銀鐺亷吏所能也若其始而直受想見其為人蓋坦易近情非皎皎以清鳴者噫此豈獨今人所難及也哉周安期永年曰熊恭簡公生平清節一介不取其巡撫雲南平蠻公宴之日乃受金花綵段或者疑之次年還朝召有司領貯庫始知公不欲以清病人也李公之事與熊公絶相類富順劉公傳劉公時俊字恆甫四川富順人舉萬厯戊戍進士自廬江桐城再調吳江公吏治精強敏斷其大者在於清核田糧均平賦役往時催科率以盈為辦猾胥隂比匿賦良民致有十限三分之輸公先造煙門册凡田畝貫址户口令民占實以報備簡稽因洞悉田賦利病謂據户部考成數應嵗餘若干金遂以八限五分為準均之黠者無所閃匿凡督宿逋者必上下吏胥交媾而愚守與令各飽私腹公知其弊上臺檄下即併經承解之終任無擾漕卒獷悍橫索無厭公請於漕撫每百石加四石耆老槩庾人笆軍苐持籌焉每厫設一門者按衛給籖驗入毋多一人浮圭合者抶以徇嵗省米二萬石癸卯冬議兑謂軍與民爭皆因斛口起釁乃創為窄口斛使雖爭而不多役至北運最繁苦公所任咸得其宜上無逋欠而下有留餘且得以其間銖積黍絫為儲備焉邑塘當吳越孔道嵗修圮愈甚公捐俸及羡餘三千金築之勸富民宦室輸助曰義助免其役而助者曰役助質訟在官而輸者曰事助南自王江涇北至九里塘延袤七八十里皆新以巨石計費四萬餘金為邑永利功成而民不告勞公為治嚴而不苛其讞獄也請謁不行法加威富無所避小事則多縱舍或以至情告即色動嘗作情説以導民厚焉案牘見婦人名即開釋至者戒伍伯離丈餘於風化尤重表章節孝敦訪耆英細民有一善輒聞上臺旌之每月望後一日角巾至學宫與師生質疑考學以為常吳俗好賽五方神嵗必演劇月餘男女雜沓無賴子多乘之以導淫賈利公出見之杖其首投神像於太湖久之姦宄懾服盜賊亦逺竄屏迹捕役無以為餌乃引龍遊大盜潛入城劫徽商質庫計挫其威稜公夜半聞之立繫諸捕妻孥勒限三日全獲否則死果如期獲之嘉興驗質庫簿歸所失物在簿外者賞諸捕而宥之邑豪繆富以私憾銜張思德令大盜誣攀下郡獄陷以大辟思德家鳴寃富復行賄覬脫公請於按君親鞫之以計授所親某文學詗盜案於歙邑具得誣狀公乃責富輸二千金築塘當免死富不承遂斃之於獄時富賄山隂朱相國子太常某屬按君為解弛其獄既不行按君大恚欲疏劾之奪於公論乃已稅閹至杭州所過邑令長跪公不為屈索供億又不應隂集諸生往來垂虹亭若將噪而逐之者閹懲往年葛誠事望見色沮遂去然銜之不已未幾檄郡云金閶失上供幾萬計盜隨首某某劫某某窩凡五十三人皆吳江巨室公曰巨室邑所恃為命也彼計行邑空矣母雞引雛遇鸇猶鬭况為民父母乎乃謁郡守朱公燮元曰此詐耳某請以身當之遂攝衙胥及弓手得二三百人縛閹使訊之曰據而檄事已經年今始發何也且而閹時在徐州道上乃來吳耶閹使懼伏誣具論如律閹見爰書語塞卒無以加公之獮大猾折大姦不戁不竦古之所謂神君健吏不是過也在任五年治效異等擢南京兵科給事中纍官太僕寺少卿奢酋發難為川東贊畫被論鐫職後復原官論曰昔人稱吏道清慎勤而已吾邑賦重難蘇吏詭難剔非濟之以威明不可劉公發姦摘伏洞照若神錯節盤根恢乎遊刃故凡所興革至今利焉沈子勺先生瓚稱其明析秋毫力舉千鈞卓絶之才百年未有誠定論云同安葉公傳葉公翼雲字敬甫福建同安人舉崇禎庚辰進士授吳江知縣先是吳中旱蝗穀涌貴姦民聚衆攻剽脅富室傾囷給之名曰打米攝篆者不能禁撫軍黃公希憲誅其魁亂稍止逮明年春夏間餘風未殄公蒞任得其狀曰勸分荒政也脅之自下是訓亂也莫若操其權在上乃先下令富室減分平糶復委紳士之賢者稽户口管出納捐俸設糜以賑之密捕先年倡亂者悉置之法四境帖然辛巳繼以大旱蝗米石至四兩公齋宿露禱屛去輿蓋每日謁龍王祠去城約十里幅巾徒步往來行烈日中間數武一擊額民感其誠無思亂者及漕兑時調停米麥之輸食息水次輯和辨卒國賦足額而民不大疲南糧軍儲恤孤諸利向盡歸豪家按君祁公彪佳嘗疏陳其弊嚴禁之已而營丐者復熾公力請兩臺計畝均𣲖勒石杜爭通邑利焉白糧解户久為蠧藪厲民每名費及千金公條便宜上撫軍黃公具題易為官運復有議造船者公曰本欲安富是又困之也乃酌取助役銀以資運官殷户始釋重纍當是時流賊躪廬鳯金陵宛陵俱騷動邑處浙直之衝欲先事毖防費無從出適存空役銀六萬兩撫軍將移佐江防公爭之曰幕府所須當檄支各郡何獨括吳江請以本邑額外之征即留衛本邑議上得允由是蠲其半以蘇民半則用以修城陴團保甲練民兵人有固志其修城也舍胥徒而任里耆給實值而免賠纍故畚鍤易以竣工其團甲也委紳襟以聨其人民隨鄉城以察其姦慝故盜賊不至竊發其練兵也謂𨽻役仰食官府保户取資里閭乃因其類而什伍之教以技而臨閲之故無募兵之害與養兵之費而武備一時修飭甲申夏北都變聞不軌者洶洶思逞公以邑治孤懸四面環水舊設官兵四百名駐平望離城四十里而遙緩急不相應乃檄平望守備梅亮移屯城外為防禦計公又每夕微行密詗姦民聲息得梅居六吳盆九反謀狀立捕至屏人鞫之盡吐實又分捕同謀者併居六盆九共五人縊殺之陳尸于市一時無賴子弟皆股栗乃宥其餘黨諭使革心時鄰郡邑大盜飈發蜂起長吏莫敢誰何至新撫軍祁公行部始漸次撲滅獨吾邑晏然若不知有世變者公弭亂之力也公在任四年屢值災荒又加𣲖預徵公私交困公隨宜調劑應變有方鋤梗剔姦迅如發矢至其寬和愷悌一本詳慎而出之不厭煩璅不辭勞瘁不懾豪強催賦則每示停緩斷獄則務持平衡受言則兼採寒賤故能上下交信吏戢而民安之祁公薦三吳治行第一時𢎞光改元朝政稠濁僅例擢工部主事未抵部任內有逋賦為司計者所核士民相勸曰奈何以此纍賢父母乎爭先樂輸旬日而畢公里居數載閩事大壞乘陴守禦竟死于兵至今父老談及公吏事輒流涕云論曰余嘗與公對談樽俎蓋溫溫恭人也其清操惠政則循良有司也至其翦剃亂萌聲色不動則又督撫大臣之才也惜乎運遘陽九無以大展猷為猶得衣冠殉難以死公真無愧古名臣矣余友浦子近過公里知其胤子貧窶不能表章先人又閩疆死事時所諱述余恐其久而泯泯也為博詢事實撰次而傳之杜靜臺先生傳以下人物先生諱偉字道升少育于沈給諫仲子嘉謨家從其姓後乃歸宗先生幼而至性過人王母目矐以舌舐之竟復其明七嵗喪母每哀啼父為之感泣先生乃更破涕為歡父疑之隂察枕席皆斑斑淚痕也讀書沈氏孰中有神童稱嘉謨竒其穎悟廟見而子之弱嵗名籍甚試輒冠軍嘉靖壬子舉于鄉所制經義為世宗尚自王文恪四家而下即屈指及焉屢困公車篤志聖賢之學與唐公荆川順之唐公一菴樞許公敬菴孚逺耿公楚侗定向講明濓洛淵源其學以主靜為宗驗之行履動止皆有繩度海內從學者數百人江右羅文恭公洪先欽其名延之教子弟先生因與文恭靜坐石蓮洞天數月學益進嘗過鄱陽湖巨盜脅之以刃端坐不懾盜異之發其篋得刺曰此江南小聖人耶羅拜而去其名行為人所重如此先生銜沈氏恩思報稱時嘉謨子位成進士官翰林未幾死漕卒之難家政旁落先生白備兵使者蔡公國熙置佼奴于法為經紀其家家復振位從子琦珫珣少皆有穎質先生痛其失怙躬督課之卒皆成進士沈氏子姓至今歸義焉萬厯庚辰復上春官不第乃謁選得南陽府推官聽斷平允釋要囚十餘人唐藩左右不法者悉捕而麗之辟暇則引諸生與之談説經義行部開封汝寧有進例金者立却之署篆內鄉新野二邑課農桑行鄉約不事捶楚専務以德化民姧宄革心獄訟衰止考績為中州最應擢臺省當事欲為廋數年先生曰某豈欺君父以市美官者耶不可稍遷工部營繕司主事榷稅荆關荆故脂膏地先生為文矢江神不以一錢潤私槖盡弛商人法外徵瀕江沙市十里泥濘沒骭先生捐俸築石堰植以榆行旅便之及期稅課不及額遂引疾歸商民多卧轅下道軹不前所攜惟圖書數十卷而已舟中見兩木桶叱其家人曰此非荆州物耶立投之江會言者劾先生不赴部考核為非制下工部覆具言荆厰竹木自四川建昌諸路浮江而下而彼地連嵗用兵兼之採辦大木商賈少至以故稅額減于前實無贓私可摘請特免考核詔許之先生既歸鍵户養痾終日默坐竟至貧困不給以癸已十月卒年七十有一先生清操粹德一代儒宗生平惇篤踐履暗室不欺遊文恭諸公間絶不標榜道學以為名髙傳稱躬行君子庶幾無愧焉所著學聚録正學編靜坐訣尚書筆記四書筆記等行于世學者稱為靜臺先生論曰先朝自嘉靖季年講學之家多有陽宗伊洛隂襲竺乾者先生之主靜固理學正傳也厯宦所至皆有慈惠及人榷關清烈尤著孰謂儒者無益于用哉李臨川先生樂曰嘗見靜臺先生住京師崇國寺中朝暮靜坐每月朔望必書至聖先師孔子之位侍坐移時方課學業弟子問故先生曰可為求放心一助先生嘗顔其書齋云無求勝在三公上知足常如萬斛餘瑞安令周公傳公諱大章字章之沈雄慷慨饒文武大略嘉靖壬子舉應天鄉試癸丑下第歸值倭夷蹂躪轉略近地士民爭竄伏墟莽公獨奮曰此志士保鄉井建功名之會也去將安之乃糾合義勇數百人教練之襪首袴褶部署指揮儼然嚄唶老將也以邑城庳薄難守倡義增築與憲副沈公啓口山董其役不旬日畢工又以平望夾浦為南北要害地乃進議于邑令楊公芷設兵駐守日治戈船募驍鋭賊至則據險邀擊之時總制胡公宗憲建閫浙東公參贊幕府謀畫委督水師親冒矢石出沒波濤浩渺中屢勝之于青陽港錢田石湖唐家湖鶯脰湖太湖諸處首尾三年斬馘過當賊平督撫楊公總制胡公上其功次于朝授備兵使者職銜公以親老力辭乃官其子崇仁為蘇州衛正千户子孫世襲公屢上春官不第署餘姚教諭隆慶初授瑞安知縣縣瀕大海先中倭患最烈至是復大旱公航海禱於龍堂俄有甘霖之應又力請兩臺免徵加派織造銀民甚德焉瑞安地臨險阻公建議海安瑞安沙園三所合操躬臨訓練全郡倚為屏障竟卒於官年六十有三公工古文辭才筆雄健在瑞安有上趙撫軍便宜劄子正大剴切不減陸敬輿門下士成名者甚衆顧公大典吳公邦楨皆舉甲科識姚江邵公陛於司訓時期為偉器後果以詞林改御史按吳人服其鑑云所著有文藝集禦倭武略行於世論曰方倭患孔棘東南半壁動搖徵調幾半天下吾邑為浙直要衝非公勠力行間控扼南北兵禍未易弭也况身無封疆之責獨出死力以捍衛維桑其功顧不偉歟邑令楊侯贈言稱其才與誠合信夫贈尚寶少卿袁公傳公諱黃字坤儀曽祖皓祖祥父仁代有著述不仕仁更能詩書法趙松雪公少失怙苦學善屬文祖贅嘉善殳氏因補其邑諸生名藉藉起嵗大祲嘉善許令問消弭之䇿公引洪範五行及管輅邵雍語以對令異之遂闢書院令髙才生受經隆慶丁卯選貢入南雍舉庚午鄉試負笈者雲集指授文規往往得雋去萬厯丙戍始成進士時年五十三矣公學通古今談時務鑿鑿甫釋褐奉總憲劄與常熟宫坊趙公用賢其議清核蘇松錢糧公上賦役議一曰分賦役以免混𣲖二曰清加𣲖以絶影射三曰修實政以省兵餉四曰查𣲖剩以杜加賦五曰免協濟以恤窮民又清減額外加徵米銀十餘條豪猾以不便已率為浮言眩當事沮格不行識者歎焉戊子謁選得寶坻知縣邑賦畝二分有竒諸役編𣲖反倍之車運皇木役最疲公建議請乘漕艘未集由會通河運入而移皇木厰于三賢祠北使濱水受木且去京密邇取給便當事為奏之報可因盡革重夫重馬採石及箭手諸役省𣲖里甲銀兩正賦而外毫無擾焉內臣開厰督貢銀魚為民厲公上書閣臣謂魚自海抵邑又自邑抵京道紆鮮易敗請由海濱馳至京應上供閣臣允之自是中貴罕至者潞藩之國鄰邑率賦多金為公費水淺舟膠留頓則費逾廣公令囊沙壅下流水滿舟易達及舟將至則啓沙囊更壅其下不移日越境邑地窪下比嵗大潦公浚治三坌河築堤捍之海水時溢入為患令海岸多植栁髙數尺潮退沙遇栁輒淤漸成堤因于堤內治溝塍課耕種曠土大闢是時薊鎮主客兵不滿十二萬而年例銀及屯田民運諸項計且至一百五十萬撫軍以公曉暢邊事檄令酌議乃列十事以獻曰革養軍之虛費曰汰臺兵之冗員曰謹撫賞之機宜曰定市馬之良法曰復舊耕之額田曰廣山林之種植曰興險阻之水利曰增將領之供給曰置輕車之便利曰核器械之冒濫又兵備王令議防海事宜及軍民利病公各列八欵上之語皆石畫壬辰以大中丞蹇達薦特召為兵部職方司主事適倭躪朝鮮朝廷大舉東征甫到部經略薊遼宋應昌疏請贊畫軍前兼督朝鮮兵政冬月浮海渡鴨緑江調護諸將拊循三軍提督李如松大捷平壤部下多割死級報功公馳諭禁之如松不悅自引遼兵而東委守平壤不畀一卒清正兵來襲公遣麾下及朝鮮兵三千邀擊之于南山觀音洞殺數十人擒其將葉實如松驕而貪輕騎獨進經碧蹄館為倭所乘軍大衄退守開城據東征二士録大司馬石星意遂主欵應昌入沈惟敬之言支吾封貢公亦以將驕兵罷浪戰非䇿上書本兵言之未幾竟中拾遺疏劾為令時縱民逋賦革職歸田十餘年卒年七十有四天啓改元大冢宰趙公南星追敘東征功得贈尚寶司少卿生平著書甚富多散佚今惟兩行齋集厯法新書羣書備考梓行子儼天啓乙丑進士官髙要令卒公博學尚竒凡河圖洛書象緯律呂水利河渠韜鈐賦役屯田馬政以及太乙竒門六壬岐黃勾股堪輿星命之學莫不洞悉原委雅以經濟自負未第時嘗受兵法于終南山中劉隱士又嘗服黃冠獨行塞外者經年九邊形勝山川營堡厯厯能道之其贊理東征也訪求竒士得馮仲纓金相置幕下倭酋清正者故薩磨君之弟關白雖篡心畏之使嬖人行長將前軍而清正為後繼清正倍道取咸鏡趣鴨緑江時如松敗保開城而經略駐定州前後皆阻倭計無所出仲纓與相言于公曰清正輕行長而二于關白可撼而間也公乃遣入清正營説使釋所虜王子陪臣退兵決封貢清正果如命即日自王京解兵東歸據東征二士録先是公言嵗星厯尾尾為遼分野朝鮮屬焉今色不青而白此兵徵然朝鮮得嵗而倭伐之倭將有內變朝鮮必復國逮後倭撤兵歸關白死卒如其言云論曰公自言生平得力靜坐然其學流入禪玄好為三教合一之説其以兩行名集亦取老氏有無雙行之旨故與管公東溟深契而説書義解多與儒先抵牾然其砭訛發覆則俗學所未有也語云通天地人之謂儒公雖未為醇儒也獨不得謂之通儒乎李廓菴先生世達曰公初為張文忠公居正客文忠議正樂依古法造密室三重又依蔡氏多截管以候氣不應使公視之曰候氣之室宜擇間曠地今瓦礫叢積則地氣不至一不合也外室之牆宜入地三尺二重木室入地一尺六寸三重木室入地七寸六分今皆不然僅可固地上之氣不可固地中之氣二不合也室三重各啓門為門之位外之以子中之以午內復以子所以反覆而固氣也今皆以午三不合也聲氣之元寄之象數必有自然之理今所截衆管大小不倫四不合也天之午常偏于丙二分有半今日圭所測是也地之午常偏于午二分有半冬至候黃鍾之管宜埋壬子之中位一而已豈可多截管乎五不合也文忠如公言擇地天壇之南隅飛灰果應文忠欲屬公以正樂之事公請先正厯法語不合遂謝去公嘗受厯于長洲陳壤其法本回回厯以監法會通之更定律元糾正五緯最為詳密號厯法新書太僕卿吳公傳公諱默字言針資性沈敏少從孰師受章句時有問難孰師不能答長與兄之勇讀書講析經疑恆至達曙強學矯志文行嶄然嘗受學于王公龍溪稱髙第弟子壬午舉應天鄉試壬辰會試第一人闈義皆匠心獨造至今經生家稟為程式授兵部主事以艱歸已亥補禮部厯其曹癸卯遷尚寶司丞進少卿公立朝建議挺挺不撓時目為吳鐵漢嘉靖中大學士呂闕阿分宜意疏請考察京朝官罷黜大臣之賢者葛守禮等十五人科道李幼滋等三十八人而留用吳鵬許論趙文華董闕鄢懋卿楊順輩附勢作威沒諡文安公為祠祭郎議奪其諡事雖不行君子韙之漕撫李三才家在畿南不乏奧援本具縱橫權譎之才又好以苞苴筐篚結納士大夫公過淮三才有加禮公一見知非正類入朝即上書首斥其貪橫由是直聲震天下未幾謝病歸改通政司參議厯左通政乙卯進太僕寺卿公立朝最淺遷除皆不赴職然時論髙之每會推必首及云崇禎丁丑卒年八十有七公為人清剛守正不可干以私在禮曹日梁溪某公子餽以珍寶直千金求疏敘其父某官廕公謝曰彼當得廕具疏吾職也何賂為其人又固以請卒却之邑令劉公時俊吏治為三吳最以漕卒鼓噪為漕撫所劾杜門求罷公方官尚寶素知劉令賢為白于河南道御史御史出彈事示之公曰為百姓受過此令所以賢也復為訟言于朝大冢宰孫瑋竟用公議僅奪俸二月而已公家居同里劉令雅重其行義恆拿小舟從一奚童詣候問政事得失與邑中利弊公條悉以告由是劉令治日益有聲而公所欵留惟脫粟飯爛蒸一瓠劉令以是益重之邑有富室某坐殺人抵罪繫獄久矣劉令覆案已得寃狀語之曰若得吳公書來即釋汝某令其子具槖中金三千為夀公據實白劉令平反之而不名一錢也崇禎改元逆璫初敗其黨猶尸權霍維華舊令吳江素嚴事公者也言于衆曰吾將起吳公佐銓公聞之艴然曰霍若凂我必當逃之深山其疾惡如此晚年徙家郡城中丞直指監司守令之屬無日不造請其門凡民間疾苦吏事頗僻賦役之失當豪家之暴橫胥吏之作姧莫不具為當事者言之當事率奉行恐後吳中巨姓搖手相戒莫敢為非當是時縉紳若文公震孟姚公希孟徐公􅊈孝亷若張公世偉楊公廷樞輩皆以文章氣節主持清議公恆執其魁柄云自公殁後文姚張三公相繼云亡徐公楊公又皆殉節死而吳風靡靡鮮有激濁揚清振厲一時者矣論曰吳公嚴氣正性蓋李元禮范孟博一流人也元禮孟博橫罹鈎黨之禍而吳公優遊林泉以耄耋終亦云幸已公雖不附東林東林恆倚為崇墉淮撫之敗公抗章首攻之然東林諸公不能非也公既殁裔孫衰落不振邑人欲列祀賢祠直指周不果行嗚呼世之所謂賢祠曽何足重吳公即公亦豈待以賢祠重也哉贈指揮同知趙公傳公諱廕字任卿中丞士諤從子以武舉為金山營把總被劾革職崇禎九年流賊東寇大躪安廬撫軍張公國維檄為守備屯太湖縣十年二月賊來犯公提兵禦之至雞飛灘遇賊三百餘騎擊却之追奔抵通湖賊以百騎來山前挑戰公據山為營遣千總楊國鎮等以鋭卒二百赴之射殺賊渠數人而賊潛從山後以千騎襲公營公力拒之手刃十餘賊以衆寡不敵被執脅降不屈遂遇害自賊犯南畿潁夀六安霍山諸州縣多被禍撫軍雖督兵在行間聞金鼓輒色戰諸將士猝遇賊率首鼠竄無敢發一矢相向者公獨驅馳赴難摧鋒摶賊身被數創以死其麾下李池等亦皆格鬭死事聞贈指揮同知子孫世襲總旗安慶人為立祠堂祀焉史弱翁玄曰任卿少孤貧家世業儒獨好武為童子時戲取村中羊學騎自試削白竹為弩矢射籬邊雀嘗為笑樂州里咸謂之癡及年過四十仗節死義聞者莫不壯之贈翰林院待詔孝介朱公傳公諱陛宣字德升父燾自同里徙郡城遂為吳縣諸生萬厯壬子舉于鄉時父年已髙公闔門奉養絶迹州府嘗言士君子當以不貪為寶能安貧則能不貪甘食美服髙閣邃宇孌童豔姬皆敗檢隳名之具所謂誘人之穽也故登賢書二十年未嘗以竿牘通守令家益貧布衣糲食泊如也惟奉親則滫􅔱裘葛無不贍具侍養庭闈終身不見疾言遽色母季氏先亡父益老病幾殆公晝夜侍寢辦護湯劑唾壺虎子之屬必手承而進之戊辰當上春官以父疾不赴居二親喪不入內不茹葷者六年竟以哀毁成疾而卒年五十有六公先與忠介周公順昌同業後又同舉氣誼甚篤皆以倫紀為已任天啓時魏璫煽虐緹騎逮忠介親朋皆走匿獨公經紀其家事又周旋檻車追送之人服其義焉大中丞張公國維歎為真孝亷以銀幣榜額命長吳二邑令往旌之公竟不上謁也沒後宮詹姚公希孟采邦人之議私諡之曰孝介先生崇禎丁丑按君祁公彪佳以公與同邑張公基崑山歸公子慕三人行義同表于朝詔俱贈翰林院待詔蓋異數云公門下士多通顯以文章命世其最著者文靖徐公􅊈卒殉國難稱名臣子鎰少有雋才亂後卒論曰孝介與異度張公同里閈同鄉舉名行亦復相次吳人所稱二孝亷也張公清流嚆矢文藻斐然而淳心質行則孝介為不可及矣莊母沈孺人傳余內戚計浣翁自苕中回手其徒莊雷敕所撰母孺人行狀請為傳余以病未之許雷敕又以長箋來請益力誼不克辭謹按狀孺人姓沈氏沈為烏程世家刑科給事中諱士茂之女也孺人生而孤其生母呂以斷鼻矢節孺人少􅈺母訓年十八歸同邑太學生莊之琳為繼室莊亦望族之琳父諱日宣舉萬厯甲午鄉試厯官廣西按察司副使按副以亷吏稱於時太學性又好施豫輕財重禮義以故家日削孺人時捐奩資去膏澤以給髙堂甘旨姻黨稱其賢及連居舅姑之戚哀毁備至甫終喪而太學疾不起孺人稱未亡人年止二十二雷敕方二嵗耳孺人內撫嬛孤外持門户贍生則辛勤絍織卜兆則匍匐瘞埋即衛共薑陶嬰母之苦節不是過也提藐孤而育之訓之丙夜篝燈督以誦讀覬望成立血淚幾枯即歐陽太夫人之嚴教不是過也捋荼蓄租恩勤鬻閔者二十餘年逮雷敕授室始能課生徒養母姻黨方為孺人慶謂可食報於子而孺人遽謝世得年僅周甲子雷敕於讀禮之餘潛心力學至服闋試秀水邑文衡拔取前茅果如孺人所望惜乎未及見也然貞操淑行不愧姬薑可持此以下報太學君於九原矣憶當潯溪寇發時里人咸奔竄孺人獨守孤閉門曰難作即死此耳去將安之卒獲免嗚呼吾以此歎孺人之貞而且達也易之訟曰復即命詩之羔裘曰舍命不渝而大無信也不知命也則螮蝀刺之人事夷險莫不有命焉主於冥冥紛紜避趨徒亂人意唐林唐尊之仕王莾華歆之仕曹丕褚淵沈約之仕齊梁皆失於不知命徒為人詬厲即吾所見戈船搶攘中婦女之以奔亡而召辱者多矣用是知孺人之守户也其履正也能全身也不謂之知命可乎余是以賢而著之愚菴小集卷十五
