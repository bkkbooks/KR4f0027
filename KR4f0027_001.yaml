body:
  text: 愚菴小集卷一吳江朱鶴齡撰賦廣志賦繄我生之耿介兮勵修名而不頗搴瑶華以抗節兮耨仁義為菑畬遊墳典以漁獵兮懼或中乎虞羅戢形影於蝸廬兮循繩墨以貞度彼詭行之昌披兮余不敢以改步憂歲月之逾邁兮追姱修於古路何流俗之險詖兮好與惡之迷方珍魚目以什襲兮謂明月其不光縶威鳯以在笯兮驅罷駑使服襄嘈瓦釡以聒聽兮毁鐘鏞而弗鍧巧占風於要路兮工樹栅於康莊羣聽聽以嘷吠兮索蘭佩而􅀈儜簸秕穅以眯目兮轉糞壤而自芳誠嫭妬之難竝兮疇捷徑而能良蹇余情之信練兮秉昭質而難易屑越桂以為糧兮編胡繩以為席被荰若之清芬兮茹玉英之膏液塊獨寶此幽貞兮匪是時之攸識惜曜靈之不居兮老將至而為客菊英墜於中庭兮奄離披而獨立彼獨立其何傷兮哀衆芳之蕪沒意緯㦎而不制兮神惝恍而難持愁沈沈而芚結兮步踽踽而躨跜懷紆鬱而無語兮思繁亂以長咨迷𡵨路而無所適兮索瓊茅以占之將逺遊而散慮兮得吉繇宙於庖羲洵區中之逼仄兮利攸往乎八荒簡元辰而奮翼兮載雲旗以髙翔駕蒼虬之婉婉兮鳴玉鸞之將將風伯儼其翼衛兮馮夷導夫津梁朝發軔於三危兮夕緤馬於扶木濯余足於天池兮晞余髮於暘谷恨鼇極之不正兮就朱陽之赫曦弔帝子於蒼梧兮遭炎歊而去之將問塗於崑崘兮凌弱水而徑度畏北極之層氷兮謝𤣥冥之我遻忤羌弭節於地首兮廕木禾之扶疏循芝田以縱轡兮過瑶圃而回車憎王母之白首戴勝而穴處兮嗤穆滿之騁驊驑騄耳於長衢乘靈風以來往兮睨下土而心惻紛總總其腥穢兮類青蠅之集棘鬱余懷其未申兮望清都而伏謁瞻絳節之繁㑹兮聽天鈞之將闋叫帝閽而不聞兮邈天皇之難覿向左𤣥以陳詞兮剖沈疑於宿昔何履仁而凋年何肆暴而終令何坎壈每集於翹材何豐隆多享於破鏡牛哀之化虎兮磨牙殞其兄命虬精之化人兮厥勳烈於南郡何流變之殊形兮理參差而莫定虞忠漢而暴烈日兮終不逢夫雨師萇叛苻而絶汲道兮竟滂沱而相之何順逆之較然兮乃倒應而錯施桂必伐而膏必煎兮盍併絶乎斯類也菉葹榮而枳棘茂兮余不忍見此態也莊畏犧而賈忌鵩兮固前哲之所喟也彼維皇之降監兮宜祐善而殄淫苟回惑其若兹兮信天道之難諶左𤣥曰吁汝言大愚品物遷流幹於太虛浼浼墨墨實為洪爐道混成而條别兮任萬肇之榮枯譬春葩之著樹兮隨風舉而辭株或下沈於糞溷兮或飛墜於金鋪總一氣之搏捖兮誰斟酌以差殊是故否兮不可豫泰兮不可期榮兮不可據辱兮不可辭福兮不可覬禍兮不可窺子亦訪塞翁之倚伏師老氏之守雌何事懷褊心之憤悶長伊鬱而不怡承嘉告以廓落兮釋端憂之蹇産溯大鈞之陶物兮非薰蕕之必辨審性命之靡求兮悟悔尤之雙遣苟精誠之必通兮雖聖哲其可勉能鏟跡而含和兮登道崖其未晚修初服以悅康兮奚倣徨而適逺辭閶闔之迢遙兮整飈馭乎吾將反臨舊丘之菴藹兮遵夷塗以游衍歸班生之故廬兮息揚子之𤣥亭眷天路之縹眇兮神迭蕩而未寧葺詩書之靚圃兮踐蕙若之芳庭永端居以攝志兮棲寂寞而存真曠𤣥覽於大道兮樂自然以無營庶靈根之內保兮絶情纍於塵纓徐介白曰出入幽通思𤣥之間而稍變其機杼時出新意愴恍倣徨此亦楚騷之苗裔也遊靈巖山賦鬱西山之崩奔萃扶輿之清淑鞏吳㑹以作標翼帝圖而建福秦餘飛動以崔嵬鄧尉蜿蜒而起伏天平擁􅍶崒之竒穹窿擅曲紆之目玉遮之橫列如屏龍塢之踞湖孑矗是皆迥福地於人寰錫嘉名於仙籙未若靈巖之奧區為神秀之所族也爰自浮玉俶基天目分隴元氣所扶冲融澒洞苞巒孕巘控越奠吳俯臨巨浸上薄清都斡地軸之綱維藴物華之明俊睨兒列之羣峰卓靈標之千仞開丹嶂於烟霄挂青霓於風磴軋遊氛以上千變萬象於朝暝勢延亘以貢竒氣孤清而含潤爾其戴闕詭狀非一或偃如獸蹲或森如人立或奮如濤奔或齴如斧剨張勢競形空翠滴歷彌天之雲觸焉斯出又有琪枝䝉密灌木森沈葉舒帷以聚碧花散錦以成茵蔚春榮之的皪敷夏彩之繽紛囀深林之綺翼戲曲沼之文鱗激松杉之逸籟飛澗瀑之清音其右則重湖浩渺驚濤震蕩水豹狂呼靈胥賈壯估舶分風漁舠出浪抗洞庭之雙峰砥百川而作障挹朝爽於西來招靈威以極望其左則原田每每溝塍綺織近畛遙阡萊蕪大闢嵌竇通流桔橰引澤休文之菑耜可陳沈約賦陳東菑之故耜元亮之耘杖堪植其陽則㕓通九陌市走三衢儲胥廣衍瓌貨敷腴士女填溢以敖以娛其隂則林臯轉幽竹苞松茂曲渚平緒分枝阜環凑謝墅庾村逸人逺就洵地脉之儲精而土膏之發秀也若夫山開晉代寺建梁年招提爍日寶剎凌烟嶤閣竦乎霒靉香臺鎮乎㠝岏岧亭因岩而構址露井即𡼏以疏泉虹梁披離以切漢月榭杳窕以干天曲檻周遭以綿亘鳴鈴窸窣以髙懸幡幢敻繹而四竪金碧晃耀以相鮮於是䇿振興公孫綽賦振金策之鈴鈴經翻謝客謝靈運在廬山有翻經臺開士駢肩淨侣叠跡建曼陀之蓮臺展靈鷲之法席合能秀之宗風融支許之辨析殷隱法鼓之轟闐鏗晨鐘之叩擊宣三乘之奧窔釋五惑之煩戚蓋自智積之西臻㑹角黍以千百洎天監之示圗徴象教於廊壁雖名標志林事紀僧冊未及今之齊大化於吳㑹普神光於緇白也爾乃循岫曲歷松門撫陳蹟按舊聞求洞穴踐􅩯村硯池誰為㸃筆石鼓何以徴兵訪館娃之故址弔響屧之幽魂悲琴臺之寂寂濯香水之泠泠慨屬鏤之既賜俄宫闕之成荆實夫差之自燼豈越甲之能鳴嗟乎噫哉方吳之盛香徑鋪棻璚臺對整花明桂寢之玉人月照梧宫之金井迄今惟朝霞之絳氣橫空夕燒之荒烟接嶺彼甲楯雄圗甬東霸骨俱巳蕩滅而銷沈而况乎舞袖之綺羅與粧臺之紅粉覽興亡之一瞬悟生死之同規物無新而不故人疇寄而不歸譬石火之飈飛如薤露之朝晞知榮名之難寶信逆旅之非欺曷若依紺宇以息鉗廕祇園以屏僞探六度以觀生冥三幡以發智飯香積而世味蠲遊化城而害馬去巡兹山以陟降兮淡余慮之紛營溯髙深於亭毒兮等今古於埃塵悵沈憂之促算兮希閴靜以延齡願稅駕於東林兮武宗雷之髙躅仰佛日於靚墟兮皈化人於靈谷庶遊䝉之可謝兮登薄躬於沕穆潘江如曰具體天台更加妍整五色迭宣八音繁㑹使人怡賞不給宮人入道賦夫何女冠之婀娜兮被羽服而體輕夙承恩以入御兮侍更衣於掖庭忽離垢而遐舉兮豈徒怨夫深宫永漏之凄清粵自吳燕焚巢楚猿亡樹鏡埋仁壽之庭弓倚未央之柱攀烏號而莫逮山陵泣湘浦而長辭月御悟物理之無常榮悲韶顔之難久駐羞同戚姬侍兒更作扶風之婦願隨王母使者時陪戴勝之旁於是離椒寢即雲房捐珠珮理霞裝謝昭陽之隊遊紫府之鄉屏長門之扇簟裁羽客之衣裳洗鉛華之膩粉爇太極之神香爾乃金闕玉臺神棲三島璚枝琪草景躡十洲藥圃之芝英不落仙巖之桂葉長留乳煉金壺餐紫霞而內照丹調石髓咽𤣥液以冥搜若夫朝瞻羣帝夕禮上真碧落磬敲縹眇珠函之字𤣥壇鼓動琳琅玉檢之文絳節霓旌髣佛朝元啓醮龍車鳳吹依稀太乙祠神羽帔却忘垂手舞法歌惟按步虛聲爰有八洞靈妃九天𤣥女時來往於空虛每殷勤而延佇許飛瓊要世外之逢迎蕚緑華結雲中之伴侣鶴飛緱嶺聽子晉之瑶笙霞散幔亭㑹神君之法鼓寧復憶夫青蛾永巷之悲紈扇秋風之怨御溝流一葉之詞弱線結重生之願行隨玉輦曲翻紅藥之欄帚奉金門愁滿菱花之靣也哉遂歌曰誰信瑶臺别有春焚香時拜魏夫人欲將蓬島三生夢掃盡滄桑萬古塵又歌曰燈照九微天宇濶雲開三素日華鮮蜀王巳化啼鵑魄豈得蛾睂戀翠鈿徐昭法曰悱惻之音歸于正則貌悴而神不傷秋閨賦維四序之平分兮凛素秋之凄景誰駘蕩而不悲兮矧空閨之孤冷若夫月行白道霜下青腰授衣氣冽落木天髙斑騅未返芳草俄雕玉露彌空溼前除於永漏金波斜照逗疏幌於清宵雲送千山之皓素水興七澤之波濤燕去空梁展魚箋而不樂鴻來北渚撫玉枕而無憀於時摵葉鳴梢哀蟬去翳看羅帶之漸長覺瘦腰之轉細茱萸幔裏風撩燕尾之髾玉鏡臺前光冷鳯頭之髻芳辰謝兮倚寶瑟而誰彈沈思增兮對金樽而掩涕綦履遙兮惜蛩砌之苔生房櫳寂兮嘆蛛絲之網綴所以霏霏銀漢難傳錦字之情皛皛玉鈎不斷髙樓之思爾乃京洛之英鄒魯之子景漢伯隨師七州葛稚川負笈千里絳帳未歸金風忽起能不目睇桂枝魂牽槐市又有商軺逺道估舶河梁載離寒暑幾隔星霜上水之篙時㳂百丈鏤金之碗誰與雙行河鼓星槎愁結三洲之曲洞庭木葉夢回七寶之牀乃若代北沙昏榆中候晚出紫塞以遐征佇青驄而不反寒催刀尺憶襻袴之短長望阻帛書昧關山之近逺羅幃悄悄占華蕚於銀缸虬箭沈沈冷麝熏於玉簟以至棄婦長辭故雄永去離鸞之曲孤彈别鶴之悲莫訴空庭銷蕙草之芳夜織斷鴛機之素秋風厲兮團扇捐秋月清兮流螢度秋聲凛兮羅䄂單秋氣肅兮鉛華暮當斯時也莫不愁黯黯而難勝淚浪浪而欲注夫候偏驚於徂謝感獨切於變衰壯夫為之砭骨騷客以是興悲登山兮傷白道臨水兮慚青溪逺行兮悼羇旅送歸兮悵别離彼四端之窈矯皆千古所欷歔曾未若中輕寒於玉膚引凉颸於繡闥驚一葉於空闈感雙星於令節結永戀於征輪寄微情於皓月窮時變之蕭森萃人生之騷屑抽思緯之纒綿殫情條之飛越乃為亂曰繄大化之回斡兮獨春蠢而秋愁非金商之肅殺兮豈知冶日之和柔彼佳人之冷艷兮固難遣樓頭之蟾兔與林下之颼飀誠物感之自然兮吾獨何恨乎蓐收金孝章曰遒文壯節抑揚哀怨在明逺文通之間苦雨賦維青陽之應候兮抽英㽔於園林將娛目以步屧兮悵沈雨之滯淫谷風扇而轉緊兮膚寸興於髙岑俄重雲其四合兮靄八表而成霖於是階涌伏泉庭深積潦羲馭潛暉號屏先道柱礎滑而不前櫩澑滴而難了行路斷其輪蹄房櫳迷其昏曉爾乃欲絶復續自朔及旬晦冥連乎八極泱漭塞乎四溟疑漏天之在近嗟墨霧之無垠豈銀河之欲倒抑地軸之將傾何天綱之蕩潏絶愍念乎斯人曾不顧郊㕓之價涌於玉粒而曲突之烟沈於桂薪於斯時也嘉木吐花鮮枝擢翠都尉之棗垂條司空之楊拂地但見雨足纒綿雲根霮䨴日方閃兮更沈沈霧欲披兮還靉靉朱蕚匪陽而不舒絳英負靄而多墜庾園之濕羽難飛陶徑之水衣徒漬小山文士攀芳樹而無從楚澤放臣采幽蘭而莫寄誰不愁后土之不乾望層隂而增喟僕本恨人索居騷屑目黯黯以不開中悒悒以芚結阻城闕兮迢迢周泥淖兮活活對朝雲兮􅟎􅟎瞻暮曖兮惙惙炳燭照兮堂中添漏痕兮檐未陳書策兮無憀遣朋尊兮不悅安得誅飛廉屏豐隆絶雲氣見夕虹散靉靆收溟濛升赫曦於扶木鞭火龍於天東普昭融於萬象回陽曜於三舂也耶汪苕文曰凄若繁絃爛如錯繡既具賦心兼饒賦材當今誰是敵手枯橘賦猗嘉樹之葳㽔兮實挺生於南國維騷人之頌厥美兮秉不遷之貞德奄枝幹之離披兮抗園林而無色哀靈木之變衰兮撫枯株而太息爾其始也連彩璇星植根瑶圃隂成緑葉含耿介以凌霜蕚吐素華散棻芳而入戶佳人以是盤桓翠羽于焉翔舞逮夫清霜變律白露零庭實垂金而攢布蒂連理以宗生本自瀟湘薦彤廷而包隨錫貢非因羽翼登玉案而果以珍名紫梨方其津潤柘漿失其甘馨所以樹重江陵每置官而呈瑞功標本草恆蠲疾以析酲者也無何氣改窮隂衰催急節幹背日而凋傷條隨風而騷屑漢上苑之玉樹既失青葱楚三閭之木蘭俄成萎絶晨曦照耀欲雕飾以無能暮雨低垂訝芳菲之頓輟嗚呼半死嗟桐先伐嘆桂昔曰婆娑今朝憔悴薌林改色誰看蜜葉之垂隂嘉䕃無存共惜修柯之委地曾不若櫨梨澀口猶自遂其敷榮椒榝含辛反得矜其生意觀物理之雕換兮固有盛而必衰誰芳根之久植兮誰􅀢露之長滋懼徙北而化枳兮寧就槁而不辭彼人事之遷流兮紛菀枯其若斯任大鈞之回互兮何必泫然於攀枝顧茂倫曰本橘頌之意而衍之不徒作榮枯之感綺合星稠特其餘技白鳬賦方塘浪暖枉渚波清何來素羽蕩漾身輕隨流泛泛矯翼星星脛短而常依弱藻觜丹而能自呼名時臨波而顧影恣游泳於沙汀友白鷺兮抃舞對皓鶴兮低鳴非稻粱之可豢豈縧鏇之能驚其浴浦也似鷗羣之戲廣浮深而浩蕩於波濤也其宿渚也似雁族之顧儔命侣而行列於葦蕭也其飛旋也又似文練之搖揚太空而㸃破乎青霄也若乃浪花朝起映旭日以開翎江烟夕霏負清風而竦翼乍臨緑岸以依人忽入叢蘆而難覓淡容與其翩翻雖卑飛而自得至若飲湍流啄藻荇唼嚼蘋花㳂洄木梗不爭肥於粒食不受緤於軒屏恆宛頸以相呼狎風波而無警此又智於鷦鷯之處身而安於鷲鶚之屈猛者也嗟人世之局促兮歎吾生之艱虞何此鳥之容裔兮炯飛鳴其自如循瀨涯以盤桓兮羡美羽之遊娛願相從夫漁父兮長適性於江湖計甫草曰清藻斐然興寄絶逺如此作方可當體物瀏亮之目誅蚊賦令届朱明曰行赤道永晝炎蒸清宵膚撓汙槃㸃案既惡青蠅布翼逞鋒尤愁白鳥蚊一名白鳥厥種維何藝生濕庳鷏母吐於嶺南鷏音田此鳥呌則吐蚊見嶺表録異黍民蕃於河內河內有人見人馬如黍米往來燒之皆蚊見古今注既秦楚之殊名秦謂之蚋楚謂之蚊實羽羣之醜類厥狀維何眇小莫儔利觜有針芒之刺狹翅為暗室之遊非處禈之蚤蝨類撼樹之蜉蝣蟭螟巢而不覺東海有蟭螟巢於蚊睫見晏子雲臺峻而妄投雲臺之髙蚊蚋適以翾翾見鶡冠子其始進也背明向晦來若有求去如失意伺隙乘疏翩翾鼓翅豈負山之足嗤蚊負山見荀子徒銛喙之是肆其引類也翕習相偕彌空布濩合響轟豗既薨薨而結陳亦殷殷以成雷候崦嵫之既暝遂虐螫而為災若夫乘集南皮樽飛北海娛賓之賦方成揮麈之談欲罷忽中􅯟以互驚交箑蒲其敢怠縱作力以驅除反沓來而增倍至乃晝困炎歊宵思美睡車囊之熠耀甫息書帷莊蝶之栩蘧俄親夢寐竦芒刺以交加頻抑搔而不置華胥失其嬉遊姬旦何由髣佛此尤文士為讐蕭齊莫避者也相爾纎觜空利如錐洞房垂其綃帳繡闥蔽其羅帷遂回翔而莫入雖含毒以安施惟是赤肌之賤客與露體之孤羈肆吞噬以無厭嬲音攪稽康書嬲之不置通夕而不離其饑也載翩其飛其飽也有殷么閒切其腹但求吮血與噆膚寧顧意盈而禍速墜銀燈兮不知觸絲網兮相續又况秋風掃之於林端霜氣沈之於水曲奄忽無存檐宇斯肅窮子安其晏眠髙齊適其牀蓐然後嘆爾曹之孳生特害氣所亭毒既金行其廓清曷不永殄乎斯族吳𢎞人曰工為形似之言詞旨警切勝歐陽憎蒼蠅賦冥異賦事具尤悔菴所撰汪金女小傳夙皈心于度門兮維大士為得牛車時現身而變相兮信佛種之非賒覽傳記之靈異兮奚啻竹葦與蓬麻歎汪女之篤生兮墮地而如從佛口也妙莊嚴之色相兮僉曰瑶華之不偶也時白衣之分身兮化道媼而來誘也繄沙竭羅龍王之有女兮八歲而知慧利根一切能持受也洎寶珠之上佛兮坐道場于南方無垢也維龍王之燀赫維龍女之嬋媛咸深入于禪定羣列侍于普門獨玉瓶之誤碎䝉譴謫而託塵根歷六年而居濁世瘍七日而歸泰元昭媼言之不爽顯夢兆之同涉洹洵牟尼之貯清水不久翳于塵凡彼夫蕚緑華之降羊權杜蘭香之偶張碩海山多纍于幻緣兜率自超于火宅嗟颷馭之早迎兮背髙堂之太迫人誰能以忘情兮沿萬里之黃檗昔金瓠之十九旬而夭折兮子建尚著之哀詞矧半紀之降生兮跡靈異其若斯知寄歸之一理兮悟冥顯之同規抒蕪辭以警上慢兮庶覺路其可追愚菴小集卷一
