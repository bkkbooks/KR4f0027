body:
  text: 愚菴小集目録别集類六國朝卷一賦卷二五言古詩卷三七言古詩卷四五言律詩五言排律卷五七言律詩卷六五言絶句七言絶句卷七序一卷八序二卷九記卷十書卷十一論卷十二辨卷十三雜著一卷十四雜著二卷十五傳附録臣等謹案愚菴小集十五卷國朝朱鶴齡撰鶴齡所著尚書埤傳諸書俱别著録此集乃所著詩文凡賦一卷諸體詩五卷雜文九卷末附傳家質言十三則鶴齡始專力於詞賦自顧炎武勗以本原之學乃研思經義於漢唐注疏皆能爬梳抉摘獨出心裁故所為文章悉能典雅醇實不墮剽竊摩擬之習其邶鄘衛三國禹貢三江震澤太湖嶓冢漢源諸辨多有禆於考證生平嘗箋注杜甫李義山詩其作韻語頗出入二家之間而寄興清逺亦復自饒神趣至其與錢謙益同郡方謙益箋注杜詩時嘗館於其家乃集中無一語推重之所作書元裕之集後一篇稱裕之舉金進士歷官左司員外郎及金亡不仕隱居秀容詩文無一語指斥者裕之於元既足踐其土口茹其毛即無詬詈之理非獨免咎亦誼所當然乃今之訕辭詆語曾不少避若欲掩其失身之事以誑國人者非徒悖也其愚亦甚云云其言蓋隱刺謙益而發尤可謂能知大義者矣乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
