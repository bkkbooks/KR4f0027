body:
  text: 愚菴小集卷七吳江朱鶴齡撰序一毛詩通義序詩之為道以依永而宣苑結以微辭而託諷諭此非可以章句訓詁求也章句訓詁之不足以言詩為性情不存焉然而古人專家之學代有師承又非可鑿空而為之說漢唐以來詩家悉宗小序鄭夾漈始著辨妄朱紫陽從之掊擊不遺餘力集傳行而詩序幾與趙賔之易張霸之書同廢雖然烏可廢也古人之書卷末多繫以序孔安國遷古文書序於各篇之首王弼遷易彖象爻辭于各卦之中毛公取詩序移置詩首亦猶是也序之出于孔子子夏出于國史與出于毛公衛宏雖無可考然自成周至春秋數百年間陳之太師肄之樂工教之國子其說必有所自來大約首句為詩根柢以下則推而衍之推衍者間出于漢儒首句則最古不易觀于六亡詩之序止系以一言則後序多漢儒所益明矣觀于毛公之傳宛丘不同于序說則首句非毛公所為亦明矣序之文既最古毛傳復稱簡略無所發明鄭康成以三禮之學箋詩或牽經以配序或泥序以傳經或贅詞曲說以增乎經與序所未有支離膠固舉詩人言前之指言外之意而盡汨亂之孔仲逹疏義又依回兩家無以辨其得失則夫紫陽集傳之出大掃䝉翳而與以廓清此亦勢有必至也雖然毛鄭可黜而序不可黜黜序則無以為說詩之根柢不得不循文揣義斷以臆解較之漢唐諸儒雖明簡近情而詩人之微文奧㫖已不可復識此何異寫生者取雲孫之謦咳形容而追貌其祖先之面目又何異聽訟者去當時之契劵證驗而冥决以後代之爰書求其不爽必無幸矣吾所謂鑿空之說不可以言詩者此也雖然序果一一可信乎曰國風三頌舍序其無詩矣惟是楚茨信南山至采菽隰桑諸詩皆正雅也而序以為刺幽衛武之抑幽王世詩也而序以為刺厲凡若此類實難免于學者之疑吾以謂有不足疑者孔子時去周公將五百年太史掌記未亡矇瞍律吕未失賢人君子弦誦未絶也雅頌猶殘闕失次反魯始克正之况經戰國之雲擾秦政之燔滅楚漢之龍戰虎鬬能保無簡編之淆亂者哉書藏魯壁猶亡佚居半三百篇特存于小儒曲學占畢諷誦之流傳何獨能一無訛舛孔刪如故哉吾則以楚茨諸篇定屬錯簡序已非當時之舊此又深有賴于紫陽之是正者也語云冡尺雖斷可定鍾律序為詩之冡尺也尚矣一汨于康成之膠滯再汨於紫陽之斥排將聖人所謂主文譎諫厚人倫美教化以至於動天地感鬼神者其終晦昧湮沒而不可求已乎余不敏竊主古義而參諸家于序之不可易而可信者為疏明之其抵牾不可信者則詳辨之要以審定可否綜核異同使積蔽羣疑渙若氷釋庶通經之一助云爾抑觀東萊詩記所載朱氏云云皆奉古序為金科黃東發引晦菴新說亦多從序然則廢序言詩特過信夾漈之故初非紫陽本指乎吾不敢以紫陽之詩有殊于孔氏之詩又不敢以孔氏之詩而格夫紫陽之詩也故參伍羣說以折其𠂻焉世之學者其毋以余為輸攻紫陽斯可矣姚文初曰小序亦有難通處吕成公尊信太過朱子所以辭而闢之必如長孺之論方為無弊禹貢長箋序神禹功高百王維夫子之稱之者曰盡力乎溝洫而子輿氏則云莫不善于貢夫所云不善者必其後世子孫奉行之失所云盡力溝洫則任土作貢是也考禹制貢之法兼行井牧實可治千萬世而無弊今夫天下之大患孰有過于漕渠咀咽閭殫為河疏濬塞但成空談者乎又孰有過于中原土曠彌望蒿萊竭東南一隅以養西北者乎又孰有過于小民骨折髓枯梯航萬里而司農輒告匱者乎又孰有過于賦役無準吏緣為姦額日廣而蠧日叢者乎凡此皆禹經畫所及一一深憂熟計於千載之上者也今觀禹貢一書甸服有粟米之輸則貢篚不及也八州之賦止以供五服諸侯之租稅而天子不煩挽漕也土貢雖及八州五服諸侯即以所賦易之民不滋擾也甸法通於天下軍政藏焉養兵無絲粒費也灌溉廣而樹藝勤高者雍梁卑者揚兖不聞土滿人滿之患也舉後世之曰積貯曰屯營曰進奉曰和買曰勸借曰封樁曰瓊林大盈之類聖人無不以身為之救而以法為之維嗚呼此禹之所以功高百王者乎或者謂洚洞既平九州繁阜即賔貢玉食惟王不㑹亦何害焉是不然禹蓋以一人勞天下非以天下奉一人者也荆揚財賦擅天下大半夫豈不逆知而其著之書曰土塗泥也田下下也土貢必謹志所産遷其地而弗為良也九等之賦有錯出以寬之不罄地之毛也使後之人讀之而喟然曰以彼其躬平洚洞如此利盡九州如此猶且恐恐然嗛嗛然甘監門臣虜之養而不恤者何為也庶幾賔貢玉食不至為徵山賦海者之所藉口乎此吾所謂後世末流之弊無不以身救之而以法維之者也或者又謂堯之為君也茅茨土簋敝履鹿裘朴略焉而已及至禹而海錯橘柚有貢金銀有貢珠璣玉石有貢不幾為漢唐之誅酎金遞荔支者觴濫乎是又不然夫風㑹日趨于奢而過損必激為汰宋孝武見高祖牀頭土障壁上葛燈籠麻繩拂笑曰田舍翁得此亦過矣後世人主安知不笑茅茨土簋敝履鹿裘為陶唐一田舍翁哉是故雕璣玩好吾不禁人主之所欲而但著為則焉使之不責有於所無不悉索以為富如是已爾若夫世變日新無藝之征叠加而未已斯固聖人之所深憂熟計而無可如何者也非其法之止可治一時不可以治千萬世也古今諸儒注此篇者不下二十家互有異同舛錯不少余甲申歲讀書金陵瓦官寺竊網羅諸說㑹稡一編謂厥賦貞當是下下之轉東迤北㑹于滙當是為滙之訛間以質之閩漳何𤣥子先生先生躍然印可時先生方著春秋比事屬詞未及尚書遂命余卒成之藏庋敝篋已踰二紀頃乘暇日重加釐訂賦稅河渠自神禹至今三千餘年之利害得失約略如指掌以至山川都㑹地理水利之屬凡經文所有者無不博考而詳辨焉斯固經國之先資救時之良砭也百世而下苟能師神禹之意而用之斯民其有瘳乎尚書埤傳序六經之學非訓詁不明然有訓詁不能無異同有異同不能無踳駮他經皆然尚書為甚蓋尚書者帝王之心法治法所總而萃也後世大典章大政事儒者朝堂集議多引尚書之文為斷據義解一訛貽害非鮮如誤解用牲于郊牛二而世遂有主合祭天地及南郊北郊之說者矣誤解九族與罪人以族遂有旁及母族妻族而坐之者矣誤解桐宫居憂復子明辟而世遂以放君負扆真為伊周之事矣誤解金作贖刑始以黃金易黃鐵矣誤解臣妾逋逃始以婦女從軍矣誤以洪範五行牽合庶徵福極而介甫反之遂謂天變不足畏矣誤以弗辟為致辟居東為東征而公孫碩膚之美不白矣誤解弱水在條支崑崙即河源及書序成王伐東夷而漢武之窮兵西北隋唐之越海征遼東皆不足戒矣嗟乎傳書豈易言哉百篇之文火于秦殘于漢馬融鄭𤣥王肅之徒開闢草昧甚為簡略古文孔傳晚出書義稍顯孔頴逹為之疏雖正二劉之失未愜學者之心求其條貫羣言闡明奧指信無逾於仲默集傳者但其意主於撥棄注疏故名物制度之屬不能無訛筆力視紫陽易詩二傳亦多不逮識者不能無憾焉考明初令甲本宗注疏蔡傳附之後又以蔡傳未精命儒臣劉三吾等博采諸說參互考訂名書傳㑹選頒諸學宫其後大全行而此書遂廢又其後制科專取蔡氏而大全亦庋高閣白首窮經仍訛踵陋讀禹貢者河渠遷改眩若追風陳洪範者九數相乘迷如辨霧此以攻經生章句猶隔重山况望其酌古準今坐而論作而行卓然稱有用之儒哉余竊用愍嘆此埤傳之所由作也記曰疏通知逺而不誣書教也夫推之時務而有宜有不宜不可謂通試之異代而或驗或不驗不可謂逺列朝經筵進講必首及尚書誠以三五以來崇功廣業咸出其中非徒古史記言記事之體余之輯是書也主詁義而兼及史家臚羣疑而斷以臆說務求為通今適用之學庶幾孔堂之金石絲竹不盡至于銷沈磨滅云爾若以仲默之書羣然尸祝不應輒有異辭則余且嬌舌而退夫仲默作傳已不盡同紫陽之說何獨疑于生仲默之後者哉校定水經注箋序隋書經籍志有兩水經一本三卷郭璞注一本四十卷酈善長注善長即道元也水經撰人則不著其姓名唐杜佑作通典時尚見兩書言郭璞疏略於酈注無所言撰人槩未之考也舊唐書始云郭璞作宋崇文總目亦不言撰者為誰但云酈注四十卷亡其五然未知兩注之一存一亡已見於斯時否也新唐書乃謂桑欽作水經一云郭璞作今人言桑欽者本此崇文總目作於宋景祐與新書志同時不知新志何所據以為說也說者疑桑欽為東漢順帝以後人以經有彘縣之文也然經云江水徑永安宫南永安宫昭烈托孤孔明處又云江水徑諸葛亮壘圖南得非三國間人所為也不寧惟是其言北縣名多曹氏置南縣名多孫氏置金源宇文氏以為經傳相淆經傳既淆則作經作注之人不可分也此皆歐陽𤣥之所致疑也以愚核之西漢儒林傳載塗惲授河南桑欽君長尚書朝氏云欽成帝時人使古有兩桑欽則可審為成帝時桑欽則藝文志不應不載其書又所舉水道地名不應多屬東漢以後也酈道元注每引桑欽之說皆與水經不同又不應一人之言彼此自相違戾也及考道元所引自云桑欽地理志而不及水經則知欽所撰者乃地理志爾後人因其書失傳遂誤以為水經此新書志之失考也郭璞之注杜佑譏其疏略必非無此書五代干戈搶攘遂已逸之今道元注載郭景純云云殆即彼注中語而或以為郭璞作水經此又舊書志之失考也或者又疑桑欽作之於前郭璞附益之於後他書或有後人增入此則不然也金禮部郎中蔡正父作補正水經三卷元蘇天爵梓行其書歐陽𤣥為之序據云正父因宇文氏之言而感發一正蜀板遷就之失于趙代間水特詳江自尋陽以北吳松以東又能使道元無遺憾惜乎此書之不見于今也雖然水經既無古本可據與注不免相淆正父以數百年後之聞見而補正之竊恐欲正其淆而淆愈甚也余謂此書不可讀者不惟經傳相淆尤恨闕文與錯簡往往而是今酈注雖仍四十卷已非原本之舊太平御覽引水經注語多今本所無則所亡五卷誠無從得而考補矣若其彼此之互移前後之倒置苟覃思博覽之士循文繹義猶可得而釐訂之也先朝萬厯中王孫朱鬱儀與謝耳伯箋校此書主以宋本參以吳歙二本更其錯雜者得十之三四至於河水與大河故瀆張甲屯氏諸河及漯水沔水江水之類尚未能考定識者憾焉余以暇日重加鈎索其中汨亂混淆者據古今地理一一取而割正之於是斷者得連離者得合顚倒者得次第庶幾讀者不至聱牙棘口輟卷而嘆雖小小訛脫時復有之然於此書大體無傷也至於水經撰人不知為誰斯固當從闕疑之例姑置弗辨可也陸翼王曰宋潛溪嘗有辨此文條析更為精細真讀書人心眼輯注杜工部集序客有譙於余曰子何易言注杜也書破萬卷塗行萬里乃許讀杜子足不踰丘里目不出兔園日取詩史而排纂之穿穴之冀以自鳴于世吾恐觚棱刓而揶揄者隨其後也余曰是固然已抑子之所言者學也子美之詩非徒學也夫詩以傳聲節奏成焉聲以命氣底滯通焉氣以發志思理函焉體變極焉故曰詩言志志者性情之統㑹也性情正矣然後因質以緯思役才以適分隨感以赴節雖有時悲愁憤激怨誹刺譏仍不戾溫厚和平之㫖不然則靡麗而失之淫流灕而失之宕雕鏤而失之璅繁音促節而失之噍殺綴辭逾工離本逾逺矣子美之詩惟得性情之至正而出之故其發於君父友朋家人婦子之際者莫不有敦篤倫理纒綿菀結之意極之履荆棘漂江湖困頓顚蹶而拳拳忠愛不少衰自古詩人變不失貞窮不隕節未有如子美者非徒學為之其性情為之也子美沒已千年而其精誠之照古今殷金石者時與天地之噫氣山水之清音嶒􅗆響答于溟涬澒洞太虛寥廓之間學者誠能澄心袚慮正已之性情以求遇子美之性情則崆峒仙仗之思茂陵玉碗之感與夫杖藜丹壑倚棹荒江之態猶可儼然晤其生面而揖之同堂不必以一二隱語僻事耳目所不接者為疑也且子亦知詩有可解有不可解乎指事陳情意含風喻此可解者也託物假象興㑹適然此不可解者也不可解而强解之日星動成比擬草木亦涉瑕疵譬之圖罔象而刻空虛也可解而不善解之前後貿時淺深乖分欣忭之語反作誹譏忠剴之詞幾鄰懟怨譬諸玉題珉而烏轉舄也二者之失注家多有兼之僞撰假託疑誤後人瞽說支離襲沿日久萬丈光焰化作百重雲霧矣今為剪其繁蕪正其謬亂疏其晦塞咨諏博聞網羅祕卷斯亦古人實事求是之指學者所當津逮其中也余雖固陋何敢多讓焉客曰子言誠辨然當代巨公有先之者矣子之書無乃以爝火附太陽余曰材有區分見有畛域以求其是則一也今夫視日者登中天之臺則千里廓然窺之于曲牖所見不過尋丈光之大小誠有間然不可謂曲牖之光非日也賢者識其大不賢識其小總以求遇子美之性情于字鉤句索之外即說偶異同亦博考羣言折𠂻愚臆豈有所抵牾齮齕于其間哉客退遂撰次其語以書之卷端戰國䇿鈔序嗟乎吾讀短長之書然後信子輿氏之以仁義說齊梁為深切事情而不可易也夫戰國之亡以䇿士䇿士之亡戰國則以利也王澤既遙七雄雲擾力侔勢敵權譎相髙於是儀秦軫衍代厲之徒競起而投其隙朝從暮橫陽施陰設其所命為策士者不過市魁盜俠之輩如鬬狗然交啖以利而已矣彼懷駔儈之心此挾傾危之術苟售詐謀雖裂身湛族而不顧其毒至於干戈相尋坑殺動以數十萬計秦政之時民之僅存者無幾矣夫鋒莫銛於利而劍㦸為下禍莫憯於利而參夷為輕方其抵掌華屋之下語穽心兵不過欲以遂其躍馬疾驅黃金橫帶之樂而豈意其流毒之逺一至此哉吾故曰七國之亡以策士策士之亡戰國以利也然則其書何以不廢曰是烏可廢也春秋以後楚漢以初二百四十餘年之行事備焉是史之流也史家兼載善惡以明是非且夫不嘗茶蓼不知梁肉之足以飫口也不歷氷霰不知陽和之足以悅膚也不深覽言利之害亦豈信稱先王陳仁義之效可以行千萬世而無弊也哉况乎其文之雄深峭健龍門史傳多取裁焉一時人物如仲連之髙蹈樂毅之篤忠鄒忌王斗觸讋之進說皆有當於儒者之正誼烏可以其出於戰國而不道哉是書雖經南豐校勘舛誤猶多鮑彪復紊亂其章次剡川姚宏㑹稡諸家而是正之最稱善本惜近世不可復暏先朝張叔大陸子淵兩先生嘗為之評解芟繁纂要劃然中棨其於史漢行文之法備有發明吾友茂倫珍祕多年今為鋟版而行之亦兩先生之功臣也已新編李義山文集序義山老於幕僚故其集章奏啓牒居多通考載樊南甲集二十卷乙集二十卷又雜文八卷今都散佚不存所傳者僅詩集三卷耳余箋注其詩檢閲文苑英華唐文粹御覽玉海諸部搜緝義山文凡得表書啓箋檄序說論賦祭文墓碑等作共若干首釐為五卷又以新舊唐書考證時事略為詮釋而因題其首曰四六之名不知何昉義山云四六者六博格五四數六甲之取也未足矜然則此本非文章家所重而六朝以來特尚之斯古文所由日下耶厥體繁於齊梁至庾子山而纎麗極矣唐初四傑以及燕許諸公踵事增華號稱絶盛其體裁閎博音響琳琅較過前人而清新俊拔則微有間焉子美詩云庾信文章老更成凌雲華意勢縱橫又云王楊盧駱當時體輕薄為文哂未休雖不置軒輊其間然文章流别亦略可睹矣義山四六其源出于子山故章摛造次之華句挾驚人之豔以磔裂為工以纎妍為態迄于宋初楊劉刀筆猶沿習其製誠厥體中之旃檀薝蔔也已若夫雪皇太子書諭劉稹檄則侃論正辭有風情張曰霜氣橫秋之槩及讀辭張懿仙一啓又見其悟通禪悅所得於知𤣥本師之教深矣此豈區區妃青儷白鏤月裁雲者所能及而唐史稱其文第以繁縟恢譎目之豈得為知言哉余嘗觀晚唐人文章如李甘沈亞之陸龜䝉司空圖數子最為卓犖瑰瑋而世罕睹其集欲從文苑諸書中摘鈔出之以備一家之作特病懶未暇姑以此集為乘韋之先云陽明要書序宋儒理學莫粹于濓溪明道一再傳而為考亭象山象山直探原本注腳六經考亭博極散殊窮研著述吳幼清以為一主尊德性一主道學問二家各尊所聞行所知持論多齟齬不合至無極太極之辨象山掊擊再三考亭亦無以難也後世儒者多右朱而左陸遂疑象山為禪不知聖賢之學皆心學也文章之盛所以明此心節義之嚴所以持此心事功之大且久所以驗此心心惟無一有故能無不有無一有者心之無待而神無不有者心之隨感而現孟子曰仁人心也學問之道無他求其放心而已矣此千古學論凖的而何疑于象山哉夫禪之與吾儒異者其始離動求靜其既欲以靜攝動惟岐體用而二之也岐體於用故專守其空寂岐用于體故旁出為神通若象山之學則皆本明道靜亦定動亦定無內外無將迎之說雖功施未究于天下而立言垂教務使學者返求之心其言曰心之神明是為聖此固孟氏之嫡傳宗子也後三百餘年而陽明先生出焉以致良知為宗大闡心學困踣蠻徼而此心愈明驅馳軍旅而此心愈定驟膺艱大更厯謗疑而此心愈不動自來有用道學無踰先生者蓋其學即象山之所以學其教即象山之所以教而已矣世之以禪疑先生者特因其掃除聞見往往彈射考亭吾謂此非真彈射也俗學崇奉考亭太過遂至溺惑於語言文句之間舉其曰主敬曰窮理曰豁然貫通之精義盡汨沒無餘先生出而灑然正救之其彈射所加正羽翼之深意而世顧以疑象山者疑先生然則孟氏所云求放心不學慮者其亦將為竺乾之導師梵夾之賸語矣乎先生高弟子為錢緒山王龍溪龍溪放談𤣥渺其流弊至為顔山農何心隱之徒緒山恪守師說今全書其所手定也顧名目紛糾義例雜出其駁而未純者不免間有幾亭陳先生自未第時已覃精理學取先生之書剪截而刋定之宣其義藴一其指歸大廷尉葉公刻之廣中於是先生之宗㫖始粲然大明於天下嗚呼心學之不講久矣學者誠取此書而沈研省發去其詞章之俗尚與功利之䝉情以求所謂此心此理者何在則文章也節義也事功也特太虛中之穅秕塵垢耳百世而下有欲因陽明以知象山因象山以知濓洛因濓洛以知孔孟者其能不奉是書為泛海之斗杓入河之碣石也哉是為序甫草曰自唐以前止有儒林列傳宋史始分儒林道學近人鄧元錫又分薛文清輩為道學陽明為心學不知心學之外無道學也此文方見得儒家正傳讀左日鈔序春秋三傳竝立公穀乃經師之學左氏獨詳於史事蓋古者史世其官左氏必世為魯史如晉之董狐齊之南史楚之倚相能尊信聖經而為之作傳廣求列國諸史乘管仲晏嬰子産叔向諸名卿佐之行事無不詳以及卜筮夢占小說雜家之言無不采大事䇿書小事簡牘閎稽逖覽綜貫秩然故其文章最為典則華瞻而後之儒者或病其誣或病其浮夸或病其立論多違理傷教則何也夫子感獲麟而作春秋去夢楹不三載其指趣未及顯以示人左氏之遊聖門也晚又未必與游夏之徒上下其議論則其踳駮而不醇者固宜有之且左氏所稱書不書先書故書之類皆本之舊典為史家成法聖經則不可以史法拘或事同而義異或事異而義同夫子蓋有特筆存焉自不修春秋既亡不知何者為筆何者為削各信胸臆穿鑿繁興至於紹興之講進面說之殽雜極矣雖然筆削所據惟事與文左氏即間有舛訛而臚陳二百四十二年史事則十得八九杜元凱推挍經傳亦極精詳學者誠淹通此書研究事情因以推求書法一切刻深碎瑣之見勿橫據於胸中而以義理折𠂻之安在筆削之精意不可尋繹而得乎今左氏之書家傳户習特其筆法簡古文之艱澀者義之隱伏者往往費人推索元凱注既多未備而孔仲逹疏復卷帙繁重學士家罕窺其書東山趙子常特申不書之㫖輯為補注多與經義相證發余珍祕有年復廣演而博通之疏瀹幽滯辨正訛舛自孔疏而下弋獲於劉原父吕東萊陳止齊王伯厚陸貞山邵國賢傅士凱者居多又取春秋人物引繩墨而論斷之使學者知古今人材之盛莫過於春秋兵法之精亦莫過於春秋應變出奇益人神智讀史者當有取焉至於左氏全文明曉易見者則概不之及自愧謏陋此不過備遺忘資討論而已若欲從事聖經成一家之學必如黃楚望所云先以經證經次引他經證又次以經證傳又次以傳證經展轉相證更復出入羣書此非余力所能任也姑存其說以俟世之述作君子左氏春秋集說序記曰屬辭比事而不亂深於春秋者也今之說春秋何其亂與則凡例之說為之也自左氏立例公穀二氏又有例啖趙以下亦皆有例言人人殊學者將安所適從如稱爵者褒也而㑹盂何以書楚子則非盡褒也稱人者貶也或將卑師少也而僖公之前何以君大夫將皆稱人則非盡貶與將卑師少也稱字者貴之也而邾儀父許叔蕭叔有何可貴乎殺大夫稱名者罪之也而陳泄冶蔡公子燮有何可罪乎諸侯失國名而䕫子萊子不名滅同姓名而楚滅䕫齊滅萊不名則其說窮矣不書公子為削其屬也而弒君如楚商臣齊商人反稱公子則其說又窮矣卿卒必記日月公至必告於廟益師不日薄之也而成公以後皆書日桓㑹不致安之也而公行大半不書至則其說又窮矣不得已有變例之說夫所貴乎例者正取其一成而不可易若前後游移彼此乖忤何以示萬世之繩準嗚呼夫子作春秋上明天道下正人事變化從心安得有例例特史家之說耳自隱桓至定哀二百四十二年間載筆者既非一人則或詳或略不免異辭所見所聞難於一概就史法言之尚無一成之例而乃欲執後人之例以按經又欲屈聖人之經以從例其可乎哉然則如之何亦曰求之春秋之所以作而已矣夫子曰吾志在春秋又曰其義則丘竊取之何謂志尊天子內中國討亂臣賊子尊王賤霸是也何謂義善者吾進之豫之惡者吾退之奪之彼善此者吾猶進之豫之純乎惡者吾亟退之奪之是也志以義明義以時立春秋之始諸侯驟强則絀諸侯以扶天子春秋之中大夫專政則絀大夫以扶諸侯春秋之季陪臣亂國則又絀陪臣以扶大夫而前之治楚後之治吳越往往示其意於奬桓文愛宗國爵齊晉宋衛諸君之中若此者凡以尊天子也明王道也一筆一削蓋皆隨世變而為之權世變異則書法亦異而豈有變例正例之可求哉後之說者乃曰聖人有貶無褒或又曰聖人初無褒貶夫有貶無褒則春秋為司空城旦之書聖人宅心不應如是刻核若無褒無貶則全録舊史是非不明何以有知我罪我之言而能使亂臣賊子懼耶吾故專以聖人之志與義為斷不能得乎聖人之志與義則隨事生說辨愈繁而不可立教能得乎聖人之志與義則凡例諸說何嘗不可與聖經之微文奧㫖相為發明而近世儒者著論乃欲盡舉諸例而廢之其亦固而不可通也已余為此書主以左氏傳取杜注孔疏及公穀啖趙數十家之論聚而觀之參互權衡藁凡數易疢疾寒暑腕不停書雖未知於聖人之志與義若何而古今諸儒支離膠固之說刋剟無餘少以資學者經術經世之助庶幾於屬辭比事而不亂之㫖或有當云左附録左氏春秋集說凡例故經文專據左而以公氏傳經在公羊穀梁之先穀參焉傳文不能全載今節略其事蹟於經文之下然後引用注疏諸家之說此倣黃氏日鈔體也三傳之後啖叔助趙伯循陸伯冲三家可謂通經所輯辨疑纂例條理秩然今多引其說參以趙子常王方麓之論而𠂻斷之學者先觀此則全經燎如矣而胡傳專重復讎討賊誠有功世教然立論頗迂濶穿鑿張元德春秋集注較胡氏特平正洪武初詔頒學宫今人罕見其書矣余志在表微故采之獨多劉原父權衡以辨誤為功陳君舉後傳以不書立義吳臨川纂言汪新安纂疏李廬陵㑹通皆能闡繹微指又劉質夫許襄陵孫明復高息齊王彥光吕永嘉家則堂諸解大全去取未必悉當今擇其粹者録之葉石林趙木訥戴岷隱黃東發諸家之說多先儒未發而大全不載則纂修諸公之罣漏也余遍搜藏書家得之亟為采入毛詩稽古編序昔夫子刪定六經而其自言曰信而好古夫三皇五帝之事若存若亡蓋有不可深求者矣如河圖洛書出苞吐符天人相接此與後世之天書何異而夫子顧信之不疑下至商羊罔象汪芒僬僥之類尤為矞宇嵬瑣夫子亦時時述而志之蓋其學綜墳典徵文獻稟師傳苟古人之所有無不考求詳慎而不敢以私見汨亂其間此所以為善述也詩序出於子夏之徒大小毛公亦秦漢間人詁訓視他經最古鄭康成取其義而為箋即不免踳駁自有聖門闕疑之法在今人概黜為郢書燕說此不可解也爾雅一書古人專以釋詩亦子夏之徒為之至六書必祖說文名物必稽陸疏皆先儒說詩律令今人動以新義掩古義今音證古音此又不可解也說者謂考亭集傳頒諸功令學者不敢異同然考亭嘗為白鹿洞賦中云廣青襟之疑問樂菁莪之長育仍不用已說門人問之曰序說自不可廢然則考亭之意亦豈欲學者之株守一家而盡屏除漢唐以來諸儒之箋傳如今人之安於固陋荒忽者哉余向為通義多與陳子長發商榷而成深服其援據精博近乃自成稽古編若干卷悉本小序注疏為之交推旁通余書猶參停今古之間長發則專宗古義宣幽决滯劈肌中理即考亭見之亦當爽然心開欣然頤解嗚呼經學之荒也荒於執一先生之言而不求其是苟求其是必自信古始夫詩之有序也猶江之發源羊膊嶺也毛鄭則出玉壘過湔塴而下時也後儒之說則厯三峽分九道汨汨然莫知所極今與之導源岷山使知緣崖數百激湍萬里之皆濫觴於此也豈非記所云先王祭川必先河而後海之義乎世有溯源三百者必能尊奉此書為孔傳未墜長發其俟之而已西崑發微序義山之詩原本離騷余向為箋注而序之曰男女之情通於君臣朋友夫屈原之時其君則懷王也其所與同朝者子椒子蘭也原之耿介能無怨乎怨而不忍直致其怨則其辭不得不詭譎曼衍而義山一祖其杼軸以為詩以故瑰采驚人學者難於逆志余之箋注特鱗次羣書析疑徵事而已若其指趨之隱伏者固不能條件指晰將以待世之曉人深求而自得之焉今春次耕歸自玉峰以吳子修齡西崑發微示余其說以為義山無題詩皆為令狐綯作也義山受知令狐楚後就王鄭之辟綯與黨人排斥之終其身義山固功名之士也能無怨乎怨則以神仙之境為豔情巾帨之間作廋語斯固夫君美人靈修山鬼屈宋之家法也豈徒麗藻云爾乎往虞山馮子定逺嘗語余義山無題詩皆寄思君臣遇合其說蓋出於楊孟載今得修齡解益可與定逺相證明足埤益余箋注所未逮修齡真曉人哉修齡精律吕之學妙有神悟蓋今之異材兹特吉光片羽爾敬題首簡歸之以志余傾倒之意周易廣義略序余嘗讀左氏傳曰物生而後有象象而後有滋滋而後有數知象居理數之先又讀繫辭廣八卦知六十四卦中凡近取諸身逺取諸物者無不於此乎探賾索隱乃益歎今人讀易盡廢象不講何異擲埴索冥自以為昭昭揭日月而行也然余之為廣義則仍主輔嗣仲逹之注疏與伊川之傳以推衍考亭所未備然後博引李鼎祚集解諸書蓋意在即象以顯理而非欲離理而專求之象也宋史載漢上朱子發著易解以程傳為宗包括古今參和理象為當時所稱余廣義一書實竊取其義如離理求象必將流入於穿鑿附㑹而不可為典要漢魏以下如鄭𤣥荀爽王肅干寶陸績虞翻崔憬侯果諸家都從卦變互卦取義非不時契易㫖而穿鑿傅㑹迂僻不可解者亦往往有之所以自宋迄今世不復尊信其書也近讀來梁山唐凝庵錢啓新三公論著實獲我心而亦時見其穿穴旁解撥遺程朱正義則又疑其矯枉之失何𤣥子總統羣言善矣而别裁之功尚有未至此學者所當遍觀博識精求而約取之者也伊川傳易每略於卦變故自言止說得七分考亭本義中絶不及互體然大壯六五云卦體似兊有羊象焉此非互乎蓋二子之書專明義理則象學自有所未遑實非舉漢魏吳晉諸人所得欲盡掃而芟矱之也誠能兼通象學而又不膠執乎其說豈非程朱二子之所樂豫者哉余友吳子𢎞人研窮易象夙有同心與余同輯此書始自已未不意𢎞人奄忽捐館余復抱滯下之疾遂為輟管陳編堆積架上陳子長發一日過余曰古人一隅反三經何必全解如黃東發王伯厚以略解而傳者多矣子何不撮舉其要自為一書以示來者余感其言乃刺取其中攝合理象參論古今諸儒得失者得一百餘條復增益十餘條詮次為四卷名曰廣義略云昔王晦叔名炎著易解未竟而病篤晦叔每夜分祝天曰願假一二年母死以成此書果遂其志今余一病而憊憊而遂至於廢業微獨學力不逮古人精誠亦遜之逺矣然則余之拳拳蕞殘而不忍盡付之於凋零磨滅者烏敢自謂于易學有禆乎亦欲使後之人知余之於易蓋有力不從心之憾如此也壬戌中秋日書愚菴小集卷七
