body:
  text: 愚菴小集卷三吳江朱鶴齡撰七言古空城雀青雀飛青林下上聲唧唧夕乳空井中朝貪野田粒不羡玉山禾何來網羅逼豈意烈飈舉戰血淋城隅道逢新鬼哭繞樹驚相呼空倉絶飲啄毛衣日粗疏嗟乎生靈滿城尚枯骨况爾啁嘈安所息不見齊雲樓下火燒天紇干凍雀飛無翼孝章曰意調悲激不盡欷歔寶劒行寒芒鋭鋭蒼龍精吐景流商寶氣橫光淬鸊鵜照秋水縧懸䍡􅝹連星文夜中風雨時飛去匣內蛟龍殷上作聲君不見赤堇開若耶涸歐冶鑄來天工錯又不見楚山雄吳水雌至精不隔會有期神異千年出非偶紫氣雖沈猶旁斗時來得佩君子身老狐潛形木魅走嗚呼此物不用彈侯門侯門仁義非純真亦毋借與斬佞臣佞臣􅀈濡噴血腥一朝提向白帝子辟易萬里黃沙清我歌寶劒神激烈霜鍔雪花今不滅用之失所同鉛刀世人空自侮神物風胡不可期明晦自有宜君看繞指風塵日何若潛光古獄時長發曰命意髙迥元振樂天而外罕有其匹臨江王節士歌黑雲崩奔海氣惡霜風萬里徑雕鶚萇𢎞血色照髙楓易水濤聲走枯籜節士感此神慨慷起拔雄劒擊大荒苔生繡澀非無意一朝掣電揮寒鋩斬鯨鯢跨溟渤紫髯一張蝟毛磔履腸涉血憤始平夜夜天街看太白無殊曰力摹古調是樂府本色精衛詞移山驅石未足竒精衛乃欲填天池朝發發鳩暮滄海口銜木石雲中飛飛來咯咯作人語只為當年死水渚大造何為産不平海水萬里搖空青鞭撻日月無出沒蹴翻蓬島如瓶瓴精誠自能開浩劫仡仡力與天吳爭西山草木會有窮怨氣往來終不歇天地沈冥滄海枯帝女之靈乃可絶野田行衰草貛貕掃行迹野燒連雲古田黑田中丘壠日夕多蒿露朝朝泣新碧富貴難爭白骨春塜邊松柏辨何人今日耕犁斸斷瓦玉臺當年梳墮馬介白曰語簡情悲唐人妙境山中早行訪葉天寥先生不遇悵然有懷崖空木落風修修宿雲羣起巖際流寒榛野雀呼不休樵徑無人草露稠行盡岡頭叢桂幽莎亭棐几橫髙秋美人不在空夷猶颯沓空庭響長楸雜花嫣然明廢丘兹來誰與銷離憂百年心事同沙鷗五湖浩蕩何所投恨不從公汗漫遊青鞋賣藥南山頭他日相期杜若洲浩歌一曲煙花愁笻在曰流宕俊逸柏梁體以此為佳對酒歌人生哀樂日異態所以志士多悲歌况我一身備坎壈萬事零落隨秋莎昨夜商風戰黃葉幾人黑頭驚白雪葵扇桃笙安可常榮華旦夕成雕歇古今茫茫一俯仰池臺春草年年長玉燕誰憐漢后叉金盤頓去仙人掌悲來貰酒黃公壚上聲促節歌吳歈骨古恥與百人會氣髙不踏五侯廬且送懷抱何區區松花飯竹葉醅一口吹飛劫後灰崑崙銅柱可倒摧楚漢戰爭安在哉海天愁雲萬里來長生木瓢為君催如何局促生心哀安節曰音節豪邁有爽氣其源出于太白酬方爾止見懷兼送之金陵省侍昔年偕子瓦官宿風雨寒燈嘆聲續漢家火井誰更窺葛嶺堂前散樺燭荒臺含淚數歸鴉廢苑臨風弔平緑余感秋菰歸故園子隨氷泮出國門何地登樓堪作賦蘇臺空望灞陵雲須臾鐵甲彌吳市共道花源在江渚輕舠泛泛荻溪深瞥眼逢君驚且喜多君朂我青琅玕蒲塘拭淚起長嘆世事正疑峰九靣人間難盡磴千盤永嘉僑客本無家笠澤春風十畝賒豈意下江兵忽起庾村謝墅遍悲笳子念髙堂理須去霜籜千林照歸袂道上猶聞建業鐘雲中不辨景陽樹桃葉桃根且莫歌薜蘿應訪舊巖阿南國香銷白日暮北山芝長丹霞多他時重憶吳淞月吾將與子同漁蓑弱翁曰纒綿婉麗序次有倫在唐人中為劉夢得一𣲖訪顧樵水空城來往但榛礫惻惻寒螿啼路側徙藥尋君立板橋野葛覆垣改行迹池邊瘦草不勝霜林外間花似相識吾歌子謡悲復悲疏雨深煙織空夕贈陸鳳華聞陸有却金之事作此贈之故人獨子青松枝憔悴江頭歌式微破椽止許安鄴架一生不解食熊肥江河逆上老蛟立草木無英朱鳯飢每感緇塵染素練曽聞杜老辭褥段欽子髙風近古人澗底粼粼青石見吾願崑岡踏倒海塵飛勿生緑玉與明珠珠玉能令生命賤采之失却千金軀不如登讓山汲廉水東郭蕭條躡芒履危機不中飛流矢介白曰語有關係髙岸崎嶔全得少陵氣骨夢桃源漁舟一出迷去津靈迹常韜萬古春夾岸桃花復何有至今空説武陵人武陵桃花隔深碧春山夢回忽如覿落英潭島正紛紛桑竹千村盡煙客雲林不辨春與秋瑶草丰茸滿香陌時陳爼豆非人間望見衣冠多古色野老相逢無白頭飢向松根斸芝术巖徑千盤花轉迷碧流深淺無人知石上煙霞還拂枕洞中雲露不沾衣靈境恍惚那能駐覺來猶見仙源樹蜃樓幻轉不須臾世間誰得避秦處是仙是隱不須驚夢裏相尋身亦輕茂倫曰秀麗綿芊興懷隱約可與摩詰桃源行相伯仲楊白花楊白花飛飛落何處髙樓千萬重宛轉從此去迢遙逺道歸無期願得日夜南風吹吹著楊花入懷抱妾顔長比陵苕好安節曰只末二語巳極纒綿勝人多多許潘江如遊閩過别託訪何玄子葉敬甫諸公事迹北風獵獵寒流澌黃塵黑霧吹人衣春日不出出亦瘦空庭老樹號飢鴟君來過我何奔迫襆被因人將逺適為君起歌行路難滿眼艨艟暗金戟驊騮不得驂弇山空效罷牛走塵陌君今東去經仙霞仙霞戰骨堆如麻千山落日依殘壘八郡空城噪晚鴉當年軼事恐磨滅納肝斷腕堪咨嗟君去為我齎油素遺民覩記應無誤碑版佚文尚可搜屠酤異士當一遇作賦登髙莫漫誇酒酣須唱丁都護漲海茫茫鴻雁稀到時將及荔支肥波濤翻覆非一狀待爾同釣滄江磯介白曰七古之妙全在音節頓挫此作兼有青蓮少陵之長楓江酒船歌贈余淡心余子白晳烏衣郎楓江酒船琴瑟張搊筝美人坐兩旁參橫月落方浩倡痛飲不空金錯囊君才固空草明光何為浪迹長滄浪誦君長句氣莫當少陵野老堪頡頏誰同調者萊陽薑君今顧我浣花堂石蘭滿徑生清香矯首咄唶望八荒髙歌岸幘神洋洋黃公酒壚典鷫鸘惜君去鷁飛方塘西湖曉黛施新粧夾岸官槐鼠耳黃棹歌中流樂未央髣佛洛浦貽明璫為君作歌睂色揚楓江酒船酒難量歸時無及雁南翔重來就我彈清商無殊曰風流駘宕想見李青蓮遊郎官湖時茂倫席上晤胡彥逺丘季貞姚仙期漫賦人情似秋雲俄頃異好醜蘭艾同束薪文章棄芻狗感歎中園葵妍華竟何有社燕春復秋變衰豈云久得喪理本齊何事營身後宜彼賢逹人揮金適拊缶顧侯磊落多古情襟期每為髙士傾座中三子湖海英剪韭擊鮮樂事并觥船初泛箬下清瞪目直視無公卿滄浪逸興浮軒楹起視髙樹明星橫搔頭浩歌棲鶻驚天運物情巳如此紆金饌玉徒營營今我不飲將何成介白曰興會甚髙豪宕激越樂府遺音張公藥囊歌張公藥囊手提攜不入吳市貪山棲淳氣堪編孝友傳道風恆與煙霞期南州髙士人共棄惟君往來慰憔悴今雨交態安足論寒山白雲照明義我亦病叟違世情書籖藥褁愁零丁會當結侣􅩯村北燃松摘薤杯同傾安節曰語不必多意味巳足有岑參李頎之風苦寒行頊帝寒威何酷烈東南地維迸將裂太湖堅氷百丈深魚龍潛竄重隂穴千村惟見凍凝雲萬頃不聞濤噴雪西風日吼天地昏估客漁翁往來絶瘦日隱見無晶輝鍾山燭龍光欲歇雖然陽氣終回旋可忍罷民重酸切官稅榜笞髓巳枯天行嚴凛骨還折時聞艇子陷氷圍絶炊隕命黿鼉窟兼之茆屋僵赤膚妻兒號寒忍嗚咽嗟乎彼蒼何夢夢水旱頻仍不堪説復見殺氣東南行災沴荆吳恐仍結君不見千户封五陵俠軟裘快馬出京闕誰信無衣呌寒月宗定九曰語出沈痛能感愴人樂天秦中吟之流亞也山石次昌黎韻山石歷亂凌翠微楓杉十里蜻蜓飛百道細泉流木末黃梅雨過楊梅肥入寺不聞聲剝啄花龕半掩人來稀老僧睡起偏袒坐飯我青精充我飢須臾策杖出平莽半山鐘磬聞禪扉丹梯徑斷樵牧絶秪見嵌竇煙雲霏巨石蟠拏立猛獸翠屏却略如長圍緣源萬轉興未極松花拂拂沾人衣此中仙靈真髣佛何用刺促隨馬鞿願得息機混蟲鳥攜家采藥長不歸送潘次耕北遊崑崙木禾天下無當其未發同枯株潘生嶄嶄露頭角何異瓊蘂方敷腴哲昆文章嘆零落賴子收拾灰燼餘十載悽涼歌隔谷至今神色慘未舒髙氣巳足空九縣健筆更欲凌三都新詩起豫奪老眼羽翮絢練珠璣鋪今來别我適逺道擔簦直走無所須齊魯燕趙多竒士子去豈憂吾道孤鹿城顧子寧人久作客為我傳訊今何如安節曰昔人謂謝朓詩工于發端此作發端絶妙以後亦磊落有氣姑蘇臺感懷荒臺碧血秋光老西施行處寒煙繞戰壘年年換緑苔白雲不散吳宫草西山月影弔麋蹤錦帆涇外濤聲小花落烏啼黯斷魂越臺榛蔓共黃昏興亡長恨何時盡霜葉飛飛帶淚痕梁溪歌贈吳伯成明府有序錫山古邑梅里遺墟為南北之要津實往來之綰轂地饒陸海連吳會以稱雄才聚清華鬱岡巒而起秀幅􅊷式廓多鄰蛙黽之鄉災沴頻仍屢遘波濤之厄沃壤幾為雕瘵人文漸巳榛蕪兹遇伯成吳公嵇山挺秀劇邑分符翦江國之雲霞織成錦段入鄧林之根節試厥硎鋩清映氷壺橐止胡威之絹惠零甘雨車隨好畤之烏九陌晴花候鳴絃而獻笑千村社鼓迎墨綬以興耕賦額登而罰弛箠楚馴良恱而音變鴟梟治最既優儒風斯振笙簧藝府鼓吹文園尋勝迹于丹梯集諸生于白社憑林起棟即沼疏泉分魚鳥作三行列煙花為七覆既援枹而橫筆陳亦摩壘而厲辭鋒五部湖前仙舟對棹九龍山外落紙時飛斯又軼懷縣之風流追蘭亭之勝事矣不佞齡陋似太沖渴同司馬雲山在望一棹猶阻于關津儛頌頻來百里自通乎河潤神往烏皮之几夢遊嘉樹之林兹者政登上考時值生申榮光動于北辰景曜逢乎南極躋公堂而獻壽早見豳風采輿誦以陳謡嘗聞古老爰申小詠敬播德音乃為歌曰維彼梁溪兮環江匯湖水滔天兮民為魚嗟雕敝兮誰與蘇公之來兮濊澤敷弛威罰兮詬鰥媰感德意兮爭挽輸犬不驚兮吏不呼揚文治兮禮耆儒捐亷橐兮慰窮塗振風雅兮黜皇荂公之澤兮流具區介春酒兮傾百壺願他年兮秉化樞惠我民兮長賜酺重過四雨閣有感有序王荆公稱梨花一枝春帶雨珠簾暮卷西山雨院落深沉杏花雨桃花亂落如紅雨皆警句嘉隆間周文學公瑕以四雨榜其閣一時文士多宴集于此三十年前余嘗館其地嵗久不到闔閭城重來舊館門闌更鄰翁為引蓬蒿徑古樹猶喧鳥雀聲百年以前公瑕宅竹林魚沼紛遊屐桃花梨花爛漫開閣中屢見鋪瑶席篆隸早師待詔公豐碑大碣求絡繹余昔館此勝迹遙景物尚未全蕭條同舍黃翁善章草清宵得句時相挑黃翁元國嘗有句云月來天地皆成水雨過煙雲總是山人多稱之月采照池流綺練花容臨榻勝妖嬈四十年來時屢變春燕秋鴻不相見步屧重來百感生野莧青青為誰蒨斷橋缺板草侵鞋卧柳生枝蟬聒院閣敧無復榜高懸蛛網蟲絲撲人靣吾生已見升與沉何論當年盛文宴嗚呼世間萬事如轉蓬清賞勝遊君莫羡兔葵燕麥昔繁華梓澤平泉今甫竁音釧穿土葬也甫竁見周禮池臺若可鎮長存玉兔金烏足不奔汪周士曰聲情嗚咽如聞雍門之泣湖翻行庚戌六月十二日太湖西來天目源七十二溪波濤奔震蕩有時溢原野未聞浩瀚迷乾坤五月稻秧齊插蒔三旬霖雨水澎濞方憂漏天移澤國忽駭狂瀾卷平地颶風猛發神鬼愁火龍擲火驅潮頭漂砂礐石失垠岸發屋拔樹蟠蛟虯聲如列缺鬭霹靂勢如共工傾不周乘陵城郭塔欲倒千廬萬竈皆洪流巨浪翻騰高屋過大魚撥刺平衢遊更憐人畜死無數浮轊塞港漂難求百嵗老翁驚歎久此災邑志從未有乘船入市何足云地軸翻天浸星斗我時惶遽無竄逃急上髙樓守簍籔竟日魚釡無炊煙澆愁何處沽村酒變不虛生豈偶然撫時感事心欲嘔盛朝蠲賑猶未遑長吏敲搒肯停否欲訴真宰天茫茫九關虎豹狰獰守吁嗟蒼生爾奈何但見號咷走童叟刈稻行壬子老農腰鎌趁晴穫短禾滿把歎聲作今年雨暘頗失調飛蝗雖過未為虐苗莖苖葉無損傷臭蟲潛生根底蠚臭蟲名負盤見爾雅注芒粒稀疏穗不垂禾根浥爛氣殊惡田家無望囷粟登終嵗辛勤空錢翦鎛兼之縣官急索租簿吏登堂恣烏攫脫粟一飯抵玉炊敢希舂杵得精糳老農切切陳哀辭問我何法充朝飢我聞此言再三歎由來荒歉非一貫大無麥禾紀春秋其年無水亦無旱土膏不發榖不成魯史特書關治亂三國孫吳亦有之沈約宋志文可按民生三代後性命全倚天天若不憐徒顛連我曹稿餓不足道恐兆兵氣心焦然明年果有滇南之變吳慎思曰二詩皆紀時變真抑揚哀怨之章當以陳之采風者寧都魏凝叔惠貽易堂諸子文集文章氣節古一之立言豈是修曼辭揚雄美新入文選蕭統無識徒貽嗤唐宋以來文匠八門奧各出推導師柳州躁進荆公執尚于大義無瑕疵皇初希直實巨手崆洞南城老筆披荆川遵巖與熙甫沿泝均出歐曾規弇州才大一時傑此後作者誰能追西涯詩文敗婀匼當時正論多詆諆奈何談者好軒輊一禰一祧任意為未聞身名已瓦裂能立壇坫持旌麾易堂風節吾所畏文筆賈勇相切劘翠微峰前魚鳥樂碧桃紅蕖爛漫姿觀彼論撰頗英鷙起衰振靡實有期我亦永懷不朽業志大力小空逶迤兩目眵昏足尚健欲向勺庭捧盤匜安得插翅墮爾前黃縧青鞋白接㒿離經酌史無晨夕同斸茯苓松下炊吳園次太守惠貽林蕙堂文集徐陵玉臺尚俳儷文章流别日以興齊梁清麗賞杜老萬古江湖四傑稱西崑創自玉溪子自比六博未足矜楊劉刀筆矯永叔是後作者無精能今日文瀾遞流衍麗則清聲筆誰蒨翡翠蘭苕容色鮮前有茂苑後陽羡延陵筆底騰煙雲戛玉鏘金工獨擅省郎出牧官不卑解組吳興作羈宦脫驂分宅古人風衣被寒士情無倦朅來車馬駐荒郊白蘋清風猶拂面鴻章拱置几案間直當一字酬一絹願攜海南沈水香日供茂先青鐵硯董如齋太史宅觀趙文敏百馬圗及仇實父蘭亭會真二手卷文太史墨迹酣飲醉歌同沈香山作太史好事賞鑒精閟閣藏弆皆藍瑛爐香馥郁荈飲清示我畫圗心眼明松雪王孫好畫馬神妙不在江都下貌得賢王出獵圗毫素疑有神功寫錦襠繡帽雙辮垂萬蹄攢迸流星馳風鬃霧鬛盡騰躍意態變化如奔螭僵禽斃獸十七八一箭射殺斑黃羆對此陡覺鼻生火想見意匠經營苦文采風流後邈然待詔文公踵其武同時又有仇十洲人物畫苑稱最優蘭亭勝遊擅六代會真香艷空千秋妙染一一見生靣况有待詔舒銀鈎一臨河南筆力健一出小楷風神遒此皆盛世巨手筆仙官恐遣六丁收君從何處得墨寶珍護應比璆與球玩久卷圗三歎息暇日清娛難屢得日中踆烏足不停海上神鼇頭欲側時京師迤東地屢震吾來笑摘黃金花起泛瑶尊蕩愁臆翰墨竒觀次第披此身如置華胥國酒行到君君莫辭醉鄉萬事無逼仄王丹麓曰慷壯淋漓運用斡旋具見手法贈海寧許酉山明府兼訊黃太沖許夫子今儒英軔百里文治成廣筵列坐諸經橫橋門觀聽羅璜珩絲絃歌吹相和鳴舂容叩擊春風清豈徒德惠流歡聲仲淹牛溪述王道一時髙第皆公卿鵝湖白鹿開講院剖析聖義晨星明至今正學不墜地恃有巨手能支撑考亭象山宗旨合虛實二教理兩行奈何後人判塗畛袒分左右紛呶爭文成立説救章句虛無豈與竺乾并俗學肆口恣掊擊無異同室分旗鎗我欲融釋歸大冶一銷文壘與墨兵所恨身賤才力薄徒抱遺書守柴荆公今講壇臨浙水務使學者開羣盲兩家鬬諍果何益貴出衷論持權衡若晤姚江黃處士為言嚮學有朱生愚菴小集卷三
