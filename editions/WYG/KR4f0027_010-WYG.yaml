body:
  text: 愚菴小集卷十吳江朱鶴齡撰書與李太史論杜注書杜注刻成䝉先生惠以大序重比球琳子美非知道者此語似唐突子美然子美自言之矣文章一小技於道未為尊此語正可與子美相視莫逆於千載之上也漢魏以下詩文之有注昉於文選文選而外注杜詩者最多亦最雜葢文選之注張載顔延之沈約薛綜徐爰劉淵林諸人經始之又得李善㑹稡之子邕復益之以義故能傳述至今杜詩注則錯出無倫未有為之剪截而整齊之者所以識者不能無深憾也近人多知其非新注林立盡以為子美之眞面目在是矣然好異者失真繁稱者寡要如聊飛燕将書乃西京初復史思明以河北諸州來降故用聊城射書事今引安禄山降哥舒翰令以書招諸将諸将復書責之此於收京何涉也豆子雨已熟本佛書譬如春月下諸豆子得暖氣色尋便出土偽蘇注以豆子為目睛既可笑矣今却云贊公來秦州已見豆熟夫楊枝用佛書豆子亦必用佛書若云已見豆熟乃陸士衡所譏挈瓶屢空者子美必不然也曠原延㝠搜曠原出穆天子傳今妄益云原崑崙東北脚名此出何典乎何人為覓鄭𤓰州𤓰州見張禮遊城南記今云鄭審大厯中為袁州刺史審刺袁州安知不在子美没後乎地理山川古蹟須考原始及新舊唐書元和郡縣志不得已乃引寰宇記長安志以及近代書耳春風回首仲宣樓應據盛𢎞之荆州記甚明今乃引方輿勝覽高季興事季興五代人也季興之仲宣樓豈即當陽縣仲宣作賦之城樓乎白馬江寒樹影稀白馬江地志在蜀州今崇慶州之白馬江是也時子美在蜀州送韓十四故云今引寰宇記王僧達為荆州刑白馬祭江不亦傎乎春城回北斗郢樹發南枝北斗用斗柄東而天下皆春非指長安城為北斗形也史記楚考王徙都夀春命曰郢夀春唐鍾離郡今鳳陽也時韋氏妹從宦鍾離故曰郢樹非指江陵之郢也二句䝉上郎伯一聨彼此分言正是詩法回北斗發南枝又貼切元日今引栁詩長在荆門郢樹間豈可通乎注子美詩須援據子美以前之書類書必如類聚初學白帖御覽玉海等方可引用今師子花卧竹根皆引天中記天中記乃近時人所撰爾况二注皆謬炙手可熱兩京新記可引萬迴傳可引崔顥詩亦可引今乃引唐語林開成㑹昌中語彼豈以開成㑹昌在子美以前乎人生五馬貴五馬雖無的証然古樂府使君從南來五馬立踟蹰可証太守五馬漢時已有之今却引宋人五色線集北齊栁元伯事此何異流俗類書所收王羲之為永嘉太守庭列五馬乎以上特略舉其槪他若黄河十月氷三車肯載書危沙折花當諸觧皆鑿而無取雖其說假託鉅公以行然塗鴉續貂貽誤後學此不可以無正者也李善注文選止考某事出某書若其意義所在貫穿聨絡則俟索解人自得之此正引而不發之㫖黄山谷亦云欲於欣然㑹意處略箋數語終以汨没世俗不暇今人章為之解句為之釋已非逹人所宜况又絫牘不休有專注秋興八首至衍成巻帙者此何異昔人解曰若稽古四字乃作數萬餘言雖罄剡溪之藤書之豈能竟乎此又不可以無正者也夫子美固非知道者然道莫重於君臣父子矣三百篇得列為經亦在邇之事父逺之事君子美之詩憂君父之播遷憤亂賊之接踵深𠂻悱惻千彚萬状使後人把巻徬徨而不忍釋則雖謂之知道可也因讀其詩者之誤解而引繩批根刋正其失而暴著其所以然使世之學者因是以進求夫三百之大指亦未必非知道之君子所樂許也先生以為何如與楊令若論大學補傳書大學古本與中庸俱出小戴禮原不分經傳于今本經文末節下即接此謂知本此謂知之至也二句次接所謂誠其意者一章程明道改本亦未分經傳于今經文首三節下接康誥曰一章次接湯之盤銘一章邦畿千里三節次接古之欲明明德四節乃接此謂知本此謂知之至也二句所謂誠其意者一章伊川始分經傳更定如今本所次文理粲然通貫而明道本遂廢朱子又以格致傳闕為之補亡其所作章句或問至于今家傳人誦無可遺議矣厥後名儒若董氏槐葉氏夢鼎王氏柏皆謂傳未嘗闕特簡編錯亂考定者未詳正其序爾遂欲移經文知止以下二節置于子曰聽訟節之上以為傳之四章釋致知格物車氏清臣嘗為書以辨其說之可信至蔡氏清又欲移物有本末節于前次以知止一節又次以聽訟一節而以此謂知之至也終之吾邑徐氏師曽謂蔡說最為近理使朱子復生未必不改而從此愚謂蔡固有理不如前說尤當葢明新之止至善三章已釋之矣止至善之功非知無由入故以知止有定承之學者急于求知恒有躐等逆施之患故以物有本末承之二條皆釋致知格物葢致知即致知止之知格物即格物有本末之物也無訟為新民之事而其本只在明德知此則知無不致故又引子言以申之如此解章内竝無衍文亦竝無闕文而朱子之補傳誠為贅辭矣若如今本所分經傳而以四章為釋本末則本末始終語原對舉本末釋矣終始何獨無釋乎足下謂經文首節列三綱領次節申言止至善三節作一結四五節列八條目申言先後之序六七節又作一結使移知止于傳恐經文未完愚謂古人文字何必拘拘承應後人說書則然耳今以古之欲明明德節直接首節條列明德新民之目而至善之所當止已在其中末乃以修身為歸宿此其文義亦豈不粲然而通貫乎至于致知格物之解注疏迂謬不必言諸儒有訓格為正者有訓格為扞格之格物為物欲之物與外物之物者皆屬偏見愚謂六經言物不同或對人言物或對已言物或即事言物格物之物則兼内外苞精粗如哀公問所云成身不過乎物父子一物也非慈孝則不成父子耳目一物也非聰明則不成耳目無形之物必假有形之物以實之故曰不誠無物即今就經文論天下國家皆物也身心意亦物也意何以誠心何以正身何以修家國天下何以齊治平即格物也格物之本則當于身心意求明德之事未窮之于至善焉非格也格物之末則當于天下國家求新民之事未窮之于至善焉非格也格之既精斯物皆天則微無不燭廣無不通物格知至道固如是爾朱子窮至事物之理原無弊夫事物有内外有精粗理則豈有内外精粗之判哉格物者格其物之所以内所以外所以精所以粗即格其物之所以無内外無精粗者斯已矣此其義與中庸之尊德性道問學相表裏如外事物而言格致猶之外問學而言德性是為談禪宗者助之燄也足下近日耽西方之書至引大覺云云以解格致愚謂彼教與吾儒畢竟毫髮千里不當比而合之比而合之是古人所云融瓶盤釵釧為一金攪酥酪醍醐為一味也昌黎原道乃闢佛之最粗者考亭釋氏論斥其以心覓心恐尚屬影響惟荆川中庸輯略序能實指二教分别處幸足下更究其說王魯齋先生說此章云既立三綱文勢即當繼之以目今怱以知止一段承接語脉反緩葢知字為聖學宗主致知者知之始學之先也知止者致知之效學之功也若此處等閒道破不惟文字無精神而教法亦失先後之序其為錯簡無疑所以然者古本在止于至善傳文之後今乃混在止于至善經文之後錯簡在此非無因耳朱子嘗曰知止至能得是說知至意誠中間事章句云物格知至則知所止矣意誠以下則得所止之序也或問又曰格物致知所以求知至善之所在自誠意至平天下所以求得夫至善而止之也此固分明以知止章為致知傳矣但未遷改耳魯齋此論世多未見今并録之復沈留矦論修志書邑志之不修于今百餘年矣鱸鄉事跡頗備而筆法微欠史裁魯庵水利特詳而典故尚多失考好古君子嘗欲起而訂定之况百年以來人物之瓌奇文章之𢎞富水利賦役之變更已大非二公之舊不及今攟拾前聞蒐討佚事後必至放失磨滅而不可復求夫郡邑之有志昉于周官小史由來尚已史局開纂大者據實録小者據家乘稗編然實録分修主裁非皆良史稗編雜出採摭或誤傳聞家乘略可信矣而碑誌半諛墓之詞子孫多溢美之語惟郡邑二志修之得人則聞見眞而網羅備一方文獻即國史權輿其事豈不重哉又况喪亂以來故家譜系日就銷亡人事遷移漸趨茫昧及此時而大肆考求使三百年之典故粲然明備以佐異日良史之取裁豈非吾黨諸君子之責哉今者郡邑有司咸議及此徵辟之檄下逮菲才畢力觚棱無所逃命然以愚過計竊諰諰不敢直任者一曰田賦之難覈也一曰水利之難詳也一曰人物之難定也吾邑糧額甲于海内大姧巨猾叢蠧其中影射那移閃若神鬼兵燹而後色目滋繁或潛紊其規或盡去其籍昔魯菴先生以名縉紳領此役攤荒實數究不能問諸總計之人况在于今日哉其尤甚者官與吏為市上與下相䝉驗𣲖重輕全無準則㑹計增減時有更移私家之詭借逾工賦額之叠増未己率然登簡後代何觀吾謂田賦之難覈者此也吾邑為江湖之㑹談水利者莫詳于史處士明古沈憲副江村滄桑旣改故道全非二都南三都西之水向入太湖今多出湖矣太湖向由長橋逕吳淞江入海今長橋至龎山湖壅咽不利乃邐迤而南多從徹浦橋諸處東入白蜆江矣土壩之設大阻通流茭葦之區全壅水脉某處為上流宜疏某處為下流宜洩此非汎舟規度原委何以周知昔江村公修水志必偕白丞遊歷四境然後其書若圖始成今洪波出没水宿誰任其勞輕舸往來裹糧孰資其費若專委區總疎誤必多吾謂水利之難詳者此也吾邑名賢輩出文藝飈馳行實必核之鄉評事功必稽之宦蹟其間豈無寸瑕而損玉價魚目而混珠光者乎情面少狥則來穢史之譏筆削不私懼有枋頭之憾加以吾輩人地輕微易為媒蘖叢疑集謗誰與證明昔嘉靖中姑蘇志之修祝希哲分任人物文學諸傳其時己不無煩嘖頼王文恪公主㫁故郡志卒潰于成今誰為文恪其人哉吾謂人物之難定者此也往例修志必居以館舍資以餼廩給以胥役而徵文考典動淹歲時執簡屬詞勢難促迫萬一人異其懷旁掣其肘中道沮格汗青無期忌口听听必将責以受直怠事糜費無功前此支給公帑不知作何破除此其獲戾又不止三者之難而已也鯫生鄙見如欲攟拾舊聞蒐討逸事莫若私事編纂而不領于官旣可備掌故之役亦可為名山之藏他日有著作大手筆如鱸鄉魯菴二公者出焉則資之以佐採録此亦不朽盛事而今尚非其時也足下垂問縷縷故敢悉其愚某再拜龔介睂曰絶類劉子𤣥論史事書寄王玠右書文場建鼔夙仰雲間大雅扶輪羣推海上卧子金聲於前尊兄玉亮於後洵所謂筆精墨妙領袖英絶者矣二紀以來風流徂謝陸機入洛非忘吳國之牙門阮籍憂時亦詣都亭而奏記庾子山開府之後淚己盡於鄉闗盧藏用隨駕之餘身終辭乎少室側聞晜仲嘉尚獨存遼海孤蹤惟餘皂帽柴桑九日併斷白衣而且清不疵物隠不為名敦履璞沈甘混跡於牧豕道風冲素豈希髙於挂瓢范蔚宗之論逸民誠莫尚己袁太尉之傳真隠又何恧焉頃者徐子崧芝來自貴里備陳清軌卓爾難攀猥以賤子特蒙垂訊居非桞樹遥共鍛於山陽地異漆園幸通蘧於蝶夢欽挹既至欣忭滋深但聞尊兄曩因文字戒心遂爾編摩斷手揆之鄙懐竊所未喻夫隠淪無用此寧志士所甘韜晦勿傳亦乃過中之慮古之芝耕雲卧者靡不以六經為琴筝百氏為肴饌河汾中說講撰莫盛於牛溪甫里叢書抉擿尤精於麟筆醉鄉學士東臯之論著彌工野耄司空光啟之篇章不少若必銷沈符采鏟落文詞則後世何所據以述稱此生遂真儕於樵牧曷貴夫藴藉丘中抗懐塵外者哉僕嬾似稽生渴同園令少時燭武早不如人老去師丹惛然多忘目游經苑聊自附於緯蕭手撰文章敢妄矜乎夢鳥𤣥疑尚白未遇侯芭病好譏彈嘗聞子建望停雲於遥浦搔首如何仰斤削於郢人疏麻莫展桃花浪暖期為泖上之遊蘭徑風清欲命機山之駕披馬季長之絳帳欣與談經過鄭次卿之蟻陂庶同折芰寄徐太史健菴論經學書六經之學漢興之唐衍之宋大明之至今日而衰其興也以不專一說而興其衰也以固守一說而衰何則學成于信者也信生于辨辨生于疑疑生于不一說當漢之初易有田丁京費諸家詩有申轅韓毛諸家書有伏生夏侯歐陽諸家禮則稱后蒼戴慶諸家春秋則稱左公穀三家各立專門遞相傳授辨難擊排不遺餘力由是而是非之論出焉李唐以後緯書失傳諸家之學亦多致亡闕而說經者乃漸趨于一及有宋諸大儒出理析毫芒義窮杪忽聖賢之微文奥指始炳然如日月中天無復翳昧注疏雖頒學官咸視為蕞殘玉屑而古義幾熸矣其在于今襲沿既久影響彌多人皆惘惘焉如㝠行者之擿埴索塗雖闗閩濓洛之遺書亦罔知省覽而况漢唐以來諸儒之說乎葢自帖義混淆經術蕪没狂瞽相師茫昧白首疑既無之信于何有此則固守一說者為之閡也夫宋儒詮理誠得不傳之學若夫箋解名物訓詁事類必以近古者為得其真今也専奉四大儒為祖禰而孔毛馬鄭十數公盡舉而祧毁之何怪乎通經致用者之世罕其人乎即曰束于功令然制科之與古學不妨分為二塗故古人治經患在多異說今人治經又患在専一說也不佞齡窽啟寡聞竊嘗披覽諸籍讀左傳易卦諸繫辭皆取于象李伯紀云含象以求易猶舍日月星辰而觀天始知易之不可専言理也讀潁濱東萊詩傳及馬端臨之論小序始知詩序之不可盡刪也讀東坡與黄文叔鄒晉昭書解始知蔡傳之不足盡書義也春秋則三傳竝立不當盡去之而宗胡戴記則儀禮為經不當反遺之而取傳蓄疑者有年既而讀歐陽永叔之言曰先儒之論苟非詳其終始而抵牾質諸聖人而悖有不得已而改易者何必好為異論以相訾也乃喟然興曰漢唐諸儒之説去古未逺其見棄於近儒之排斥者豈皆秕稗而無嘉穀哉又讀正學先生之言曰經傳非一家之書則其説亦非一人所能盡世人黨所聞而不顧理之是非皆非朱子意也乃復喟然興曰先儒是非之論至朱子始定然朱子亦豈謂己之所是非必無待後人之審擇哉夫理之藴于經猶水之藴于地也甃井以出水而或取之以蠡勺或取之以缾罍或取之以甕盎隨器之大小為汲之淺深及􅏕而飲之則皆水也于蠡勺缾罍甕盎奚别焉是故説經者亦求其至是而已矣理苟存焉部婁可傳崇山理苟不存寶珪亦同燕石愚用是網羅古今經解衷以臆説輯成毛詩通義尚書埤傳禹貢長箋讀左日鈔諸書而先出埤傳是止于高明長者葢以尚書古稱樸學從事者葢寡鈍翁先生見之急捐槖佽鐫為諸公倡今已就其半矣草澤陳人從未敢緘牘京華特以今日文章道義之望咸歸重于先生又昔年忝辱交遊之末故敢郵寄所梓上塵台覽倘中有可采望賜以序言導其先路庶幾剞劂之役可潰於成俾當世學者去其沾沾株守一説之見而漸進于漢唐諸儒之閫奥以禆益四大儒傳注所未及或亦經典中尺木之一助也幸先生裁而教之陸翼王曰大儒經術之文與友人書足下之屢困于小試也愛足下者必以為唁僕則聞之而喜其唁足下者必勉以敗北之餘期于再舉如古之焚舟而濟厲氣廵城者乃僕之為足下喜則謂足下向跛踦于無用之帖括久矣自今當盡舉而焚棄之益專力于詩文之大業而後足下之學可成名可立也夫以足下之才使得沈酣六籍浸淫沐浴于騷賦詩歌及古文大家之學而大放厥辭上可與古人方駕下亦可抗顔近時作者之林奈何與黄口小兒争工拙于么䯢夢囈之語此斷斷不可也夫賁獲之絶力陸剸犀兕水殪鯨鯢而使之搏鼷鼠于穴中則十不得一足下之于小試亦賁獲搏鼠之類也安望其必得乎且也風趨北阮卜式之進成林士少季羔鴻都之門如騖足下固夙負高世之志者今若低頭就之汨汨俗流隨牒平進尤斷斷不可也昔盧攜相國文章有首尾韋岫决其必貴近王文肅以陳仲醇文有山林氣命之早褫襕襆今足下之文縱為韋岫所賞吾猶願其處而為陳仲醇不願其出而為盧相國也昨又聞足下將有燕京之遊夫輦轂之地五方輻輳金張族處自非上書金馬謁選天曹士人鮮或託足焉足下皇皇然䇿蹇而往將以何為乎如以為索米長安則文通半頃之田士衡三間之屋足下故自不乏如將掃齊相之門候平津之邸竊恐車如流水未便挍書目眯黄沙難求講肄素衣㸃于埃塵白璧輕于求衒又㫁㫁不可也凡此三不可者皆俗子之所效愛勉于足下而僕乃堅持之誠以足下高覽卓識當求自進于古人所相期者甚大慎勿狥俗子之愛勉令僕之轉喜而為唁也某再拜與吳漢槎書計尊兄塞北之徙己二紀于兹矣闗山遼落魚雁銷沈毎於花飄藻網之辰月進蘿幃之夕念及尊兄龍沙極目蛇虺驚心未嘗不慘然魂摇復淒然淚墮也古人如蔡中郎崔亭伯以及韓退之蘇子瞻諸公無不由貶竄窮荒萬死一生中享大名成大著作以垂不朽讀尊兄秋笳集此其驗矣自得南還之信不覺魂舞色飛旦暮希握手流連翹跂之誠以日為嵗而豈意自春徂秋尚留滯京邸耶手線情深倚閭盼久桂樹金英飛天香于洗腆鱸魚玉鱠進甘㫖于盤餐此真人間之大歡極樂也尊兄能不眷眷於此耶弟三十年來奄忽無成始而汎濫詩賦既而黽勉古文後因老友顧寧人以本原之學相朂始湛思覃力于注疏諸經解以及先儒理學諸書今麄有成編謬為識者推許而神智銷亡兩目昏眵無見炳燭餘光自知無幾長為尊兄之所憐愍耳今因小壻例入成均之便先寄拙集一部呈覽極知尊兄應酬雜遝無暇觀此以急欲邀一語之華衮定百年之品題故敢冐昧以請倘南還之策尚稽時月惟冀乙夜餘閒直言評隲昔曹子桓云文之佳惡吾自知之後世誰能定吾文者耶陳伯玉則念前不見古人後不見來者至于愴然淚下鄙人之文若得尊兄論定庶可免于不見來者之憾也已弟雕鐫之書計有三四種小壻行囊不能多載請正其未刻者經學居多俟尊兄到家時當布席茆舎悉出以就權衡作白牛溪數月講論也愚菴小集巻十
