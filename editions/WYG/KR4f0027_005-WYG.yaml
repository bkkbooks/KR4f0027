body:
  text: 愚菴小集卷五吳江朱鶴齡撰七言律清明日小集逺就閣用介白韻萬頃飛瀾湧嘯臺諸峰歴歴泛青來長空氣浄烟初散曠野雲低鶴未廻人坐落花春樹老樽銜返景夕鐘催短笻不厭頻畱駐寄語湖光取次開同包驚幾張九臨過友人村齋自鼔蘭橈問葯房方塘十里半垂楊桃花浪暖紅連㟁竹徑隂深碧滿牀鸎語正愁詩律細篆烟時拂酒船香差池巾舄渾㤀返倚杖看雲興轉狂無殊曰如初日芙蓉天然藻麗題沈畱矦村齋踏盡溪雲草徑斜亂烟茆屋野人家竹間乳雀翻庭翠檻外閒魚蹴浪花盡日采霞供筆格有時招霽䕶蘭芽即看此地饒濠濮豈羡雲門與若耶過周安期山中故居霜葉重重合翠㣲石苔行跡尚依稀身逃谷口名仍在賦就甘泉世已非書帶漫隨寒燒盡薜帷俄逐水烟飛白蓮耆舊多凋謝更與何人共釣磯介白曰悽惋之調丰致嫣然酬姜如須見寄支離一病嘆無憀經案繩牀對緑蕉猿鶴化來機漸息芝蘭焚後淚難消鹿門本自甘遺散臯里憑誰慰寂寥澤芷江蘺無限恨頻傳莫惜五湖遥寒月冷淡銀河夜氣清素娥應怯羽衣輕風庭摵葉飛聲急霜樹驚鴉散影明皎透晶屏燈失熖凉侵玉枕夢難成碧空萬里同含思何處髙樓最有情樵水曰穠麗得之温李結意深長酬周侍御見寄風來梧片氣初凉讀罷南華隠石牀芳草故人頻入夢碧雲新句逺相將當年鍜憶山陽柳此日吟分曲水觴密荇文魚濠上樂幾時蓮艇共廻塘贈侯大將軍斫地悲歌撫劒鐔種𤓰仍自選雲岑門臨大澤龍吟發枕對孤峰鹿徑深黄石秘符畱蕙帳白猿雄術寄松林知君氣槩凌耿賈豈得懐鄉但越吟甫草曰雄渾有氣槩得老杜之一鱗片甲宿虎丘山房蕭瑟凉生澗底松隔林人語襍秋蛩亭畱片石殘霞映劒去空潭碧蘚封燈鴿不聞僧禮磬旛幢惟見佛開容自經鐵馬笙歌歇獨對寒星候曉鐘山夜鐘寒崖寂歴四無聲斷續疎鐘徹曉更響出雲根巖壑動幽通梵力鬼神驚空林葉脫畱烏影滿磵霜飛助月清身世窈然誰得繫頓從初地了無生禊日石湖社集祓除無異永和年玉雪遺坡賞倍妍髙眺鳥從遊舄度醉吟人倚落花眠緑楊影裏垂纎手紅藥欄前鬭綵箋惆悵日䦨回畵舫沙堤只見草芊芊無殊曰清綺絶倫風調不乏唐瞿瞿老師過訪隠几何人問鶡冠忽來仙舫繫漁竿逢迎止覺兒童樸粗糲猶堪長者餐移簟接凉花氣永吹燈受月夜聲殘相看短鬢饒悲涕休訴人間行路難訪山中逸人層崖策杖此幽尋烏几髙閒處士心挂壁雲蘿深在眼啄窗野鳥解當襟林梢葉落供茶竈竹徑風廻響玉琴一自石門乗興至始知丘壑有清音安節曰五六幽韻天然韋柳集中特秀之句賦得天寒有鶴守梅花空林皓魄澹春姿冷艶偏宜瘦翮支素手不須尋翠羽霜衣正似啄瑶池光翻傍水渾難辨影亂臨風只對垂清唳九臯聲自逺休將玉笛更横吹寄趙大庾先生擁褐空山道未貧蕭齋磬響一孤臣身埋豹霧真㤀世樹長龍鱗始覺春錦字三年懷不滅輪腸百轉向誰陳天邊卧柳毿毿發寂寞荷衣但隠淪晩梅萬樹飄殘覆地香一枝深照讀書堂凍収露井方垂艶夢冷瑶臺更結芳自是韻孤嫌妬雪須知骨老為經霜亭亭獨靣斜陽立収拾春風意總長春日遣懷寄金孝章畏人甘自老墻東閒卧繩牀數落紅蜂出暖沾桃葉露燕歸輕倚楝花風直鈎作釣終何得壌室編蓬可送窮頼有潛夫能枉訊應憐潘鬢已衰翁聞無殊自上沙遷光福有寄千林草樹總涵春為選幽巖更結隣藝圃未須移舊竹搴芳還欲採新蘋苕顔爛漫延嘉客燕語逢迎得主人定賦小園同庾信覆杯花底莫辭頻𢎞人曰􅈺雅之章字字穏愜寄雲間王玠右名世機山雲樹鬱綿芊聞道徴君豹隠堅藥種東臯惟佐釀琴彈栗里不須絃筆蒲翠映長源架袍草烟和子敬氊知爾池塘多勝詠肻憑雁翼寄新箋阻雪雲窩林若撫胡白叔諸公偕集限用鵝字蕭齋擁膝動㣲哦剥啄欣聞長者過石凍有聲風葉亂窗寒無影雪花多論詩細覺心如髪對酒貪看色似鵝興永不知深漏盡髙歌無奈别離何寄題介白山居徧選林泉此地幽毿毿樹影抱溪流松廬寒枕過新瀑竹塢晴花聽午鳩四逺嵐光吟際合半空雲氣管中収知君采勝乗身健日坐峰頭稱㝠搜安節曰山林詩能作温麗語有王右丞風調詠菜花黄雲一望陌阡連偏稱村翁貰酒眠色粲金繩誰布地光連鸎羽欲浮天低風錦合千重障炙日香濃百和烟更羡麥畦青界道野花分綴亦嫣然送包朗威芒屩衝寒自擔簦送君南浦淚沾膺霜深古驛千行雁風急長河萬里氷易水孤津須暫駐燕臺落景莫輕登即看廻策山花發叢桂應添翠幾層同陳確菴諸子集寳晉齋得誰字清簟疎簾倒接䍦髙文披賞共搘頥庭前花影魚争啖壁上蟲書鳥慣窺避暍正宜林䕃滿徴歌頻愬酒行遲醉來散髪茆簷下野外風流笑屬誰過顧茂倫村居二首蒹葭積水浸蝸廬菜甲荒畦手自鋤花氣作霞來翠羽酒香成霧引文魚從封不發周南憤結客空傳濟北書坐挹朝暾晞短髪問竒誰過子雲居髙士逃名此灌園壯顔甘自憇丘樊浴鳬枉渚從風立巻蘀疎林帶雨翻時爇水沈開秘册獨招窗霽䕶蘭蓀桔橰機息渾無累何謝龎公隠鹿門介白曰清事獨能寫出淡中見綺頗似嘉州謁三髙祠荒祠烟草接平沙千載髙風起嘆嗟霸氣蒼茫歸釣艇清名浩蕩落秋葭庭垂野蔓波紋動碑沒深苔日景斜擾擾塵纓自來往雪灘誰遣薦蘋花假我堂文醼蕭蕭落葉正愁予哲匠髙論酒戒除飬拙自􅅓同土木成書漫擬注蟲魚樽傳白墮揮渠椀饌具伊蒲佐蟹胥招隠桂叢今得主東皋十畆伴誅鋤重陽後一日醼集次韻籬外霜英綻幾時追歡還與素心期茰殘玉臂猶堪佩酒宿金樽好共持紅豆徴歌彈往淚朱絃汎響發遥悲寒城又聽秋砧發濩落愁看鬢已絲𢎞人曰雅極矣却帶悲凉此中晩人調燈花和顧麟士洞戸佳人未掩帷寒燈一穗正垂垂無端乍喜騰烟出有待還嫌結蘂遲焰滿銀屏從自落光沈雪幌莫輕吹朝來聽鏡音書到挑盡寒燈遲所思又作蘭膏剪罷復流妍也學春葩粲錦筵自蕚自跗寜有蒂俄開俄謝幾時鮮蘂連巧障寒檠炤煤細終汚彩鳳箋最笑炧光垂欲盡撲蛾甘向火珠煎送陳孝則還雲間水漲桃花鼔枻遲友情尤重是臨岐泖峰雁字通鄉夢吳苑鸎歌攪客思共展霞箋騰洛誦獨攜雪巻返山籬海東烟島三春暮何處磯頭理釣絲南草曰停匀婉蒨情味悠然是錢劉一𣲖連理榆白榆厯厯種天維影落人間竝幹竒發籟韻舍絃律吕衝星光映匣雄雌玉衡星散為榆合歡靈卉原同性竝命仙禽許壓枝青葢婆娑情不少勞生何事苦分離放生池佛日長懸曲沼頭遊鱗唼嚼葦花秋風吹細浪舒文藻月印寒沙起狎鷗悦性已寛吞餌厄㤀機真失挺义愁白蓮開處龍吟寂濠上于今有十洲安節曰四詩婉約清新無雕刻之痕有雋永之味次和侯漕臺冬至日登金山陽律初回覽物華江天晴納海門霞浮空草樹迎騶唱跋浪魚龍避劒花雲氣近隨清梵出雁聲遥送暝烟斜不須候吏催官燭自有寒星伴使車友人過訪門對春塘亂柳花髙軒枉駐已棲鴉㡌簷不礙疎簾入香印深移漏鼔撾漫道徑荒鋤栗里敢云𤣥草疏侯芭雙瓶欲盡愁無奈金井桐隂月色斜梅村先生過訪十年魚素杳江湘欲采芙蓉逺寄將忽訪席門驚上客旋彈瑶瑟奏清商鮮羮白芼園菘滑軟飯紅炊野稻香感往莫論吳社事耆英今已半彫亾時先生述吳社始末新月清光瀲瀲到髙樓旋漏松隂一㸃幽素女霓裳初鏤扇廣寒雲幔正懸鈎近人恐著新華鬢縁物應憐半敝裘却笑去家才百里何勞飛鏡攪深愁介白曰刻意標新晩唐詩之最工者襍興㶚水橋邊記别離瓊枝百尺想光儀斑騅不返青絲鞚寶瑟空彈白紵詞拂靣晴花翻錦蝶薫衣香草浸華池那堪獨坐銷清晝强進玻瓈遣鬱伊送洪學博之任永定地盡甌閩嶺萬重犢轅惟有短檠從儒林祭酒推何𦙍漢史神君頌魯恭吏牘擬將花管判訟堂閒對岫雲封卧龍山外行春日應憶新宫五鬛松遣興二首虞山作歌舞誰將紀夢華園林罨畫每興嗟卧麟尚認前朝塜起柳偏依處士家水帶篆紋清不改山横睂嫵翠交加簷花故忤愁人意時罥晴絲撲綘紗清關棐几浄無塵薲葉苕花刺眼新避債那求銀汞術防愁預買石橊春康成帶草當青箑栗里巾車勝皂輪獨抱遺經酬歳月吳差山下織簾人九臨曰沈鬱悲凉不使人一望知為學杜乃深于杜者也喜吳𢎞人聞夏歸里兼懷漢槎春生凍解負氷魚喜爾南旋慰索居天與雪霜才漸老世寛羅網日初舒梅坡舊徑邀鶯友竹院新隂理蠧書亭伯那堪猶北滯朔風回首更愁予登快風閣萬頃波爛一望収披襟頓豁古今愁繞廊樹影連遥溆迎檻山光湧碧流夾浦雲歸漁市晩淞江雪滿荻花秋憑欄不盡滄洲興便欲蒲帆上釣舟又作傑閣崔嵬踞水隈長風疑送楚王臺波澄玉鏡窺鮫織月湧珠宫識蚌胎東海蜃樓當檻出西山霞綺照盃來凉生秪覺烟濤逺欲賦慙無宋玉才茂倫曰前作情景清幽後作氣象閎濶竝一時偉搆寄徐昭法二首一别精廬歳月徂比來曾有宿舂無身窮壑谷能逃忌隠託文章不厭孤春院繁英傷錦繡秋風落葉感菰蒲稻粱那得縻黄鵠莫怪長飢化白鳬杜詩黄鵠髙于五尺童化為白鳬似老翁山館悽清五夜鐘知君鈆槧興難慵松龕火出書帷細草徑烟封筆格濃可為問竒量酒戸惟因讀史發辭鋒相思髣髴林梢月惆悵雲巒隔萬重寄安節江楓菴瓢笠蕭然似退僧每攜書卷寄三乗菴荒晝給伊蒲飯客散寒依丈室燈夾㟁疎林明野燒背村淺水出漁罾如余亦是祇園侣欲遣塵勞愧未能丙午除夕卒歳無如此日難也須草草具辛盤衰容暗逐浮烟換薄態全從覆雨看乞食敢憑蒼玉珮駐顔難覓紫金丹欲驅貧鬼愁無術且爆簷前竹數竿丁未元旦曙光猶帶臘餘寒三素雲開卜履端梅吐玉鱗明浄榥柳含金縷曵朱欄年豐未若征徭减世泰先應網罟寛歳酒漫拈循故事低頭却愧野人冠介白曰悲惋之音翻成贍麗當于許渾劉滄間求之無題四首倦繡巡簷立景斜蘭風旖旎透窗紗撩愁最是宜男草罥恨無如解語花雲殢陽臺殘夢斷月明湘浦逺峰遮那堪離别人千里日見歸鴉趂晩霞夜合花開綺閣虛誰家陌上駐香車寶奩鏡掃螺紋細銀甲筝横雁翅舒可奈雙棲梁紫燕生憎竝蒂沼紅蕖鮫綃十幅空沾淚不見西來尺素書一葉梧桐墮井榦錦衾誰信此生單雲綃霧縠氷肌重桂燼香筒玉簟寒凉宇月輪凄絡緯綘河星采動䦨干已知雞卜渾難定獨掩空閨聽漏殘短夢初廻玳瑁牀博山沈水懶添香重幃月沁寒先覺洞户霜侵夜漸長彈罷瑶琴憑寫恨織成錦字寄誰將臨糚不禁悲填臆嫁日羅襦在玉箱安節曰情辭相傅不失唐音一味雕繪便入俗筆挽沈治佐童孺交遊盡此辰寢門彈淚欲沾巾幾時撤瑟音無訃隔歳披帷跡遂陳書帙蠧乾蒿里月筆牀塵鎖夜臺春修文同調知多少好譜新辭奏玉宸治佐工小令垂虹亭過徐太史公肅舟中魯望祠前繫桂舟逢迎半是素心儔白鷗對舞楓江暮紅葉初飛荻㟁秋巻幔汀洲延逺眺移橈烟雨入㝠搜金華羡爾鶱騰早應念泥塗雪滿頭寄陸孝山太守露冕風清海嶠秋一時文采動炎州丹梯峽寺皈初地畵鷁珠江咏勝遊挾策未知千石貴放衙惟對萬峯稠曲江祠屋今何處好薦蘋花駐碧油介白曰結語妙有風味過斜港嚴氏隠居四湖天外碧濤虚林樾重重覆古廬園似子山桐露潤徑同栗里菊籬疎花間滿引東臯釀石畔閒看汜勝書我亦有懐棲十畝此身無計謝煩挐天香閣小飲文桂千層散晩芳小樓開眺促飛觴香鋪甲煎從風逺色爛金繩帶露凉仙子似移天竺種月娥疑捧帝臺漿拍浮正值彫胡美只此薌林是醉鄉無殊曰格調俊整五六用事妙在使人不覺蠟梅庾林先試鞠衣裝雅稱佳人畵額粧蒸栗色同偏耐凍旃檀香亞獨凌霜流黄機上光零亂金雀釵頭佩恰當最愛冷芳凝小院不隨春色㸃含章紅梅氷雪肌膚本絶塵胭脂淡抹倍宜人曉霞暈著春風靣紅玉嬌添半醉身逞艶故將朱㸃素憎寒須藉錦成䄄漁郎若解東皇意悔向桃源更問津玉蘭一樹瑶光裹雪痕根移上苑玉溫黁門迎風乍拭何郎粉裛露新廻素女魂縞袖颺去空春晼晩玉簫吹夢月黄昏香林寂寂疑無夜姑射山頭許共論西府海棠韻姿旖旎占春殘仙種西來覆井榦蕚吐嬌紅饒早豔葩舒淡冶怯餘寒玉環小睡肌全膩飛燕回風臉半丹贏得小亭遮麗色凭䦨直作錦城看紫芍藥紫豔翻堦殿衆芳洛陽魏后更凝粧熏衣欲染胭脂色照盞交融琥珀光瓣剪綘霞風正暖香籠錦幔日初黄麗華直得傾城國笑酹花神酒一觴玫瑰熖發丹跗與綘房花林難竝此芬芳擎來色奪紅綾餤齅去香流百蘊湯揷髻麝熏勾謝女佩囊霞爛惜檀郎殘膏剰馥休相棄汁滓猶堪擅食方茉莉素馥纎纎海外芳千金攜得越來裝星離不異敷瓊屑露摘俄看滿玉筐新浴搔頭宜贈佩夕凉欹枕暗生香也知花意迎人意故韞瑶華待晩糚菊花籬間金蘂漫縱横莫訝精神太瘦生種貴延年堪送老人能載酒可同傾甘馨露下含芳淡疎放燈前取影清杜詩菊蘂凄疎放陶徑不須愁落瓣靈均原自解餐英孝章曰詠物詩不切則泛太切則黏離即之間情景傅合旖旎香艶齒頰流芬諸作已擅其勝寄計甫草二首竹西歌吹近如何猶憶當年醉綺羅見說物華仍盛麗豈無陳跡感婆娑蕪城蔓草愁中度隋苑荒烟亂後多知爾賦才明逺敵江郵先寄慰漁蓑别君殘臘又春華烟月揚州自昔誇玉蘂觀前花亂發茱茰灣下鼔頻撾因人暫可趨公府覽古應深弔帝家義山詩欲取蕪城作帝家更喜逢迎多勝侣文樓會詠爛如霞檗菴和尚駐錫邑之大悲菴敬呈二律蕭然瓶鉢寄荒城三十年來頌政清花雨徧霑吳澤國法筵仍坐魯諸生雲窺丈室天香細月印寒林積水明浪說禪宗多老宿衲衣將相有誰爭法幢隨指素緇迎野外茒菴即化城噩夢醒來銷五濁晨鐘悟後得三生氷霜到老天難問風雨空山道始成覺路津梁知不逺獨慚潦倒俗塵嬰介白曰清沁絶塵純是禪悟和安節南村詩二首年來無地寄漁竿茆屋南村自可安竹外看山常曉櫛花邊隠几獨危冠禪心不待晨鐘悟世味真同木槿觀㫄舎若容吾伴侣梧風蕉雨足盤桓便賦鷦鷯托此身心閒何處少松筠林開水府氷綃淨座引嵐光翠髻匀屋角迎陽𤓰種美籬門過雨藥苖新蕭條只憶徐髙士詞翰時親即比隣嚴園作松篁不厭屢經過香霧氤氳此地多滿徑緑隂遮筆格半簾紅雨落庭莎花如垂手傾城笑鳥解臨軒宛轉歌便欲薫然解襟帶相看不飲奈愁何寄題張虞山草堂石板橋西一草堂淮流遶檻即滄浪雲霞曉色連書幌水木清暉汎隠囊奕罷嵐光方獻笑吟成竹影欲浮凉射陽只隔垂虹月乗興應須溯渺茫送嚴顥亭都諫月卿人望一時稀入對先還舊𤨏闈九五方須調玉燭湖山豈得戀烟霏衣薫戊夜趨晨漏珮響丁東傍太㣲為屬封章頻上殿哀鴻今日滿江畿時頻年水旱讀梅村永和宫詞有感作永和妃子承恩最錦瑟銀筝亦暫娛翻幸未秋辭玉簟得從衰草奉珠襦思陵烈崩李賊自成藳葬之於貴妃塋旁松楸露冷蘭叢斷環珮聲悽月影孤莫道宸遊泥去歌舞椒宫從未巻龍鬚黄心甫曰老杜未聞夏殷衰中自誅褒妲昔人以為格意俱髙迥出樂天夢得之上余於此詩亦云生日自嘲生計惟憑一釣車浮名真笑槿朝華逢人欲下頭三拜用方干事得韻難成手八义用温庭筠事鏡賣青銅長廢鑷書殘敝篋半侵蝸一生編纂曾何用只博他年覆甕賖送棐民弟司訓清河秋風五兩去片帆輕千里江楓引客程愧我藜牀難煑字多君綘幄好横經淮山地接書門近楚澤波來泗水清料得寒齋供苜蓿咿唔猶是老諸生送友人北上春風拂拂試征襦攜手沙頭醉玉壺驥足自應馳萬里珠光今始照三都花髙上苑紅英發日射觚棱紫氣孤京洛故人多得意莫言公叔老樵蘇虎丘散歩山光樹影褁樓臺誰問當時舊劫灰月幌清歌年少樂松隂細語麗人來香魂尚殢墳前草覇氣長埋石上苔日到落棠催客去滿江簫鼔正喧豗沈融谷曰三四清麗五六悲凉結語應起最有法寄毛大可落葉蕭森送短檠停雲東望倍含情辭華盡攬稽山秀筆翠紛披簜竹英㝠㝠魚龍秋作夜棼棼珉玉墨為兵何時對翦雞窗燭詩苑憑君定品衡贈周伯衡觀察公瑾聲名海内馳行軒惟見錦囊隨論詩細欲分宫徴愛士真如解渴饑故苑雲霞吞綵筆新春花鳥候清巵杜陵千首能同讀載酒還期共析疑贈陳賡明十年傾倒未通郵欲寄蘋花隔逺洲書著幽求慚土木名騰洛誦仰曹劉清流盡入平輿論佚簡還從石戸搜自笑越人顦顇甚何應得上鄂君舟過華及堂酬晉賢次韻君家兄弟氣如虹比興抽毫句竝工玉斚乍揮浮竹葉金徽徐引汎松風共看劒氣連書屋不覺霜華上井桐醉後放談彌滚滚渾㤀今夕是衰翁詠史海録遺編手自披百年丁運欲何之鐵函怨史文難滅釣瀬狂歌鬼亦悲匹馬居庸符白雀雙丸淮右整朱旗不知王戴諸山叟王逢戴良軰底事終身痛黍離寄王太常煙客先生盛代元臣奕世昌東田容與玩年芳天家鼎軸畱耆舊海外神仙接溟茫漫許龍媒空馬肆敢將魚目混珠光先生盛推余文為弇州後一人故云還期伏勝傳經日函丈追趨捧鶴觴丙辰元旦匡牀晏起自由身又見青陽轉大鈞梅蕊暖移階靣日椒花香破甕頭春畏聞羽檄喧南國時閩中告警愁說泉臺半故人睂生笻在確菴孝章甫草相繼訃至歩健且乗晴昊出東風輕颺柳塘新徐季重曰風致純近元白送海曙客越州兼呈許竹隠二守西風吹上髩毛斑萬壑十巖指顧間豈作阮瑜淹記室自同禽慶訪名山雲生禹穴疑珪璧月冷耶溪想珮環𤣥度若詢垂釣客為言窮獨老柴關丁巳除夕有感作雪髩驚心歳臘終辛勤蠧簡策何功天為故國畱羸老人笑名山飽阨窮守道任逢圗鼎魅折躬甘作叩頭蟲寒宵擁褐難成寐坐待牆東曉色融戊午元日寒威偏劇野人家歳酒逡廵老倍嗟甲子瞥過同綘縣衣冠藏弆尚元嘉藥開舊裹扶衰病詩覓新箋待物華密霰隂雲交罨戸南枝何處訪梅花贈九臨白髪江南有幾人多君被褐老松筠甘陵久挂清流籍洛社今推獨行身讀易亢龍常廢巻誦詩離黍倍傷神庭花爛發知春在獨倚樓中眺望新張居獨倚樓取杜詩行藏獨倚樓為名酬張大行穉恭張關中人平子文章擅石渠每于謦咳借光譽夏聲夙仰三峰秀新句忻傳五色書經術敢云希子政賦心還欲訪相如儀刑咫尺懸情切肯許柴門候掃除錢宫聲過訪畱小飲清才驚喜接應徐病起繩牀興有餘筐庋欲傾新解佩笠車追數舊相於尊銜落景林花笑燭剪深更夜月虚安得歩兵三百斛泥君長醉遣居諸送徐健菴宫諭服闋還朝偉長才譽早嶙峋十載辭臣侍玉宸讀禮素冠多論撰趨朝黄閤綰絲綸離情旅館銀鐙亂祖帳排江畵鷁新旦晩回翔龍尾地可能憶及緯蕭人歳暮雜詩六首獻書未逹九重天澤鷺浮沉二十年章甫早知難適越蒯緱無分迥遊燕羌山髙士稱同學沈麟士隠吳羌山注釋五經至八十不倦江上漁翁許並船江上漁翁見宋史隠逸傳若得姓名垂異代不知青簡共誰編舊物相隨止角巾長貧恥作逐貧人抛書始識閒中趣習静稍安病裏身綘雪駐年何處覔藜􅃵適口且全真餘生萬事都零落猶自朝朝禮玉宸蕞殘何事尚拳拳編緝偏教疾病纒敝榻有縁同寄繭清宵無夢到鈞天勤看魄影依牕入倦聽鐘聲向枕傳鼎鼎百年虛歳月敢將述作比前賢顧亭林魏叔子稱余經學諸書可為先儒羽翼汪鈍翁稱余毛詩通義當與嚴氏詩緝並傳故云褐衣晨擁坐檐端羽箑捐來未覺寒歳燠冬深稀肅殺民窮榖賤轉艱難茶園稅欲荒山渚陸龜䝉有顧渚茶園下潠租應惱上官陶淵明穫田下潠藥物裹殘兼槖罄空庭徙倚百憂攅知交海内一亭林避爵飄然太華隂久别芝顔成北客時貽帳秘勝南金亭林極推余書傳左鈔為細校訛字以所著百餘條恵貽增入龍蛇厄至誰能贖山水人亡遂絶音書種後來可得繼夢回枯眼涙霪霪筋力全衰強自持鑪錘大冶任盈虧鼠肝蟲臂原無著寶鏡珠囊亦有涯花供膽瓶充飫目月來籬落玩搘頤耋嗟缶鼓心均累一巻南華是我師愚菴小集卷五
