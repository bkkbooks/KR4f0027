body:
  text: 附録傳家質言余資甚椎魯清羸骨立少時塾師授帖括藝頭涔涔欲睡及授古文辭輒豁然心開自知非科第中人也年十八勉就童子試學使者孫公拔冠軍嗣後以髙等五試棘闈皆報罷遂有著書立名之志先君亦時購四部書助余游獵甲申春館金陵唐儀曹署聞莊烈皇帝變報乃泫然長號曰此何時也尚思以科第顯耶遂決志棄舉子業時年三十七矣嗚呼古人讀書有分年之法經經緯史隨時漸進至三十而學成余也四十以前半荒棄於疢疾半汨没於制科後此雖欲發憤精智已漸銷亡矣然則今之空疎頽落而無所成也曷足怪耶人苟立志修名則謗議謠諑皆吾學問之助余以拳拳著述横罹讒忌然過情之譽亦時有之清夜循省咎過山積惟疾惡如讐嗜古若渴不妄受一文不誑人一語此四言稍可自信耳時論以盩厔李中孚餘姚黄太沖崑山顧寧人及余並稱海内四大布衣余聞之輒愧汗終日迴思生平受人屈辱不少實皆自取爾已自取之于人何咎翻手作雲覆手雨當面輸心背面笑古人早已言之何况余耶三十年來頗知警戢今四方縉紳下交于余者多矣然未經左顧必不先往通謁來則未嘗不往報至于干澤之事尤未嘗濡足雖周親官郡邑不一至其庭焉非曰明髙止祈逺辱庚午辛未間復社盛興舟車之㑹幾徧海内每邑以一二人主其事招致才雋之士大集虎丘其中負盛名矜節槩者固多而借此鑽營竿牘奔競科塲亦實繁有徒至厪天子下詔嚴禁然終明之世不能絕也余時居同川與章子兩生皆不與後余受知邑侯亨宇唐師唐師薦於張天如先生先生欲得余一見然余卒不往也嗚呼交太廣則酬應繁名太髙則造物忌語云閉門造車出門合轍由今觀之大社果非美事而余之不往亦不失為自立骨脊也詩賦一道余本無所能惟少時讀離騷文選喪亂之餘既廢帖義時藉以發其悲憫然資鈍學疎安能與當世之通才巨手鬭其伎倆耶况余賦性褊狹不喜多作妄作代人作恒自哂為詩中之狷後人品目不知置余何等也杜樊川論文以意為主氣為輔詞采為兵衛然意有不同必衷之於理始無弊方正學先生云文本乎理行乎意而導乎氣氣欲其昌不昌則破碎斷裂而不成章意欲其貫不貫則乖離錯揉而繁以亂理欲其無疵有疵則氣澁詞慙雖工而於世無所裨此數言足以盡文章之變余竊有志焉而力則未逮也昔人云先秦無段落兩漢無排偶此實不然段落文章之次第也文無次第則頭訖混殽不成章法矣偶句乃文之鋪排㸃綴處鋪排㸃綴而氣行乎其間但須相文勢所宜耳若文勢須頓挫而以單辭隻句承之便瘠薄無力八大家集中誠無駢儷之句然吾於八大家特師其法耳文至今日豈可全廢修辭作枮木寒鴉之態理本六經法宗八家而秦漢六朝諸史之菁華皆供我鎔鑄不更為文章家之巨觀乎昌黎之論文曰紆餘為妍卓犖為傑今人多不解此二語卓犖者即文賦所云立片言而居要乃一篇之警䇿也紆餘者即子美所云毫髮無遺憾波瀾獨老成也文少波瀾便偪窄無餘地昔吾友語人以作文之法曰敘事外敘事議論外議論人知以議論敘事為文而不知敘事更有敘事議論更有議論此正紆餘與波瀾之説也文必學秦漢詩必學漢魏猶言治而必欲復井田封建也非秦漢之文不可學以學秦漢者究必歸於八家也崆峒圭峰學秦漢者也而所詣何如王濟之弇州于鱗亦學秦漢者也而所詣何如王道思歸熙甫此可以得其大都矣近時海内羣推芝麓芝麓之文長於論史陶練古今氣昌詞贍惜其行太通學太雜交太濫應太冗芝麓亦嘗向余蹙頞言之然而知古文之深者未有如芝麓也語云朋友者長善而救失者也余閉户不妄交然友人中肯規余缺失者實少憶居先母喪時誤捶一悍僮董子誦孫作長牘規余至今感其意余所見前輩尚多此風因筆識之張太史天如居喪嘗過吾邑主沈文學某家時沈太學君張畜女優甚麗某設具於其宅邀往觀焉葉虞部仲韶君張之姊壻也時適在座忽抗手曰内弟欲出家姬使觴以先生在讀禮之日故不敢天如踧踖久之不終宴而去天如又嘗弔孫孟朴之喪舟過鸎脰湖楊解元維斗亦至見有盛湖妓在席維斗曰挾妓弔喪禮乎天如遽麾之去嗚呼葉楊二公之交道可謂摰矣而太史之能受盡言今豈可得哉余平生著述經學居多以朱子掊擊小序太過乃集諸家説疏通序義為毛詩古義闕巻以蔡氏釋書未精撰尚書埤傳十五巻又補二卷以胡氏傳春秋多偏見鑿説乃合唐宋以來諸儒之解撰春秋集説二十二卷又以杜氏注左傳未盡合俗儒又以林注亂之撰讀左日鈔十二巻又補二巻易理至宋儒始明然左傳國語所載占法皆言象也本義精矣而多未備乃主注疏程傳兼通象學博引諸家名周易廣義未幾得脾疾書遂不成僅成廣義略四巻又以禮記注從無善本徐魯庵集注稍勝陳滙澤集説惜撥遺注疏終非古學又中間考訂多疎欲主黄東發日鈔體更取衛湜集解諸書以及大全諸説廣為編緝非數年不成而羣書未具又兩目昏眵不能執簡姑俟之後賢而已杜工部集輯注李義山詩集箋注盛行海内已久然余不欲以此自見也當變革時惟手録杜詩過日每興感靈武回轅之舉故為之箋解遂至終帙又見一越友選時賢詩􅅓薄艷體另為一編故借西崑以曉正之而不知者疑議叢生余一無所辨直付之太虚之鴻爪耳方正學先生云古人文章多藉豐功偉徳以傳今果有其人與即有之余亦無從紀述故小集中夀言與碑銘墓誌多不存非不作也作而不能藉之以傳故不存也陸魯望集中文甚少自云見好泉石則記之遇忠孝志義之事則銘之由魯望而觀則余之所存不既多乎哉呂東萊先生云説經者有鑿説之害又有衍説之害辨其穿鑿删其曼衍而經之不明者鮮矣王伯厚先生云經猶的也一人射之不若衆人射之必有一中善通古義博采今解而經之不明者又鮮矣余經學中詩與春秋尤費苦心以巻帙繁重不能刻今海内惟顧亭林汪鈍翁樂觀余書恐後世未必有桓君山耳
