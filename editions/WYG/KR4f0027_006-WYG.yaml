  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0027_WYG_006-1a, image: WYG1319/WYG1319-0060a.png}
body:
  text: 愚菴小集巻六吳江朱鶴齡撰五言絶句寶華山房作抱犢人偏聚驚弦意獨傷不知幽磵草摇曵為誰芳顧園沾衣桃露溼拂靣桺絲輕一徑春光滿誰來歩履聲古院苔徑潮音寂松隂鐸語空白雲來窈窕常䕶梵王宫過東湖故居斯人不可作門巷老翁迷惟有緋桃色年年發故枝即事二首林静過蕉雨苔新破屐痕花間弄雛罷若個共黄昏名花催得句好鳥喚梳頭習習蘭風至清香滿院浮秋晩樹影動羅幃看雲倚夕暉愁心如隕葉亂向短簷飛遣興霜寒依架菊雨洗入檐松獨坐莓苔石呼童斸野菘七言絶句宿馮竇伯齋中繞廬流水碧于藍展簟烟光起夕嵐永夜披衣翫蕭索數聲清磬響花龕無題蕙風蘭氣滿氷肌斜撫朱絃落指遲却恨清商多苦調紅棃花下譜新詞題蒹葭菴荻㟁蕭蕭萬里風接天波影和霜空數聲清梵寒烟外應有魚龍候曉鐘三江口世傳范蠡載西施處吳宫歌舞惱啼烏國破輕舠去五湖氣盡甬東争一飯一飯見國語不知遺恨浣紗無介白曰此意從無人道出題樵水畵嵌岩烟雨日霏㣲萬壑奔濤濺裌衣若向此中成小築松花滿徑可㤀飢傷史弱翁井逕隂風迸淚流遺書空散白雲秋泉臺莫更求知已執紼何人到寢丘無殊曰意絶可感不忍多讀送孫無言歸黄山二首月觀風亭有勝攀無言久寓揚州天都回首是家山丹楓夾㟁紛相笑遊子歸來鬢已斑到處逢迎一蒯緱雲山幾㸃蓼花秋嚴灘百丈清泠水深照奚囊萬種愁送沈友聖之漢陽哭顧西巘二首獨凌氷雪上江船千里生芻涕淚邊為報故知輕逺道楚天風雨泣啼鵑晴川樓外倚斜曛黄鶴千年杳不聞欲弔左徒何處是惟畱一劒答徐君詠古十首息夫人不言真媿未亾身却共匡牀擅下陳江漢芳蘭雙入夢何須黙黙綺羅春傳稱生堵敖及成王猶未言西子鴟夷載去辱吳娃辛苦陶朱作富家何似終身苧蘿畔雲鬟烟艇蕩荷花漂母一飯千金未覺多功成汜水賞如何只因望報慚漂母鍾室寃沈恨不磨戚姬楚舞悲歌涙滿巾娥姁而主切酸辛吕后字娥姁見史記可憐三尺夷秦項身後難存一婦人卓文君睂黛輕描逺翠侵恩情早定七絃琴如何白首猶移愛羞殺長門賣賦金王昭君一見華容殺畵師君王真解重蛾睂漢恩空訴穹廬月冡草青青盡淚垂緑珠衛尉財雄意氣麄禍樞端為買名姝河陽麗色知無數一􅂮堪酬十斛珠羊皇后一奉鸞輿鼎祚遷金墉椒寢化朝烟只將司馬供嗤笑博取戎王枕上憐劉曜問后我何如司馬家兒后對云云語見晉書蕭皇后歸來塞北侍宫闈隋氏嬪嬙滿目非燈大漫勞申諷諌内庭封事有徐妃楊貴妃華清方賜洗兒錢鼙鼔驚天未一年九馬不西真妻去母妻母用昭君事御牀依舊擁嬋娟無殊曰十詩皆有新出之旨每一首可化作一篇史論碧桃為倪天章作碧桃㸃㸃五更風結子由來候落紅莫問蘼蕪山下去玉田只在畵堂東贈安石周翁八十四首磻溪釣叟不知年容與支笻似散仙破絮䝉頭無一事木魚時響佛燈前書賜先朝手自披清談歴歴義熈時鵝溪肻始畱真蹟不許人間道畵師閱盡繁華世幾更長貧只茹舊藜羮虞山死後誰相問惟有禪燈記姓名清關久已挂綸巾日對松筠茗飲新䭀飯登真原有訣青精䭀飯方見登真隠訣莫愁甑底欲生塵龍舟曲二曲喧喧黄㡌櫂頭郎風湧濤翻萬馬強兩岸畵船齊巻幔不愁濺水濕紅粧沸天笳鼔競吳􅊑水靣遊龍戲萬條只恐海波飛欲立鮫人無處織輕綃中秋蹋燈詞三首皛皛金波濯采鮮虬燈萬㸃鬭嬋娟嫦娥也似多情思下逐香塵看少年九陌熒熒不夜天絳河光淡倍流妍道旁㣲有香風度知是妖姬墮翠鈿烟殘蠟炬桂輪低歸舄三更曲巷迷何處豔歌吹玉笛紅樓縹緲碧梧西𢎞人曰此種風情不減昌穀中秋龍舟曲三首有序中秋燈市僅見吾邑父老相傳云始自萬厯中年近又有龍舟之戲每舟燃燈數十鼔樂幡麾畢具㑹于垂虹亭橋下往來舞櫂旋折如飛士女遊觀逺近雲集尤他邑所未有也次雪樵水先成詩余踵而有作以紀一時歳華之麗火樹銀缸映月鋪琉璢片片閃重湖光明直欲連鮫室驚吐驪龍頷下珠虹亭雲比幔亭多凌亂珠輝湧素波應共墖燈流照逺明朝漁網笑空過俗說墖上燃燈明日網捕皆無獲喧闐鼔吹繞長虹水馬千盤皓魄中霜女素娥皆寂寞夜深應㑹水晶宫鍾星歸自三衢青霞福地似蓬萊一線天低首重廻到日兒童迎􅀏問可逢僊子看碁來桂花月下讀季廸睂菴諸家詩天葩飛墮廣寒宫片片清香引碧空髣髴衆僊彈法曲紫簫吹歇月朦朧題孔廉石遺像孔有還金事余為作傳讓水亷川許結鄰不貪真可識金銀于今滿路南塘客對爾鬚睂憶古人孝章曰或疑南塘語太露然杜詩已有衣冠兼盗賊之句題介白畵金碧参差古木中曉巒盡作髻螺容何人為蠟穿雲屐踏破蒼藤幾萬重入山石澑松風聽不窮茆堂寂歴曉烟空丹梯百道飛霜葉疑有靈楓化老翁和李梅公司馬秦淮合歡詩為㤗和蕭孟昉作四首秦淮瀲灔月偏明僊子霓裳降玉京十二䦨干花婀娜雲鬟簇擁看傾城蟬鬢輕匀軃翠翹新粧淡冶畵難描羅衣須稱腰支小為翦冰蠶六幅綃合歡雲錦爛花蹊月扇銀鐙隊隊齊今日蘭房佳氣滿催晨不用汝南雞鳳舞鸞歌樂未央將雛一曲遶虹梁玉盤檠出僊家果先剖橊房摘子嘗宗定九惠貽深柳堂集奉寄三首十里垂楊映暮霞東原滿眼舊繁華關情最是靈和柳畱得絲絲處士家螢苑雞臺勝蹟遐卧遊常汎曲江槎非君筆底千重錦那敵崗頭萬樹花青陽烟景􅆺林廬滿院輕紅㸃素書遥想少文花下坐隠囊棐几玩濠魚無題侵簾紫燕原交翼戲水紅鴛每竝頭可奈錦幃人去後春風無語蕩銀鈎哭笻在三首陽九啣哀不計年稱詩長廢蓼莪篇一身瓢鉢寒山寺茹蓼吞聲仗佛憐西磵心交四紀深春來分手更沈吟豈知一别俄長夜騷賦同誰論古今叢菊香殘桂葉凋旅魂何處寄飄蕭長畱一掬西臺淚灑向寒江湧暮潮贈鄰叟棐几繩牀白􅏩巾蕊珠誦後嚥元津勤勤過爾非無意曾見昇平五十春題袁重其負母看花圗和杜于皇韻負母階前樂事真葵橊色映北堂新世間不少看花客花下誰將白髮人再題負劒寜忘辟咡時花間答效也嫌遲從今不用扶藤杖自有兒身代杖支哭甫草三首同鈍翁作巫陽難問路遥遥每為斯人恨不銷箱篋僅遺文百首功名特限燭三條唐時舉子入試南宫給三條燭才命由來兩折磨怪君末疾是沈痾曹涂李志憎偏夀憒憒天公可奈何書齋空鎖舊籖題竹徑煙荒草色齊䳚鴠不知人已化五更猶與盡情啼汪季青曰情辭凄帵欲絶題㕛人小像林下松風岸角巾嵐光時照板扉新回頭笑問乗煙客今是滄桑幾劫塵姑蘇楊柳枝詞四首和鈍翁萬縷黄金著柳條闔閭城外逞妖嬈臨風不解興亾恨猶認娃宫舞折腰嫋嫋通津拂酒旗山塘十里緑隂齊人情比似秋雲薄誰折長條綰别離一作十里紅亭嫋嫋春任他輕拂陌頭塵如今世路輕離别誰倩長條綰去人百尺扶蘇翠影孤風流自賞古城隅不須移向靈和殿好種天邊近白榆暖風吹浪細成文天半飛綿􅇢白雲莫入深閨攪思婦恐添淚㸃濕紅帬贈李侍御灌溪先生二首柱史仙根發舊枝中朝冠冕更先誰法王晨盥勤朝禮猶似朱衣待漏時玉鏡珠囊拜五雲佛香熏染散靈文先生近有邇禪初刻春來愁聽髙枝鳥恐有蒲卑是舊君杜宇一名蒲卑見華陽國志送棐民弟移官望江二首落日西看趂估船白頭分手倍凄然可堪十載談經客仍向荒江擁敝氊皖山烟景嘯堪舒日日江魚芼笋蔬齋閣首廻吟望久應憐多病老相如送徐果亭太史還朝三首弟晜先後武承明又見鋒車上驛程爭羡鳳巢琪樹穏三珠光滿罩瑶京班廬原傍馬鞍阿回首松筠戀惜多自是衮衣催補繡山靈無事惱鳴珂賜書每許借桓生初月樓頭對舉觥欲别龍鍾頻悵望關山計日想行旌愚菴小集巻六
