body:
  text: 愚菴小集巻四吳江朱鶴齡撰五言律寶華山房雜詩四首山色何年古茅茨抱碧岑谷虚聲自答松老氣常隂野市魚鰕襍村烟薺麥深素懷誰與共蘿月候孤琴東渚雲塘水洄溪松乳田非經兵後日不愛㸑前烟畦勢趨深澗秔香散暮天山農収穫好吾意亦欣然惆悵獨憑欄深光起夕巒星摇松影碎瀑過竹聲殘落葉愁中聽孤燈梵後寒終年事萍轉何處老漁竿出雲山易雨一夜石流平僧笠疎籬見樵帆淺瀬輕斷連峰一氣分合澗同聲潤物春無意山田已可耕安節曰厚而能秀大約脫胎杜陵兼以劉文房之風致寄沈公紱兼呈睂生冶城揮别淚五載戰魚龍嘉樹猶存憶清樽竟莫從谿回春榖雨月冷敬亭松髙蹈誰同尚林間有嗣宗過龎山湖淞江非往蹟百里半漁蓑波浪隨葭菼徴輸到芰荷鷗群出浦聚雁影帶沙多一櫂寒江外悲來試短歌無殊曰百里半漁蓑所感甚深三四正申此意五六寫景清絶未只淡淡収味餘言外送袁孝子重其還吳門雪艇衝寒去衡門誰復過分甘吾力少問膳爾情多野樹雲無色遥汀水不波天涯看咫尺莫惜醉顔酡同大庾介白朗威茂倫樵水海序小集道樹菴徑入荒畦僻相攜支許儔院凉烟起翠林淨葉驚秋杞橘浮香細葴莎向晩幽紺園淹對久蘿月已如鈎𢎞人曰幽細似中唐種菊次劉虛受韻清風招北牖幽事託東籬辨種觀天意分根酌土宜功兼髙士課理許逸人知他日龍山㑹能㤀破塊時介白曰三四說盡物理結語尤可感諷冬日懷姚文初包驚幾諸子摇落空庭意婆娑對古梅停雲愁不解凍雪黯難開雁影衝寒過楓香拂靣來此時綦履跡何處印蒼苔訪指月上人踏花通竹戸聽鳥到禪關烟磬從風逺松雲渡水還瘦藤閒挂拂棐几静看山幽意觀無際庭莎未忍刪山行山氣午濛濛縁源興未窮亭虛遥浦見磴曲野蘿通倚石搜仙乳憑雲數斷鴻前村逢采藥疑是鹿皮翁曉發紅林橋驅車寒色曉四望只孤津霜葉飛能辨氷花照漸親竹分山外影鴉起樹邊身午店知何憇塵勞媿此頻弱翁曰中二聨句句洗發曉字此中晩人作法天池晩歩次俞無殊韻地抱層巒秀天清碧壑秋斷虹明落木孤嶂俯澄流鴿去珠宫變苔深石屋幽蓮華如可服何事覓丹丘志云池生干葉連華有人服之羽化燕姬走馬北地臙脂入南天蹀躞長琵琶翻舊譜袴褶衒新裝袖窄揮鞭疾靴輕過草香何須年十五調笑酒壚旁安節曰鞾輕過草香與子美廻舟一水香同妙君不來縱有新縑好能無故劒思罷糚愁動鬢慵繡淚垂絲止覺雙輪轉誰傳三鳥辭花間看履跡惆悵獨生悲館娃宫歌舞何年歇芳魂尚可招梧宫秋未老香徑跡旋銷踏蘚憐羅襪聽鶯想玉簫沼吳千古恨山髻自朝朝採香徑越地爭栽蕺吳宫好采香豈知蘭蕙路偏作棘荆塲臥犢仍芳草啼烏自夕陽應憐箭涇畔羅䄂此輕颺琴臺地隣娃館側名類酒壚邊自譜吳宫怨非操蜀國絃清音流古木汎響聽飛泉颯沓空山道疑將玉指傳酒城在越來溪波疑箬下清釀酒昔名城不解梧宫曉寜聞越甲鳴醒來蒼鹿滿愁去紫臺傾樂府梧宫秋吳王愁堪嘆溪流冷當年未解酲介白曰四詩詠古清麗之中饒有悲感可嗣響季廸諸作孫丹扶諸公小集共是乗軒客相將訪藋蓬雨回菘圃細花照柳堂空說劒心猶壯論文道未窮急觴須盡醉揮手易西東挽韋青岑古徳遂云亾湖山百里荒宦成仍戴笠車挂獨條桑漁課空茅屋農經散葯房輶軒天末逺誰與傳循良安節曰三四可當韋公一篇墓誌題破山寺亭子得心字寺古畱靈蹟亭新倚碧潯涵空奔澗澑倒影浸松林法聽巡簷鹿香分啄果禽塵襟真可滌誰共白雲心過虞山同陳南浦諸子集劒浦池亭即席同賦池閣好淹畱嵐光翠四流荷風香拂席蕉雨氣增秋句索西崑隠交論北郭幽烟鬟正宜笑欲别更凝眸𢎞人曰清潤自喜村居漫興二首麥隴飛翬出桑畦戴勝鳴荷鋤招北叟把巻就南榮退谷安吾老愚公諡此生任人嗔爾汝一笑失愁城世事遣沈㝠閒鷗共淺汀燒分檉葉赤烟合柳梢青孰過墻頭酒惟乾案底螢灌花行藥外終日注𤣥經無殊曰閒適之趣頗近自然荷花三首碧水弄妖嬈芳魂早晩招絳英雲薄䕶紅粉露輕調態起凌波襪香傳曵霧綃應憐蕩舟女臨映倍拚嬌風輕遥送艶雨細近聞香暈酒開新臉施朱試曉粧立波真解語倚日更低光玉女疑分種仙標特地芳華山有玉女蓮方塘菡萏色一曲正離披啖影魚翻浪霑香蝶戀池折來纎手稱供與浄名宜短櫂吳歌發搴芳起暮思茂倫曰綺艶極矣按之字字穏切詠物詩當以此為勝挽沈僉憲二首信有焚巢禍驚聞欲廢餐歌傷祝衂苦運遘沸羮難冡劒誰畱挂牀琴遂絶彈空懸宛水月夜夜照寒灘風義千秋在音容廿載疎有心呼碧落無地問儲胥素業朝烟盡孤魂夜雨虛每懷御李日彈淚滿襟裾寄章兩生弱嵗論交早頽年遯跡同狂歌仍潦倒短鬢已衰翁菊露浮香泠楓霜映曉空終期載瓻酒轟飲破籬東聞某訃二首燕許推今代龍蛇厄此辰牙籖誰撿㸃斑管竟沈淪客斷西州路山韜谷口春斯文嗟不起嗣響屬何人音旨應難沫空庭慘緑苔架殘韋述史編賸子山哀黯淡叢蘭色徘徊粉蝶灰傷心白茆水猶繞畵堂回甫草曰悽凉婉折情味無窮人日雲間陳孝則過訪䝉惠新詩次韻奉答良辰傳綵勝嘉客到天涯得句臨芳草開樽對綺霞柳絲風乍綰梅影日初斜去櫂愁難繫疎麻寄若耶託訊王玠右袁价人諸子聞沈女刎死事有感作豈意深閨秀能同烈士襟千秋憐蕙質一死愧琴心月宇烏啼切霜空鶴唳沈淞江濤百丈為爾激哀音過徐崧芝館齋髙士推徐孺菰蘆隠角巾窗招雲樹霽日展畵圖新選勝遊常卧崧芝時選攬勝集安禪道與隣清名應爾占莫怪甑生塵無殊曰末二語大為吾輩生色或曰正使人名心都盡飲嚴園作秋香滿林薄文酒屢邀畱接席葵蘇美交簷竹樹稠菰蒲仍素業圗史足㝠搜短榻淹晨夕髙吟遣四愁倪天章同檀度南公過訪十年欽姓氏今日訪蒿萊湖海勞相憶宗雷得幾來屐痕香草惜詩思落花催正值蓴絲滑何須斷酒盃時天章逃禪斷飲蓴羮詩同天章山夫作限用人字碧縷四泓真蓴産吾邑四泓橋者良今多以他處亂之殘春采掇新輕淹堪餉逺淡㵸最宜人鹽豉從㣲下樽罍莫漫陳杜陵誇錦帶誰觧覓江濵杜詩香間錦帶羮本草蓴一名水葵或名錦帶宋人注以為錦帶花誤也時與天章論杜因及之挽潘江如二首薤露歌何數窮交獨嘆君束芻無俗客挂壁有遺文紙帳縈虚網書籖慘落曛魂歸應有路終戀穆溪雲江如故居在黄溪寂寞華山畿今居乃樂府華山畿道人亡井徑疑尺書來未久永逝訃相隨筆塜生秋草烏巢别故枝相逢邢顧孟貞與治在泉路續交期梥之曰如么絃哀玉韻發天然清含衆妙宿苕華書屋二首竟似遊濠濮蕭關掩薜帷何曾熱客至獨與素交期細酌陶潛酒髙吟謝朓詩夜深親枕簟斜月到窗遲尚有青雲士能存白髮人逸編搜共讀綺論夕兼晨花霽紅猶濕草薫緑乍匀蒼茫飛動意為爾失沈淪張鹿牀過訪承示佳集兼有贈言賦答二首寒林向晩昏有客駐髙軒未怪儒衣古翻憐素履存雲霞新句麗泉石道風敦語到無生法瓶花當酒樽僊吏三湘夢浮家五岳遊禪心歸梵夾詩興動滄洲薜蘚欣同對瓊瑶愧逺投送君烟浦外楓葉照行舟雷侯笏山過訪墖寺雷成都人古寺閒清盥空齋証淨因何期濯錦客忽問緯蕭人翡翠文章色烟霞吏隠身庭前森栢子猶發令君春春日二首草色亂青緺春歸綺陌斜野烟生不斷古樹秃還花白鳥依漁艇青山帶酒家杖藜風日好憑底答韶華預愁春爛漫春至復如何進艇乗新漲縁隄䕃女蘿鴉翻金線柳魚戲麯塵波好事誰攜酒空樽發浩歌園居雜詩八首送老真無計閒情付釣筒漢隂機久息甫里散長終几傍齊簷竹窗臨向日桐小庭花媚眼都發去年叢髙樹隠柴荆幽居絶送迎將泥看乳燕密葉聽啼鸎綺縠翻花暖旗槍試茗清交牀莊叟蝶栩栩覺來輕林氣薫如霧晴光曉倍嘉綠齊遙岸草紅遶半谿花蝶戲黏金粉蜂喧散午衙鄰翁諳月令隨意問桑麻顦顇惜年芳生憎對豔陽栁腰矜善舞桃臉競新粧㸃易花隂下箋詩竹户傍槧鈆酬永晝不敢負滄浪拭簟茅亭雨開簾柿葉風那堪新鬢白還照舊花紅小艇孤雲外鄰舂野薄中㺯雛成一笑抱膝倚墻東平莽収殘照㣲瀾漾綺川樽移黄葉畔幔巻碧雲邊不了藤蘿月長新荻薍烟莫牽身世慮爛醉撥書眠下舂羣動息田父戀殘暉鳥和烟成夢雲先月作衣藥囊依橘柚燈檠對蠨蝛徙倚昏黄後無勞蔽板扉錦帶宜居士荷衣老故蹊曾聞王覇子幾見鹿門妻苔石頻移坐吟箋細續題月廊更曵杖菊影壓霜低孫宇台曰從老杜得手此更轉入幽秀送吳𢎞人館玉山玉山令為唐魏子此去齊峰逺艱難水陸程亂山尋鳥道急槳聽江聲旅館寒星動荒城曉霧横天涯君莫歎接席芷蘭清郭幼隗費瞿如同館皆楚名士送周安節館洞庭山光落照邊孤客洞庭船濟勝君平杖談經子敬氊柳隂金線細梅片玉鱗鮮好及春風軟尋幽徧野烟墖燈寶燄懸霄漢熒熒照大千星輝同歴亂月采倍澄鮮破暗神靈聚函光佛性圓頓令祛五濁從此得安禪徐伯調過訪樹晩帶餘霞朋來雀語譁乍親湖海氣深媿鍜鑪家京洛煌煌客燕吳汎汎槎故山歸去好莫負寓園花徐出祁公世培門下寓園祁之居也詠虎丘宋菜圃玉蘭和𤣥恭琪樹倚禪房瑶光度世長豈因通月魄常自試雲粧玉珮臨風舞珠塵襯日芳年年艶陽候流素照空王海序曰工麗聽松逸響逓松隂泠冷静客心無風濤自壯合籟韻俱沈巻簟醒餘夢廵簷和細吟還憑纎玉指寫調入瑶琴周起三致政歸過訪官辭虞寄日志樂仲長初已著歸田賦還求種樹書雲衣看世事月杵玩端居更肯敦親故時來問荷鋤遣興無計驅愁物閒庭感嵗華竹畱遥夜月桃吐及辰花白袷輕春半黄蜂鬧日斜草𤣥今欲就何處有侯芭寄葛瑞五判袂將三紀停雲望逺天魚箋沈別浦雪鬢惜流年蒲吐郎官筆榆飛姹女錢憶君方得句花下獨听然兩生過飲夙昔凌雲筆今來爾尚存西崦看日落北渚望雲昏皂㡌樽前老寒松物外論且拚酩酊去花影正迎暄曉起清旭透簾楹鸎啼過五聲烟輕霑柳濕露重注花明對鏡絲休鑷開編殖未成左傳學猶殖也惟應抛世網蓑笠事巖耕江灣遣興二首柴門帶水紆樸斵固吾廬敗壁牽蘿補鄰園借竹書薤新供小摘梅老結相於且喜城闉逺荷衣賦遂初出戸邀鸎友攤書對橘奴清香來几杖巧囀當笙竽菖杏占農候笭箵問釣徒浮名成底事惟有學歸愚砥之曰儲王風味賦得殘月如新月已見魄生久還疑弦上時晨昏同半照朓朒不分䂓幾誤閨中拜憑描鏡裏睂餘光已胎蚌試詠玉鈎詩挽姜如農給諫諫草畱遺笥丹楓照旅魂風霾終日變海嶽此心存九死啣朝命一坏拜主恩陵陽松檟在千古暮雲昏崇禎壬午姜以直諌謫戍宣城甲寅没吳門遺命𦵏戍所挽李如石明府南星隕夜闌巷哭淚難乾秫豈饒彭澤風猶避灌壇千秋吳俎豆一載漢衣冠令長洲止一年此去朝天闕珊珊玉珮寒送徐松之遊新安新安山水窟子去訪真源白岳仙靈㑹丹泉石澑温㣲吟花外寺短策雨中村歸日詩瓢滿開醅與細論題計甫草村居次汪鈍翁韻二首茭蘆曲曲遮負水逸人家橘柚垂隂合篔簹遶徑斜平疇欣穫稻逺渚見撈鰕竟日茅檐下惟聞鳥雀譁抱甕世誰争丘園養大名耕催朝耒出漁樂夜榔鳴把卷塵勞釋皈禪心跡清還期學摩詰同母證無生戴耘野曰丘園飬大名與莊生為善無近名正是一義惟見道者知之贈徐石兄二首經苑日荒迷南州獨古稽無心談虎觀有學講牛溪帶草依帷茁窗雞破夢啼絳紗危坐久花外可扶藜儒術尊漳浦謂閩漳何𤣥子先生通經有别詮吾曾親末席君獨抱遺編郭泰碑誰撰田何學定傳先生著易經訂詁深明象學儒者多稱之音塵追髣髴相顧各澘然牡丹花下作花色總輸伊横陳當麗姬妖嬈西子笑豐膩太真肌寶髻光摇座楞嚴經世尊從肉髻中湧出百寶光栴檀氣壓枝晩來絲雨潤婀娜倍生姿沈永禋和詩附爛漫擅花塲千重組繡揚好牽蘿作幔聊倚石為牀香色宜清晝風光媚夕陽坐來看不厭蜂蝶也顛狂暇日偶撿敝篋見克將和余牡丹詩泫然有作掩淚看遺筆重吟歎俊才名葩方鬭詠厚夜遽長埋厚夜見左傳注帶草畱人恨楹書待後開楹書用晏子事年年花發日不忍對金罍冬日懷計丙文希深落葉空庭積閒愁似許多論交期孔李得句憶羊何之子遥天末西風巻白波幾時來一櫂舒嘯倚寒柯錢礎日過訪茂倫穎長霜赤書城𢎞蘧偕集嘹嚦聽賓鴻良朋此日同論詩當竹肉㵸茗間絲桐庭菊疎殘影池蓉褪晩紅傾杯共云樂岸幘倚籬東張𢎞蘧招集書紳堂分賦得真字時彦清河最招尋意氣真金英庭馥郁玉屑座紛綸畫燭傾殘淚凉蟾隠半輪細斟饒美醖只恨少迂辛座無善飲者迂辛見白集送潘次耕應舉入都二首秋興看成賦鋒車促就徴志雖丹壑卧名已玉京騰菊蕊酣元亮蓴絲感季鷹知君難此味揮手恨彌增眷眷板輿前辭家復幾年盤抛抑鮓美杯戀把螯鮮匹馬成遊子名山割故縁安仁文筆健昂首望雲天林通府天㕛屢招飲衙齋病不克赴除夕䝉山炭之惠賦此謝之自是耽㣲尚非關傲布衣嘉招何繾綣土室已光輝病謝廜㢝飲寒驅栗烈威紅爐暄色起欲化瑞煙飛霍明府裔雲過訪蕭齋春寂寂誰枉破莓苔未展州民敬驚看騎從來禮加徐穉重門為魯恭開茂宰傳清惠寜能避鑿坏汪晉賢曰語占身分想見髙風冬夜二首寄魏交讓百慮中宵集燈殘擁敝裘月寒千里夢花動五更愁逺道音書斷餘生興會休春光行冉冉無計得銷憂鼠嬉偷掠枕烏宿尚啼窗玉漏更才半冰輪影待雙生涯前計誤禪觀近心降已覺聲名假長依離垢幢贈顧季任今日牆東隠應推顧彦先髙齋無俗駕素業有遺編講易人間樂鳴琴世外傳衡門著述䖏髙樹古垣邉秋日述懷二十四韻廪秋髙白露林徑颯葳㽔遼落江雲浄蒼茫曉霧披菊英餐爛熳鳬影送差池紫識蘭莖老紅看柿實垂䕃松風拂簟藉草月臨帷蛩響空堦切烏啼古木悲小冠閒自拭壯齒恨難追飬拙安垂槖嬉遊憶佩觿簫韶聽聖主玉帛覯清時共解杯槃舞寜憂畵角吹百年俄遘運三極遂全移目慘江山異神恇羽檄馳何心對董策止是扈江蘺服道徒違俗傳經豈遏飢阮疎天遣放嵇懶衆從嗤萬事都零落殘生敢怨咨時為握粟卜大似觸藩羸二酉搜文苑三墳泳聖涯宜歌風當彼黍啟繇宙得明夷漁獵聰明廢丹鉛嵗月疲胡繩止自結雜佩向誰貽短髮愁榆景孤貞懼雉罹含情真陫惻竟詠益悽其但使伸吾道何妨老釣絲介白曰氣格堅整類駱義烏幽縶書情等作挽吳茂申先生二十四韻壑舟隨化盡井逕與時遷宦是中朝舊身同絶域捐故廬悲向篴流水斷鍾絃撫往山河邈傷今涕泗漣公才實邁等吾黨共推先秋巻馳聲大𤣥亭問字駢素風安几硯雅量納蘭荃世服平輿鑑人來剡曲船南宫艱一顧北部赴三銓小邑栽花暖行春濯錦鮮坤維俄震蕩國歩屢迍邅痛哭誠何補崩奔止自憐歸田仍素業冶性有詩篇目斷方中日心懸尺五天吞聲惟飲泣黙照似逃禪神理原無昧支離遂不痊哲人長已矣雅道信終焉宿昔追趨久生平盼眄偏每聞雌霓入賞時共竹林眠白雪吟徴和青山隠結縁不堪尋舊蹟那忍度新阡橘變嗟難問芝焚嘆幾全中郎求貌似有道待碑傳朗咏孤臣句悲魂倍黯然先生東歸詩有四山風雨一孤臣之句無殊曰語極悲酸不落衰颯之調以其身分髙氣力厚也詠雪獅子十韻滕六飛花滿狻猊巧撮成振威無爪距作勢有光晶豈是金牛出還疑玉虎鳴形呈西域産質捖太隂精似吼臨瓊宇非虓踞廣楹止陪髙士卧若遇賈胡驚謝女吟應怯孫窗映倍清鋸牙氷骨脆蜷尾玉泥輕見睍愁銷瘦傾陽失拄撐真堪供一笑昔日爾狰獰樵水曰極形狀之工意味有餘是鏤氷刻塵手韓蘄王墓碑髙冢寒原上豐碑茂草邊精忠畱史策英魄䕶山川宋帝䝉塵慘宗臣戮力堅金戈揮落日鐵馬盪妖躔誓反皇輿正終期赤社全劉張真失歩耿鄧可齊肩誤國和戎議崩心返斾年南圖稍鞏固北伐竟迍邅望眼中原斷懸弓半壁偏隕星驚大將遺劒没荒阡鞏樹悲難歇江流恨未蠲一抔埋虎氣三尺躍龍泉石冷空山月烏啼甫竁烟秪疑風雨夕戰鼔尚鼘鼘思陵長公主輓詩國歩方顛躓宫儀尚肅清終令遺體弱長斷合歡情往事妖氛盛神都殺氣平栢梁飛枉矢椒寢墮欃槍貴主將開邸粧臺失佩珩倉皇殉宗社慷慨及娥英奮劒恩慈割殷烟衣血淚横豈知桃李詠還叶鳳凰鳴羽服違初願瘢肌恨再生重飛吳市鶴強和洛川笙粉黛悲新市烟花愴舊京誓依靈寢去俄向玉霄行奔月瑶娥影乗雲帝子精風雷開隧道霧雨暗銘旌無復陳哀誄何須有賜塋應知僊嶺過用公主山事不作鳳簫聲禎起曰如此立言方為得體閱他作乃知其髙寄朱致一苦憶朱公叔蕭條隠獨真雲霞供浄儿竹柏潤綸巾白社尊遺老青山屬外臣華平花未放華平花見選賦結緑席空珍草宿山陽侣𤣥恭沒已一年書傳旅食人寜人逺寄日知録因君感存沒雙淚洒衣紳喜橄欖至名並餘甘著來從海國秋三年阻賈舶此日潤乾㗋酢澀回餘味團圓銳兩頭利人逢毒解入口覺津流異比江瑶柱珍齊海石橊柘漿宜並置茗飲或堪儔病渴方尤效朝酲進輙瘳玉人如過市此果欲先投哭葉中翰元禮才士年難老古今同歎之斯人復不禄大造果無慈未得棲雞樹虚成到鳳池長安米久索行李橐空垂邸户堆塵土帷堂絡網絲尚傳新句麗誰撰誄文悲逺道王孫草羈愁少婦詞旅魂疑蕩越遺稾懼離披弱𦙍生涯盡孤嫠孑影欹何人糜助哺只恐釡懸炊旅櫬三千里分荆一兩枝靈衣苦雨濕井徑斷煙迷行道悲填咽平交淚綆糜束芻何日致搔首倍凄其同里小祗園法會詩二十韻同吳慎思諸子作髙士覉棲地同川煙水郷楊鐵崖倪雲林皆有寓居同里詩梅林畱廢圃鹿苑建修廊徳水迎門注禪枝遶屋長靈禽依佛土忍草秀中唐斗柄中秋閏蟾輝幾望凉縞颺青女袂霓試素娥裳孝竹依堦緑慈雲覆院黄菊英初放蘂桂子正舒芳懴演無生法壇開選佛塲名山來錫杖古徳列繩牀梵唄聞霄漢鐘魚殷法堂長庚闚寶座皓魄照經囊猊象當堦伏魚龍聽法忙重泉齊破暗百族迥廻光不夜長明炬中天沆瀣漿散花香馥馥咒鉢語琅琅展矣人天會猗與法寶揚偈文畱貝葉詩詠叠縹緗佛日懸常麗神功浩莫量永懷清淨業嘉㑹耿難㤀愚菴小集巻四
