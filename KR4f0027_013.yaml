body:
  text: 愚菴小集卷十三吳江朱鶴齡撰雜著一讀周本紀太史公記三代事多疏謬本紀尤甚其有可考者當據尚書左傳國語正之又不妨取汲冡紀年帝王世紀及秦漢以上之書參伍其說如幽亡平立本紀不載嵗月諸侯年表驪山之禍在庚午平王東遷洛邑在辛未世家却盡連書于一年以愚考之西周亡後不即東遷本紀云犬戎殺幽王驪山下虜褒姒盡取周賂而去諸侯乃即申侯共立故太子宜臼是為平王據此則平王先逃在申諸侯求而立之立後乃遷洛也又左傳云幽王用愆厥位攜王姧命諸侯替之而建王嗣用遷郟鄏攜王不言何人曰姧命必不當立而立者杜預以為幽王少子伯服非也幽王在位十一年三年嬖褒姒伯服之生不過數齡且幽王以褒姒亡國褒姒既為犬戎虜去必無復立其子之理考竹書紀年幽王見弒申侯魯侯許男鄭子立太子宜臼于申虢公翰立王子余臣于攜攜地未詳所在是謂攜王竹書之言雖非可深信而攜王則不妄當是幽王既隕攜王僣位諸侯乃共舉兵黜之而迎立太子宜臼其遷洛未定何時大抵自犬戎發難至平王東遷必非止一二年事正月詩云赫赫宗周褒姒滅之又云哀我人斯于何從祿瞻烏爰止于誰之屋乃西周既亡王位未定時作也竹書又云攜王為晉文侯所殺觀文侯之命有用㑹紹乃辟多修扞于艱等語以此驗之正合其時衛武公鄭武公秦襄公同奬王室而平王于文侯獨加殊禮有秬鬯弓矢之賜殆以殺攜王之故歟太史公紀幽平間事甚略故為考之如此讀貨殖傳太史公貨殖傳將天時地理人事物情歷歷如指諸掌其文章瑰瑋竒變不必言以之殿全書之末必有深指或謂子長身陷極刑家貧不能自贖故感憤而作此何其淺視子長也趙子常汸云貨殖傳當與平凖書參觀平凖譏橫斂之臣貨殖譏牟利之主此論得之而有未盡愚以為此篇大指盡于善者因之其次利道之又次整齊之最下者與之爭夫天子之富藏于山海髙祖初興開關梁弛山澤之禁是以富商大賈周流天下交易之物莫不通得其所欲此非所謂因之與利道之者乎逮至武帝征伐四夷大興神仙土木之事國用耗竭其勢不得不出于爭與貧民爭而千里負擔饋糧率十餘鍾致一石益漕餘粟關中太倉甘泉皆滿矣與富民爭而鬻爵輸粟入羊為郎之令下矣與諸王列侯爭而朝賀皮幣薦璧以酎金失侯者百餘人矣與商賈爭而鑄鐵煮鹽算軺告緡之法縱橫四出矣至于京師置平凖受天下委輸太農諸官盡籠天下貨物貴即買之賤即賣之則天子自為商賈子長心傷之而不忍盡言故首舉計然之貴極徴賤賤極徴貴白圭之人棄我取人取我與以深致其意若曰平凖之法權衡物價輕重間者乃陶朱白圭猗頓諸人治生家之所為也奈何以萬乘之尊而出此乎中言五方都㑹百貨所出商賈輻凑苟得其道以御之何至患貧且求富者人之同情也自廊廟巖穴從軍任俠以至趙女鄭姬游閒公子諸技術之人皆為財利天子之職當重本抑末使貧富不相耀以和其心而乃籠貨利以導之爭則雜業何所不至乎末又歷數程卓宛孔曹邴刁間之徒以及姦事辱處者皆得比于素封以見天子與商賈爭利則人皆化為商賈所以深嘆漢業之衰而髙祖之開關梁弛山澤為不可復見也特子長以滑稽行文故子貢與陶朱白圭例稱而于程卓輩則云當世賢人所以富若曰今世所稱賢人特此曹子耳時桑𢎞羊以賈人子進天子方尊顯之譏切之意見于言外班孟堅不達乃非之曰傳貨殖則崇勢利而羞賤貧嗚呼以子長之材貫穿經傳上下數千載而乃津津艷慕市兒賈豎著之于書何以為子長哉讀漢書古者史官世守其傳為專家之業至東漢猶然故漢書叙傳首述班氏世系次述叔皮及已之文章以見源流相續其體同于史記但史記曰作某紀作某傳而漢書曰述言不敢自居于作云爾其髙五王文三王景十三王武五子宣元六王皆次其時代序列傳之中王楙謂諸王合叙一處如陳書唐書之類不應混入各傳梁蕭琛傳云得古本漢書叙傳自列項籍傳前不知班書規模多依倣史記其混入各傳者正沿遷史楚元王諸世家體爾又云古本外戚傳在帝紀下不知叙四夷而後及外戚者斥之也漢熸于外戚故斥之次及元后著漢之所以亡也終于王莽而漢室之興亡具焉若以外戚次本紀後則全失作史微旨至于述韓彭英盧吳傳今本云信惟餓𨽻布實黥徒越亦狗盜芮尹江湖雲起龍驤化為侯王而古本云淮隂毅毅伏劍周章邦之傑兮實惟彭英化為侯王雲起龍騰此是傳本各有異同非必古本是而今本非也琛傳云有北僧南度惟齎一葫蘆中有漢書叙傳三輔耆老相傳為漢書真本其書非篆非𨽻紙墨亦古琛得之甚祕以餉鄱陽王此恐出好事者之言未足為據讀後漢書范曄後漢書帝后紀十二卷列傳八十卷本刪取劉珍等東觀漢記及謝承薛瑩司馬彪劉義慶華嶠謝沉袁山松七家後漢史而成志三十卷則司馬彪所撰梁郯令劉昭注因范書闕志後人乃借以補之曄髙自矜詡謂過于班固至論後有贊尤自命傑作無一字虛設通考陳氏直譏為贅洪容齊云人苦不自知班固豈可過哉余謂范書非止不及固其于史家之法蓋有未備也考馬遷史記帝紀之後即有十表八書表以紀治亂興亡之大略書以紀制度沿革之大端班固改書為志而年表視遷史加詳焉蓋表所由立昉于周之譜牒與紀傳相為出入凡列侯將相三公九卿其功名表著者既系之以傳此外大臣無積勞亦無顯過傳之不可勝書也而姓名爵里存沒盛衰之跡要不容以遽泯則于表乎載之又功罪事實列傳中有未及悉備者亦于表乎載之年經月緯一覽瞭如作史體裁莫大于是而范書闕焉使後之學者無以考鏡二百年用人行政之節目良可歎也其失始于陳夀三國志而後來作者又援范書為例年表皆在所略不知作史無表則立傳不得不多傳愈多文愈繁而事蹟或反遺漏而不舉歐陽公知之故其撰唐書也有宰相表有方鎮表有宗室世系表宰相世系表始復班馬之舊章云讀唐書孝友傳孝友傳始重於唐史兩漢以下無之漢重力田孝弟科如江革申屠蟠李曇姜肱之儔非不孝友足稱然史臣不以是立傳者其時民行近古不可勝紀也逮李唐之世文皇脅父起兵推刃同氣內行虧而人紀不立歐陽公特傳孝友所以悲風尚之益偷而僅有者為足貴也夫孝友之道經典言之詳矣從未有以剜心刲股為孝者自陳藏器注本草謂人肉治羸疾于是民間始尚之雖間以誠感而愈其親歐陽公亦有取焉然毁傷肢體或徒以戕生而無益于親之疾固不若謹方藥䖍禱祈為可盡人子之心而無憾也昌黎鄠人對言剔股不當旌門良為有見後世有司曽不講風化之原而崇臺綽楔往往加之糜肉名孝者則胡不取正于昌黎乎讀舊唐書石晉宰相劉昫撰舊唐書二百卷一云二百十四卷因吳競韋述令狐峘崔龜從等舊文而增緝之宋慶厯中宋景文歐陽永叔重修削傳六十一增傳三百三十七續撰四志四表事加于前文減于舊一時稱為良史劉書遂廢格不行然議者謂新書用字竒澀頗為失體又刋削詔令使有唐三百年王言陻蔑無考吳縝至作糾謬一書以排斥之唐子西又極推舊史舉其决海救焚引鴆止渴為名言余嘗翻閲其書事詳文核誠不可廢所憾者筆法冗長論贊尤令人厭觀若求閎博簡練有典有則洵無踰于新史矣豈可以五代卑靡之格與之同論哉削諸詔不録蓋因駢偶非古且當時自有大唐詔令單行劉器之乃謂事增文損正新書之失此不可曉也新書疏漏雖或不免然舊書亦多有之段秀實定郭晞亂卒事出栁子厚紀録上之史館者而舊史失書李鄴侯周旋肅代間甚多權略及相德宗安太子辨說尤偉舊史全略之反云詭道求容不為時君所重太白譏子美飯顆山頭詩此流俗妄傳也而遽以之入傳退之經師人表文章百代鑽仰乃詆其恃才肆意有盩孔孟之㫖則此書得失大略可睹矣嘉靖間督學聞人詮以宋板闕佚搜刻吳中得紀志于文恪王公得列傳于光祿張氏長洲賀氏遂成完帙然書中文義多齟齬難讀又太平御覽所引唐書皆舊書也如王棲曜逰虎丘一箭貫雲中雙雁梁肅諸文士作歌咏之李義山詩所以有將軍一箭歌之句而本傳未之見然則今之所行亦非全書矣讀五代史吾嘗厯覽史書儒林文苑何代蔑有獨五代無聞豈五十餘年無一通經之彥著作之才可以卓然自鳴者耶及讀歐陽公史記乃歎其致此者有由也夫彛倫為經術之權輿教化乃文章之根柢五代自梁開德訖周顯德凡十三帝不得其死者七天下視改號建國如置奕棋更戍長而君臣之紀斁矣天位傳襲多屬義兒朱溫則刲割于其子楊彥珣之彎弓射母晉出帝之臣父敬儒恬然不以為怪而父子之恩微矣唐莊宗以嫡母為太妃生母為太后朱溫淫其子婦出帝納其叔母而夫婦嫡庶之倫俱紊矣天子居喪用樂寒食野祭而焚紙錢古禮廢矣買宴有錢合歡有杖牧守刺史多率家財得之至樞密頭子可以易置宰相而政刑紀綱皆不可問矣馮道事九君更四姓而時人共稱譽之其沒也歎以為與孔子同夀人心死清議亡矣朝野上下無一非椎埋駔儈貪冒無恥之徒相與靦顔視息生其時者即奮然有志于先王之教六經百代之說其孰從而講明之孰從而風厲之無怪乎五十餘年之久而文章行誼之士邈然如祥麟威鳳不可復見于當時也吾觀古來篡弒之惡莫甚于朱梁而中國之禍莫甚于石晉敬瑭之臣事契丹自謂有父子之戚矣卒之妻子為虜求死不得楊光逺杜重威張彥澤諸人引契丹而求為帝自謂可攘石氏之位矣未幾而屠膾之慘身先受之蓋三綱汨而五教陻其禍必至此極彼文章行誼之士雕零磨滅又豈足道哉歐陽公深究治亂之源故其序五代之事特起變例傳義兒戒亂本也傳伶官惜滅梁之功而自棄也傳唐六臣原唐之所以降為五代也六臣與義兒伶官相次著其類也五代之臣傳十一而雜傳十九明無適而非臣也無適而非臣故終五代無人臣焉而惟王彥章以死節書甚矣其筆削嚴而垂戒切也讀吳越世家民生五代時如麋鹿之命懸于庖厨得苟活旦夕為幸惟吳越以善事中國粗號小康然武肅父子世嘗重斂其民以事奢僭史稱其下至雞魚卵鷇必家至而日取每行笞以責負則諸案吏各持其簿列于廷以次唱負之多少為笞數多者笞至百餘少亦不下數十人不堪其苦云或謂歐陽公與錢惟演不協故暴揚其先世之惡容有過辭然史以傳信因私憾而溢惡以誣人祖先此憸險小人之所為歐陽寧有是耶再考之他書錢俶歸朝以其臣江漢臣上賦稅籍漢臣慮故籍之厲民無已也沈諸河而自劾太宗欲誅之已而舍之凡隨錢氏來者皆得官漢臣獨以廢斥死復命右補闕王永均吳越田稅錢氏舊稅畝五斗永更定為一斗太宗不悅永曰畝稅一斗天下之中正使新附之民頌朝廷寬大顧不可耶遂從之厥後永曽孫圭相神宗封岐國公琪為禮部侍郎而江氏子孫居衢睦間登顯仕者七十有八人東里楊公以為其先隂德之報理有不誣嗚呼數百年以來吳越之民更易姓者屢矣賦額之重比之錢氏殆加甚焉而卒無江王二公者以少蘇民困何天之重困此一方耶讀宋史曹彬傳曹武惠廉慎仁慈為良將第一而謀勇不足當雍熙之北伐也太宗戒以潘美之師先趨雲應大兵聲言取幽薊持重緩行勿得貪利彼聞大兵至必悉衆救范陽不暇援山後矣蓋山後諸州乃山前之屏蔽必定山後然後可合勢以取幽州武惠違詔取敗優將略者固如是乎岐溝既敗潘美不得不拔衆退師美之失利武惠為之也維時宰相宋琪上言國家取燕從雄霸直入非我戰地當令大軍于易州循孤山涉涿水抵桑乾河出保安寨則東瞰燕城才及一舍此周德威取燕之路琪燕人也其言宜可信然德威取燕之易實因李嗣源先下山後八軍劉守光坐守孤城故能以偏師克之元人取金亦道由雲中元人進金史表云徑卒搗居庸關北拊其背大軍出井陘口南扼其吭形勢可槩見矣山後未定而急圖幽州故有岐溝之衄其失豈在由雄霸進師乎至于宣和之時形勢又重在平州與雍熙異考燕雲等州石晉以賂契丹平州路則契丹取之劉守光者海上之盟但云燕雲兩路而不及平州不知平州之東為渝關即今山海關渝關以東乃金人來路不得平州為關隘則蕃漢雜處雖全得燕雲不能守也况山後諸州金人旋背初約乎宋之武功不競蓋不待宣和而已然矣于童貫諸人何尤讀文選諸賦賦為六義之一然賦可以兼比興而比興不可兼賦故雅頌諸詩凡舂容大篇皆賦也荀蘭陵後遂多以賦名篇而厥體莫盛于漢孔穎達云賦之為言鋪也直鋪陳時之政教善惡而班孟堅亦云賦以抒下情而通諷諭蓋古人文章未有無為而作者如孟堅兩都為西京父老怨明帝不都長安故盛稱東都以風諭之也平子兩京為明帝時王侯以下多踰侈故作此以諷諌也明帝欲廢南都故特稱此都之盛亦以諷也長卿子虛上林意欲明天子之義故假稱子虛烏有亡是三人以諷也飛燕無子成帝往祠甘泉宫制度壯麗子雲故賦甘泉又成帝獵南山農民不得收斂故賦羽獵長楊皆以諷諌也若太冲之賦三都則于義何取乎太冲晉人也作賦時魏鼎之遷久矣東京鋪揚德業以臣頌君溢美無嫌太冲生為晉臣而右魏以貶吳蜀已乖古義况魏實凉德豈炎漢之可方乎若曰晉統承魏右魏者為晉地也斯其識比之習鑿齒漢晉春秋又不逮逺矣愚嘗考其序譏上林之引盧橘甘泉之陳玉樹西都之出比目西京之游海若方之玉巵無當知其作賦之意蓋主于稽土風驗方志侈學士之閎覽成一家之著作而于孟堅所云抒下情以通諷諭之指則未有當也後人以兩京三都並稱特體制相沿耳豈可同日而論哉讀文中子王仲淹元經十五卷唐蕭穎士依春秋義類為之傳中說十篇初不甚顯李翺司空圖皮日休始重之宋栁開孫何振而張之程子稱其書勝于荀揚至有真以為聖人可繼孔子者溫公謂其人誠好學篤行之儒惜自任太重其子弟譽之太過朱子亦云仲淹之學近正稍有可用之實至强引唐初名臣以為弟子乃其子福畤所為非仲淹雅意此可為定論矣今觀其書所稱門人李德林李靖竇威房𤣥齡杜如晦王圭魏徴陳叔達薛收之徒皆位至公輔及考王無功逰北山賦自注云吾兄白牛溪之集門人常以百數董恆程元賈瓊薛收姚義溫彥博杜淹等十餘人稱俊穎而不及房杜魏則三人非及門可知矣鄭毅夫獬論中說之妄謂李德林卒于開皇十二年仲淹時年八九嵗耳而云德林請見歸而有憂色援琴鼓蕩之什門人皆沾襟關子明朗魏太和中見孝文帝至開皇間已百餘年矣而云問禮于子明二者其妄顯然夫仲淹沒于大業十三年五月是嵗唐髙祖入關房魏諸公或往來河汾相與講說亦未可知其子見諸公之盛也遂悉引為弟子以重其父豈知欲重之而反以誣之也哉余因是而歎古今之史多不足信名公巨卿沒後必有碑銘志傳往往據其子弟所撰行狀為之其狀必增美掩瑕繫師援友蓋有十百于福畤所云者而又廣輦珍寶鬻文于有才無行者之手顛倒𤣥黃眩亂黑白後世是非曷從而取衷焉至于名行卓越者又或不為立傳隋書儒林隱逸皆不及仲淹其時撰隋史者陳叔達魏徴也陳魏而果門人耶不應遏抑其師之美即非門人也仲淹之嘉言懿行夫豈不知且文帝時嘗詣闕獻十二策通鑑亦特書之此而不傳誰當傳乎以後如唐書不傳衛逖薛景仙韋應物五代史不傳韓通宋史不傳唐仲友王蘋丘嶽謝翺以是歎名賢軼行其沉淪磨滅而不彰于史冊者蓋不可勝數也然則仲淹之書非得其子弟之溢譽又豈能傳述至今哉家傳之與國史並行不廢有以也夫書太平御覽後太平御覽一千卷宋太平興國中李昉等所編與冊府元龜文苑英華號三大部太宗尤愛此書乙夜必讀竟四卷洪容齊謂御覽引用書凡一千六百九十種今十亡八九蓋其時書皆抄本經靖康兵火之後散佚不傳幸御覽猶存四庫書籍得以考見其十之一二然近代所梓行者多脫誤難句疑非當時全本也中引孟子云人知糞其田而不知糞其心糞其心者學問是也引史記云衛皇后以更衣得幸頭解帝見其髮鬢悅之因立為后皆今本所無他如漢書注文選注水經注及藝文類聚白氏六帖所引論語孝經漢書史記國策世說諸書多有與今本互異者向嘗疑之後見王伯厚紀聞云漢七略所録若齊論之問王知道孟子之外書四篇今皆亡傳莊子逸篇十有九淮南多襲其語唐司馬彪注猶存又見陸儼山外集云古有后蒼曲臺禮記數萬言今不傳又有别本周禮鄭康成嘗引之以釋周禮孟子亦有别本與今之刻本不同然後知古時經史皆有别本自汴宋以後諸儒校定雕刻盛行而諸本始歸于一矣御覽所引三墳書汲冡書子華子鬻子孔叢子師曠禽經之類都係僞書朱元晦方希直皆已辨之然出自漢魏人之手雖碔砆亦與璠璵等價若宋人所撰雲仙散録唐史拾遺東坡杜詩釋事等書則皆庸妄人假託最為鄙陋後學不辨往往輕信類書中多引用之至近時天祿閣外史本崑山人王某為之駕名黃憲眯目者遂編入秦漢文選海虞人所刻女郎小青傳出文士一時戲筆而流俗羣然據為故實至哀挽如林尤可笑也書北盟㑹編後北盟㑹編二百五十卷乃荆湖安撫參議徐夢莘編集所載靖康俘虜炎興屈辱之狀令人痛心指髮宋史盡諱之而不書賴此書猶存其實耳中引吕本中痛定録曰靖康二年正月十四日上在青城齊宫召何㮚孫覿汪藻等賦詩遣興上命用時韻覿詩云噬臍有愧平燕日嘗膽無忘在莒時藻詩云窮塞夢回驚日處都城思切望雲時有以此達之金帥帥見在莒之句又斥為窮塞因摘此為名邀留車駕自古文士以詩文得禍者往往有之帝王則僅見欽宗此可發一浩歎也夢莘所述李綱宗澤韓世忠諸人事多與宋史不合今略舉之中興記中興遺史皆云宗澤以戰車追襲金人至南華遇伏大敗車大而難運盡為金得澤微服夜遁僅免夫澤以車戰致敗此與房琯陳濤斜何異雖勝負兵家之常今以澤故而沒其事豈史法乎朱勝非著秀水閒居録詆李綱為蔡京子攸之黨淵聖受禪綱與吳敏以詭計取執政臺諫亦劾綱道君內禪攸先引綱為援使冒定䇿之功其言宜非可信者然綱所自撰靖康傳信録云吳敏罷相言者謂內禪事敏承蔡攸密指及除門下侍郎亦攸矯制為之責授散官安置余竊歎曰事已不可為矣因入表劄奏狀丐罷據此則綱之黨攸蓋已自吐其實矣朱子謂李綱入來方成朝廷而其進身乃若此史豈可曲為之護乎世忠戰功為中興第一建炎四年正月車駕避冦幸溫州駐江心寺汪藻劾諸將疏曰世忠逗遛秀州執縳縣宰放兵四掠陛下親灑宸翰召之三四而不來元夕取民間子女張燈髙㑹君父冒不測之險而不恤也中興遺史曰世忠晚年好赴諸統制宴莫不以妻女侍飲必酣醉而出呼延通每忿忿不平一日飲統制郭宗儀家世忠小寢通捉其佩刀宗儀急止之世忠覺而大驚急馳馬歸擒通至數其罪責令于淮隂崔德明軍自效世忠十月草三日誕生諸軍皆來上夀通最後至世忠見即入內不出通怏怏而回德明數通擅自離軍决數十下通遂投淮隂運河而死人皆惜之史稱世忠持軍嚴整所過民皆荷鋤而觀據此云云特一粗暴武人耳本傳絶不之及豈以細故當在所略歟抑皆不足信歟宋史成于托克托識者都譏其鹵莽前輩謂若欲重修必當參以東都事略北盟㑹編二書今幸此書鈔本猶存而字句多脫謬學士家亦無校讐及之者甚矣史學之不講也書王右丞集後王右丞為子美前輩子美贈王中允詩何等推重且深為湔雪其陷賊之故而右丞集中從無一詩及之何也豈有之而集中偶佚耶何為西莊王給事柴門空閉鎖松筠說者以王給事即右丞未免有不足之意然此語亦惜之非譏之也右丞與鄭䖍同汚祿山僞命乃子美詩皆無刺語可見古人用心忠厚非獨以全交情也今人於才名軋已者必欲發其瘢垢掊擊不啻仇讎解之者則曰文士相傾自古而然嗚呼使誠為文士也豈有相傾者耶書笠澤叢書後陸魯望先生笠澤叢書通考朝氏云四卷蜀本樊開序不言卷數止云八十餘篇蓋僖宗乾符六年春先生卧病于笠澤之濱撰此書中分甲乙丙丁詩文混載無倫次先生自言平日所作㸃竄塗抹厯年不能淨寫一本或為好事取去此蓋其未定之書也宋政和元年季夏毗陵朱衮重其志節刻之于吾邑嘉泰某年三山王公益祥來令因前令趙君廣言此書多闕誤且示以蜀本屬校刋之益祥乃以屬司教善著韓君是正千有餘字益祥跋其末寶祐五年閏月里人葉茵始以此書合之松陵集十卷凡四百八十一篇又别搜得一百七十一篇總為二十卷刻置義莊以廣其傳而叢書原本學者遂罕睹此本豫鈔得於海虞錢氏益祥跋語在焉最為完古惜字句不免漫漶耳其中有震澤别業自遣詩三十首考先生本居郡城臨頓橋又居甫里為先生躬耕處别業則在吾邑之震澤鎮自遣詩有云更感卞峰顔色好曉雲才散便當門又云一派溪隨箬下流春來無處不汀洲而胡宿撰碑亦稱震澤幽居南直辨峰之色西帶重湖之光辨峰即卞峰在吳興境與震澤接壤鎮西桃源洞為宋楊侍郎紹雲之居其後即養鴨䦨故址相傳先生嘗戲內養彈鴨故東坡詩云却因養得能言鴨驚破王孫金彈丸此事未定有無即果有之當亦在居震澤時然則此書之應屬吾邑無疑矣先生沒年唐史不載但云盧攜李蔚素與善及當國召拜拾遺詔方下而卒考盧李相于乾符元二年間五年皆罷而叢書自序乃云乾符六年春臥病笠澤是二人罷時先生尚在也若曰六年冬攜嘗再相則與蔚無與宋人林希逸固已疑之史又云光化中韋莊表贈右補闕考表贈在光化三年十二月表詞載容齊隨筆與李賀溫廷筠等十五人俱追賜進士及第贈補闕拾遺生者羅隱亦與焉未幾李詢辟莊判官宣諭西川莊因往依王建而唐亡矣嗚呼先生詩文瑰異本因清風髙節以傳區區遺補一官何足為先生重况盧攜之附田令孜韋莊之相王建其人齷齪無足數先生顧樂䝉其齒録也哉興言及此為之三嘆書渭南集後班固良史也為竇憲作燕然山銘卒至下獄以死馬融大儒也為梁冀作西第頌遂為正直所羞甚哉文章之不可以媚人也以韓退之名德之重而碑銘之作諛墓得金未免見薄于劉叉况乎以文章媚權貴者歟陸務觀詩才麗逸在楊廷秀萬里之上立朝建論亦讜亮有聲史稱其晚年為韓托胄撰南園閲古泉記時議或不平之考亭嘗言其能太髙跡太近恐為有力者牽挽今渭南集中此記不載豈以物議故削而不存耶史又載托胄欲記南園以屬楊廷秀以掖垣許之廷秀曰官可棄記不可作托胄恚改命他人殆即務觀也然記成而不聞有掖垣之擢何歟務觀為人非苟媚權貴者特筆墨失于矜慎遂致牽挽之疑信乎文士當知自守而清議之不可以不畏也書朱子大全集後王倫字正道文正公旦弟朂之裔南渡後家于吳遂為吳人建炎元年以和議奉使至金及得命而返金使有詔諭江南之名胡淡菴劾之醜詆為姧邪謂可與秦檜同斬後世三尺童子皆㦸手而詬厲之及觀朱子所撰朱奉使辨行狀中并及倫事則倫固忠義人也考其始末倫之使金本為奉迎梓宫及太后金人既如所請而又歸河南陜西地倫亦可告無罪矣逮後烏珠與達蘭富勒呼異議復渝盟執倫以去置之河間金之渝盟豈倫所及料哉倫痛其言之不讐拒金僞命冠帶南向再拜慟哭就縊而死其心良足悲矣朱子于倫方與朱辨並稱而世顧與秦檜同詆此不可不白也朱子劾知台州唐仲友極論其促稅擾民貪淫不法時相王淮怨之致有道學之禁然考之他書仲友固名儒也所著有六經解皇極經世圖譜博聞洽識見稱諸儒而其守台日發粟賑饑抑姧拊弱創中津浮梁以利涉載在邑志其治行如此乃有貪淫不法等狀何歟宋史不為仲友立傳蓋以朱子之故宋潛溪特傳之以補史闕潛溪為仲友邑人相去未及二百載其言當不誣而朱子劾仲友之章凡五上閩本集中不載浙本有之學者誠不能無疑于此也朱右又云永康陳亮與仲友不相能朱子提舉常平行部過其家乘間為飛語中仲友通判髙文虎復以舊怨傾之朱子遂為所惑然則仲友之事朱子殆有不及深察者歟噫賢人君子之是非天下後世所以取信也然有不盡然者今人乃欲據史策以定古今人賢不肖不亦難乎書陽明先生傳習録後陽明之學源於孟子即致良知亦大全吳季子之說非創論也天泉橋四語惟為善去惡是格物與朱子解異若無善無惡者心之體此即正心章傳文之㫖後儒髙忠獻顧端文陳幾亭諸公皆力辨其非惟鄒忠介深信之余嘗平心參勘知此言與朱子所云虛靈不昧者無以異也人心惟虛故靈虛則安容著一物塵土固能眯目即金玉屑亦豈不為目之障耶虞書頌堯德而曰光被四表德之光正心之光也日月之有曜金石之能鳴皆以中虛心若有一物焉光何從發昔儒嘗以雞子喻天體矣今試取雞子驗之中有白有紅為受形之胚胎其頂必有空虛少許此空虛者乃旋神孕氣之處形之所從變化也心之空洞無物所以能樞機萬物亦猶是也善與惡皆起滅於心而非心之所繫也或曰若如子言則仁義禮智非心之所生者耶余曰仁義禮智固根心生而心之空洞無物自若也朱子嘗言心如穀種矣穀之為種則心也種之地而成禾則仁義禮智之性也禾之中有稂焉粟之中有秕焉嘉穀不能免也然使未蒔地之時而遽取而目之曰此為嘉穀此為稂與秕也雖農師亦所不能則安得以善與惡為心之所有也惟無善無惡而善惡俱根柢是君子是以有戒慎恐懼之功焉涵之使不入於偏省之使不流於陂此之謂正其心主於靜以養其中和操之動以觀其出入此之謂存其心若龍溪以無善無惡為性則直祖告子之說與天泉宗㫖微有别矣髙忠憲之駁陽明又以至善無惡者為心夫至善無惡可以言性而不可以言心若驗之人事性亦安得皆善孟子之說亦舉其大凡耳后䕫之子實為封豕叔向之子生而豺聲後世若齊文宣周天元之流一日不屠膾人則慘然不樂也謂非得之性生者耶魏凝叔曰陽明之學與考亭誠有異同然皆原本于尊德性道問學之㫖後儒當從異處證其同處必掊擊陽明以伸考亭則過矣且考亭之教如日中天何待詘陽明始伸之耶讀此作實獲我心書夏瑗公幸存録後明室之禍起於流冦不知流冦之所以披猖莫制者皆成于廟堂諸公但知爭門户勝負而不知以盜賊為憂生靈為急甚有以督撫為報怨修卻之資朝任夕改致天子茫無足恃自古敗亡之烈其速如翻掌易如建瓴未有甚於思陵之季者也江右王于一云朝廷嚴勒督撫大臣討賊督撫多畏縮不能擊朝議又以朋黨私隙謀報復陽為推轂實借冦兵中之督撫出如驅羊就虎甚則借招撫隂與賊通諸將益驕蹇不用命賊日益張卒以亡國余每讀于一斯言未嘗不欷歔悲歌繼之以泣下也瑗公先生此録所考門户本末最為詳慎而以修怨陷督撫致僨國則未之及竊欲補入此節傳之信史為千秋黨禍之戒云愚菴小集卷十三
