body:
  text: 愚菴小集卷十二吳江朱鶴齡撰辨弼鄘衛三國辨鄭氏詩譜云武王封紂子武庚為殷後乃三分其國置三監使管叔蔡叔霍叔尹而教之自紂城而北謂之弼南謂之鄘東謂之衛三監導武庚叛成王討之更于此建諸侯以殷遺民封康叔于衛使為之長子孫稍并彼二國混而名之按弼鄘始封不詳以事理揆之二國蓋不與衛同封也武王既克殷其封武庚必以大國又慮武庚不靖乃使三叔為之監監者監而治之蓋以殷之畿內漸紂化日久未可建國且使三人為之監領如王制使大夫監于方伯之國國三人之類非所封也封國則管蔡霍是已管即今管城蔡即今上蔡霍即今霍邑皆不在殷舊都之內蔡仲改行率德周公復邦之蔡此可證三叔各有所封弼鄘衛非其國明矣漢志云弼以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監按三叔監殷不知何以獨遺霍叔帝王世紀云管叔監衛蔡叔監鄘霍叔監弼其説與此不同鄭氏云成王以殷遺民封康叔于衛二説皆非其實也鄭氏之誤蓋因于康誥書序考康誥酒誥梓材三篇皆武王所命則武王時康叔已封衛矣康誥稱康叔曰孟侯時已為諸侯之長矣衛既以封康叔而又使蔡叔尹之則將置康叔于何地耶梓材曰王啓監厥亂為民康叔封地參錯于三監之間故當時亦謂之監若弼鄘之地即武庚國都三監所蒞無庸更以封他諸侯也周書作雒篇云武王克紂建管叔于東衛在殷東此與世紀管叔監衛語合豈未封康叔以前事耶建蔡叔霍叔于殷俾監殷臣注云鄁弼同鄘為殷此亦一證也揆之事理當時天下初定殷民反側未安苟非同氣懿親必不授之以監撫之任而史記載武王同母兄弟十人各有封土並無及弼鄘者此以知弼鄘之為武庚國都無疑也逮乎武王既崩三叔挾武庚叛周公東征定之殷之頑民悉遷于洛邑其未遷者乃就其地封建諸侯分為弼鄘二國不知更歷幾世而併于衛焉漢志云周公誅三監盡以其地益封康叔故弼鄘衛三國同風亦非其實也鄭氏謂三國並建不從漢志云云蓋以益封弼鄘則全得殷畿國大非制然鄭氏知益封非制而不知封康叔不在成王時此詩譜之所以失也史傳失紀弼鄘本末無從考證漢儒率以意為之説近人為偽子貢詩傳者乃云管叔封弼霍叔封鄘並康叔封衛為三監弼風雄雉諸詩刺管叔也鄘風芄蘭刺霍叔也疑誤後學不小故特著之考史記康叔在武王時繼蘇忿生為司冦意其雖封于衛而嘗入為王官故康誥有外事及外庶子等語蓋衛對王朝為外也三監叛時康叔不與其亂成王嘉之必有加地進律之典後人遂以為成王封康叔又以為益封弼鄘其誤皆由此耳周頌大武分章辨詩序武奏大武也左傳武王克商作武其卒章曰耆定爾功其三曰賚為第三篇鋪時繹思我徂維求定其六曰桓為第六篇綏萬邦屢豐年篇次與今不同疑未正樂以前如是耳自傳詩者以武為大武之首章桓為大武之六章賚為大武之三章華谷嚴氏因其説謂酌與般亦大武篇內之一章以愚考之其説誤也周頌告神其辭簡嚴故篇止一章無有疊章者左傳既以耆定爾功為大武之卒章即不得以武為大武之首章而下之其三其六斷皆以篇言而非以章言矣杜預注本如此傳之意蓋謂武為武王之樂桓與賚亦皆武王之樂故以其三其六數之雖當時篇次已不可詳考然桓賚四篇必無屬武樂分章之理今即以左傳證之隨武子引汋曰於鑠王師遵養時晦又引武曰無競維烈以酌與武對舉則酌非大武篇中之一章而其餘可知已况頌各一章章各一義武頌功酌頌成桓頌志賚頌封賞般頌巡行皆為武王作也如酌桓以下不過武樂內之一章而已則作詩者何必各立篇名以繫之耶後之偽作申公詩説者遂以武為大武之首章賚為二章時邁為三章般為四章酌為五章桓為六章巧合武樂六成之數此又以説詩為舞文實誤解左傳啓之也不可不辨禹貢三江辨三江之説不一班固漢書以一從吳縣南東入海為南江一從蕪湖西東至陽羡東入海為中江一從毗陵北東入海為北江郭璞爾雅注以為岷江浙江松江韋昭國語注以為松江浙江浦陽江水經浦陽一名潘水在會稽界考一統志浦陽在金華浦江縣界史記正義曰韋注非也錢塘浦陽其源俱不通太湖庾仲初吳都賦注張守節史記正義顧夷吳地記皆以為松江東江婁江蘇氏書傳即據禹貢以岷山之江為中江嶓冡之漢為北江自豫章入彭蠡而東為南江其説似可信乃蔡氏書傳及黃東發金吉甫諸家皆主吳都賦注蓋以此三江連派震澤吞吐百川吳越諸水皆從此泄又周禮荆州川曰江漢揚州川曰三江可證揚州自有所謂三江而非即江漢况南江未見經文必增此以合三江之説亦所未安也金吉甫謂彭蠡既為三江之一則上文已出彭蠡不應又出三江且經文二既字對舉皆本效之詞彭蠡既豬矣則陽鳥攸居三江既入矣則震澤砥定是三江乃震澤下流之三江耳然經云既入者入于海也必入海之道有三然後可以當三江之目吳都賦注曰今太湖東注為松江下七十里分流東北入海為婁江東南入海為東江史記正義曰三江在蘇州東南三十里名三江口一江西南上七十里至太湖曰松江古笠澤江一江東南上七十里至白蜆江曰上江亦曰東江一江東北下三百餘里入海曰下江亦曰婁江其分處號三江口據吳都賦注則婁江東江入海據史記注則惟婁江入海似三江口既分婁東二江復合為一江而入海者考朱長文吳郡續圖經今松江大黃浦入海者古東江太倉劉河入海者古婁江陳繼儒曰婁訛作劉蓋土音也二江皆松江支流入海之道未見有三也近世歸太僕有光引國語吳之與越三江環之謂當從郭璞岷江浙江松江然吳越春秋云范蠡去越乘舟出三江之口入五湖之中則三江自在吳地貨殖傳吳有三江五湖之利是也所云三江環之者本言三江控帶吳越之境包舉之詞非可深泥自桑欽許慎輩誤云江水至山隂合浙江故郭璞以浙江為三江之一酈道元已經辨正豈足據乎愚按三江既入與震澤砥定連書則此三江者必與岷江震澤相為吐納今大江東過江隂許浦入海班固所云北江也永陽江在溧陽西北下流入宜興界注太湖入海班固所云中江也吳淞江分東婁二江入海班固所云南江也水經江水自石城東出過毗陵縣北為北江其南江東北為長瀆歷河口酈注即太湖東則松江出焉江水竒分謂之三江口即松東婁三江又云中江在丹陽蕪湖縣南東至陽羡縣入海所分三江與班志正同王荆公謂一江自義興一江自毗陵一江自吳縣亦取班固説吾謂禹貢職方之三江必指此無疑矣古時五堰未築江水挾金陵宣歙諸水南東注于太湖北江中江為太湖上流南江為太湖下流上下流皆入海故係之以砥定學者特疑中江北江之名與導水之文相亂故多主松東婁為言不知此以講求水利可耳以之説經豈有當乎三江錯書于彭蠡震澤之間氣勢苞絡必為廣逺而僅僅以震澤下流當之此泥傳注而不求博通之失也田佛淵曰以古迹解古經的不可易今人能信此者鮮矣震澤太湖辨禹貢震澤砥定孔氏傳震澤吳南太湖名孔頴達正義因之云餘州浸藪皆異惟揚州浸藪同處論其水謂之浸指其澤謂之藪周禮職方氏揚州澤藪曰具區浸曰五湖鄭氏注具區五湖在吳南爾雅十藪吳越之間有具區郭璞亦因仍舊説以余詳考具區為禹貢震澤班固地志得之古文無可疑孔氏鄭氏所云在吳南者是也但以為即五湖則其説不然按風俗通云水草交厝曰澤又云藪厚也有草木魚鱉厚養人也周禮凡言藪者皆人可資之以為利故曰藪以富得民而浸則但為水之淵渟而己如穎達所云則一水而故殊其名于義何取乎諸州皆有澤藪不應揚州水國反獨無之而與浸同處况孔鄭所云吳南者謂吳縣治之南也吳縣治之南為今吳江至嘉興一帶禹時具區當于其地求之若五湖乃今太湖自環吳郡之西北豈可合之為一哉石林葉氏夢得曰今平望八斥震澤之間水瀰漫而極淺與太湖相接而非太湖惟淺而瀰漫故積潦暴至無以泄之則溢而害田所以謂之震然蒲魚菱芡之利人所資者甚廣亦可堤而為田與太湖異所以謂之澤藪他州之澤無水暴至之患則一名而已具區與三江通塞為利害故二名以别之禹貢方以既定為義是以言震澤而不言具區也斯言也可以釋孔鄭之惑而折其角矣然則禹貢之不及五湖何歟曰懷襄未平三吳一壑湖水西來汜溢則澤水奔騰震蕩陂障難施且下奪松江入海之路經書震澤砥定而五湖之治從可知矣况松江為太湖下流上云三江既入則上流之治自見不必復出五湖此固史臣書法也然則震澤何源曰山海經云浮玉之山北望具區苕水出乎其隂後人既以具區為太湖遂謂湖水發源天目然古時大江之水直注太湖其西北上源有宣歙金陵諸水由荆溪百瀆以入焉其西南則納苕霅七十二溪之水具區之源當亦來自苕水而淺而易溢與太湖相為盈縮所以其害甚大自砥定之後澤水可陂沮洳十百里民仰其利故爾雅謂之藪職方謂之澤藪而五湖則别之曰浸逮乎日久填淤生殖日繁漸成沃壤漢以後諸儒求其地而不得遂合五湖而一之穎達又曲為之説豈知三代以前固有澤浸之不同也哉吾意今吳越之交凡濱湖而沃衍者皆古震澤地特世代荒逺川隰更移其故迹不可詳耳抑非獨此也爾雅周禮所載澤藪如冀州之陽紆并州之昭餘祁幽州之貕養兖州之大野荆州之雲夢青州之望諸晉之大陸鄭之圃田周之焦穫今皆變為原隰不能定其所在蓋川浸通流終古不改藪澤稀水最易澱淤厯數千年而湮沒不可考無足怪者奚獨于具區而不然耶然則揚州藪浸之非一處章章矣近吾友王子寅旭有論亦持葉氏之説而其義未盡余故詳著之嶓冡漢源辨禹貢嶓冡導漾東流為漢解者多糾結于水經地志諸書迄無歸一之論班固地理志云隴西郡西縣嶓冡山西漢水所出桑欽水經云漾水出隴西氐道縣嶓冡山沔水出武都沮縣狼谷中東西流注常璩華陽國志云漢水東源出武都漾山為漾水西源出隴西嶓冡山徑葭萌入漢所謂西漢者徑階沔利劒東南至渝州入江所謂東漢者徑梁洋房均襄郢東南至漢陽入江酈道元云東西兩川俱出嶓冡而同為漢水其説與班桑微異杜佑通典云秦州上邽縣嶓冡山西漢所出徑嘉陵曰嘉陵江徑閬中曰閬江漢中金牛縣嶓冡山禹導漾水至此為漢水亦曰沔水其説與桑酈又微異宋文叔黃氏度書説始正之曰漢有漾沔之名皆東漢水也地理志西漢出西縣嶓冡山南入廣漢白水蓋潛漢也經不言其所出自古以為東西兩漢俱出嶓冡則或然矣而西漢固無漾沔之名漢志漾水出隴西氐道至武都為漢武都漢水受氐道水名沔是則漾沔俱為東漢也獨氐道武都川渠阻隔武都受漾别無可據而桑欽遂徙氐道漾水為西漢之源由是紛錯酈道元委曲遷就通之以潛伏之流證之以難驗之論更覺齟齬故當盡廢諸説一以經文為斷也先朝苑洛韓氏邦竒又正之曰鞏昌嶓冡是漢源漢中無嶓冡沔水出金牛山在沔縣西人誤為漢水遂以金牛為嶓冡耳愚按自古稱漢有東西二源禹貢漾流為漢此東源也但班志以西漢水出隴西嶓冡于武都東漢止言受隴西氐道漾水而不著其所出之山則是東漢之源與西漢同出氐道明矣漢中嶓冡杜佑以前未聞常璩亦止言武都漾山不明言嶓冡也韓苑洛漢中無嶓冡之説正足與班固相發明韓關中人其言可信孔安國曰漢上曰沔漢上者漢水之上流也嶓冡漾水出沔陽今沔縣為沔水經南鄭為漢水謂沔水即漢水不可謂沔水非漢水亦不可也氐道武都川渠阻隔誠如黃氏所疑然漢水多伏流故别曰潛漢漾之為名特泉始出耳東行武都其流始大今漢中沔縣即漢武都地也其曰受漾者正謂氐道至武都自源徂流水脈相接而豈必有川渠之可求哉蓋大禹導漢與導江不同江水導其流故岷山直曰導江漢水導其源故嶓冡不曰導漢若嶓冡近在沔陽則漢水已津流浩瀚不應有漾水之月矣桑欽誤分漾水為西漢沔水為東漢遂滋後人之惑今之撰通志一統志及雍大記諸書者類皆沿襲舊説此不可以不急正也至于潛漢非即西漢諸家亦從無辨明尚書正義引爾雅注云有水從漢中沔陽縣南流至梓潼漢夀入大穴中通罡山下西南潛出舊俗云即禹貢潛水也史記正義云潛水源出利州綿谷縣東龍門山大石穴下庾仲雍以墊江晉縣有别江出晉夀縣此即潛水余按今保寧府廣元縣漢廣漢地也蜀漢曰漢夀晉改晉夀隋改綿谷石穴水當是經綿谷出宕渠今渠縣杜少陵詩綿谷元通漢此一證也鄭康成云漢别為潛其穴本小禹自廣漢疏通即為西漢蓋即指綿谷水耳然此水既從沔陽南流則是東漢枝派與西漢水迥不相蒙地理志云潛水出巴郡宕渠符特山西南入江不云潛即西漢康成始合之為一酈道元孔穎達輩因之疑康成説不足信及考水經注西漢水自嶓冡而下即西南流過祁山入嘉陵道為嘉陵水又東南流經宕渠合宕渠水乃知西漢水入潛故世遂以潛即西漢耳若必如注疏解求所為出漢入漢者為潛則今之宕渠水與西漢水皆至合州入大江何嘗與沔漢相為沿注哉梁州貢道浮于潛逾于沔因潛水伏流故阻漾枝津酈道元所謂漢水枝分斜出其説當不妄而黃氏并此非之過矣鄭端簡又云梁州三十六江皆是潛水此又非定論謹識之以俟博聞苕文曰曰漢曰漾曰沔皆音相近而訛此文出始有歸一之論春王正月辨漢人説經多為宋儒掊擊然實事求是漢人近古聞見猶真學者不之考求而率為支離牽綴之談則過信宋儒之失也春秋聚訟莫甚于春王正月之一言謂周人時月俱改者孔安國鄭康成也朱文公孟子注主此説謂改月不改時者胡康侯也謂時月俱不改者蔡仲默也元人陳定宇張敷言史伯璿吳淵穎等皆祖述漢人自胡傳頒學宫故夏時冠周月之説牢不可破余謂春秋本魯史記事之書説春秋者即據春秋事為衡斷可已經文僖五年春王正月辛亥朔日南至昭十二年春王二月己丑日南至杜預注當在周正月失閏也使非改時與月冬至何以不書于十一月乎昭十七年夏六月甲戌朔日有食之太史曰日過分而未至三辰有災于是乎伐鼓用幣此月朔當夏四月是謂孟夏僖五年八月甲子晉侯圍上陽卜偃云丙之晨龍尾伏辰鶉之賁賁天策焞焞火中成軍虢公其奔其九月十月之交乎丙子旦日在尾月在策鶉火中必是時也冬十二月丙子朔晉滅虢哀十二年冬十二月螽仲尼曰火伏而後蟄者畢今火猶西流司厯過也杜預注火伏在十月今西流是九月夫日食在四月而書六月滅虢在十月而書十二月螽在九月而書十二月此非時月俱改之明驗乎桓十年冬十月雨雪十四年春正月無氷成元年二月無氷定元年十月隕霜殺菽如以夏正言之則十月雪霜與孟春仲春無氷何足為異此非時月俱改之明驗乎昭十七年星孛大辰梓慎曰火出于夏為三月于商為四月于周為五月夏數得天若火作在宋衛陳鄭乎以此證時月之改最為顯白胡氏乃云改月不改時夫子特以夏時冠之夫謂不改時則是魯史本書元年冬正月也四時無首令何以成正朔且夫子生為周人而擅更周制何以寒亂臣賊子之膽此其説之尤妄者也若曰冬不可為春十一月不可為正月則先儒于此有説矣黃鐘初九律之首陽之變也林鐘初六呂之首隂之變也子者一陽之生于卦為復至午而陽極焉午者一隂之生于卦為姤至子而隂極焉子為星紀之次五星起其初日月起其中夫律厯皆以子為首則何不可以首月令乎三正迭建時無失次夏正用木之著者也殷周二正用木之微者也皆陽位也特孟陬之月尤切民事故夫子曰行夏之時而豈謂子丑之必不可為正哉秦人改建亥月蓋自以水德代周且五行木生于亥故用之雖事不師古然改時與月必循三代之舊本紀元年冬十月顔師古謂是太初正厯以來史臣追書蔡氏顧引之以為不改時月之證其亦疏矣或曰尚書者春秋以前之史也伊訓惟元祀十有二月乙丑泰誓惟十有三年春大會于孟津其時月俱不改蔡傳辨之甚悉子今而反之何也余曰舉此二端時月之改尤章章也夫商人建丑十有二月夏正之十一月也下云伊尹祠于先王奉嗣王祗見厥祖先王自契至玄冥以下厥祖湯也商人宗廟之禮不可詳考祭法云殷人禘嚳而郊冥祖契而宗湯豈非其月至日伊尹攝行郊祀配天之禮因而陳訓太甲乎班固以三統厯推之湯伐桀之嵗在大火房五度故左傳曰大火閼伯之虛實惟商人後十三年十二月乙丑朔旦冬至其日伊尹祀先王于方明以配上帝此其證也十有三年之春即春王正月之春謂十一月也何以明之武成惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商戊午師渡孟津癸亥陳于商郊牧野一月孔氏以為建子月是也師渡孟津即大會于孟津也癸巳至戊午凡二十六日皆在一月癸亥則十二月之四日也左氏外傳引伶州鳩言武王克商嵗在鶉火日在析木月在天駟辰在斗柄星在天黿班固以三統厯推之師方發為殷十一月戊子日日在析木箕七度其夕月在房五度房天駟也後三日得周正月辛卯朔合辰在斗前一度斗柄也明日壬辰晨星始見癸巳武王始發戊午渡孟津明日已未冬至晨星與婺女伏厯建星牽牛至于婺女天黿之首至庚申二月朔日也癸亥陳牧野甲子昧爽合戰與書傳無一不符者此又其證也班史學有師承左氏與聞筆削必非鑿空勦説今不之信而羣奉蔡氏之臆解為金科不已傎乎商周之書明證如此獨何疑于春秋乎或曰子之説春秋可矣抑考之他經何多抵牾也豳風七月流火九月滌場等語皆用夏正小雅春日遲遲卉木萋萋秋日凄凄百卉具腓與四月維夏六月徂暑時月無改也周禮山虞仲冬斬陽木仲夏斬隂木與馮相氏之冬夏致日為冬至夏至春秋致月為春分秋分時月亦無改也論語莫春者春服既成浴乎沂風乎舞雩明是夏正之辰月此類難更僕數子何以解焉余曰詩禮所云皆錯舉民風嵗令而非史官記載之書也古者天子受命凡改元頒厯朝覲會同諸大政皆以正朔行之至于分至啓閉民事早晚之所關如所云火見而致用水昏正而栽日至而畢者未嘗不遵夏小正之書東萊吕氏謂三正通于民俗斯言當矣蓋史官紀時事則從周正月令紀嵗功則從夏正從周正者多出于朝廷政令之施設從夏正者多出于民間士女之話言二者並行不悖詩書三禮約略同揆又何疑于春秋乎夫春秋本魯史舊文夫子因而筆削之繫王于正月之上則出夫子特筆若曰凡我之所為賞人罰人豫人奪人者特奉行天子之事云爾若如蔡氏之説則周之建子實與建寅無異如胡氏之説則夫子以陪臣而􅏌然王制自為不韙之誅無乃身自冒之乎陽明先生有論足破胡氏膏肓獨謂商不改月秦不改時周則時月俱改援證猶有未核余故博考而衡斷之使世之學者知漢儒説經不可偏廢也陳確菴曰只左傳火出于夏為三月于商為四月于周為五月此便是商周時月俱改的證何必他求苕文曰證據確鑿使康侯仲默見而服膺甫草曰縱橫貫穿可與劉原父輩抗行春秋譏世卿辨三傳之文往往互有得失當以理揆斷之如隱元年惠公仲子之賵榖梁是而左氏非吾友顧子亭林已詳辨之矣至三年左氏書君氏卒以為聲子也不書姓為公故此尤謬也春秋十二公無有國母不書姓者惟僖元年書夫人氏之喪至自齊此蓋哀薑通乎共仲與弒二君桓公召而殺之絶之于齊故春秋亦不書薑尊伯令也若聲子則固惠公之繼室也無故而沒其姓有此書法乎隱公即自居于攝然己儼然立于臣民之上矣絀所生之母之姓以伸其弟之母之尊亦豈公之所安乎必若此曷若不書之為愈乎蓋君與尹相近乃史文之訛若非公穀作尹則此疑萬古不白矣然公羊以書尹氏卒為譏世卿則又不然古者天子公卿不下交諸侯故其死亦不赴告春秋惟劉卷王子虎以嘗同會盟來赴此書尹氏卒吳臨川謂平王崩為諸侯之主而來赴者或疑赴當書名此何以不名蓋如隱七年滕侯卒之例未同盟則不赴以名左氏所謂禮經者也書之實非譏也考周家用人不離世族故棄賢者之類絶功臣之世則裳裳者華刺詩興焉厲王之難周召共和周公召公皆世卿也敬王之立單劉翼戴單子劉子亦世卿也功臣之後即有非類亦在選擇而用之此書尹氏本吉甫之後其以告喪而交魯未見必非忠賢安得以幽王朝家父所刺者而追譏之又安得以敬王時之立子朝奔楚者而預譏之哉若論侯國則大國三卿次國二卿小國一卿皆命于天子若殄其世是無王也齊桓公之時國子髙子為正卿管敬仲柄任雖専亦止下卿不敢居王官之上也其五禁云士無世官取士必得蓋即外傳所謂始于州長之推繼于官長之選者止言士而不及卿大夫此可證世卿在當時不可輕廢矣胡康侯張元德不從左傳君氏深為得之但承用公羊譏世卿之説愚竊以為未允季札不書公子辨季札止一見于經襄二十九年聘魯而不書公子杜氏以為其禮未同于中國止齋陳氏以為書札者同于楚椒秦術皆非命大夫也常山劉質夫則云辭國而生亂札實為之春秋因其來聘去公子以示貶胡康侯張元德皆主其説愚考夀夢子四人長諸樊次餘祭次夷昧札其季子也夀夢賢札欲立之札不可諸樊請兄弟迭為君而致國乎季子諸樊卒餘祭立餘祭卒夷昧立逮夷昧卒國宜之季子季子復不受于是立王僚僚者夷昧子也諸樊之子光曰我王嗣也僚安得為君乃使専設諸刺僚殺之計光之殺僚去札之聘魯凡三十年仲尼安得以三十年後之事而預致其貶哉况讓國大美也太史公以泰伯首世家伯夷首列傳惟進讓而惡爭也曹之子臧其子孫猶見重于春秋札固自云願附子臧之節者也來聘一書本史策常體非讓吳大節所繫若舉其大節春秋必深嘉而亟許之豈反以之為貶哉康侯謂泰伯採藥而不返季厯嗣位而不辭責季子何不為季歷嗚呼達節而不守乃聖人之能事仲尼以平恕宅心奈何輕以之責札哉公羊又謂夷昧死則國宜之季子季子使而逃焉夫札既辭位則終身為吳臣前之使魯也受命于餘祭後之使晉也受命于王僚安得辭之考左氏昭二十七年春札聘晉夏四月公子光殺僚是聘晉之時光篡弒之謀尚未露也安能逆料之而不出哉近世邵國賢乃譏札之託使以逃僚為非義此又惑于公羊之説而未審其情實者也然則札無可議乎曰札之讓美矣惜乎于讓之義有未盡也夫行之髙世者不當居其名事之行權者尤在晦其迹泰伯仲雍之讓必逃之荆蠻伯夷叔齊之讓必逃之西山北海以為不若是則志不可得而成也即春秋時子臧之辭曹也諸侯欲見之于王子臧逃奔宋以自絶當夀夢未沒父兄皆欲致國乎季子札于此時即當逃吳而去之苟一日立于吳廷國人必持以次傳位之議餘祭夷昧所以不當立而立也即不然于夷昧之嗣當請立光為世子不從則力爭之曰光為冢適國固光之國也光不立必有覬王位者是父子兄弟間相傾相􅐁無己時也嗣定而後退耕于野如此則王僚不得立吳可免于篡弒之禍矣今也負讓國之美名而其迹不能自逺一則奉使再則奉使偃然就封延陵既無以絶吳人之望又無以杜窺伺之心一旦逆謀猝發而札亦莫可如何夫然後去之延陵終身不入吳國嗚呼晚矣大抵札智人也智以全身必疏于謀國智以觀物必務于立名知附子臧而不知子臧逃宋之義此所以不免于賢者之責歟如徒以辭國生亂故不書公子以貶之則紛紛攘位竊國者反得援之以藉口而春秋書法竟為深文鑿説之祖矣孔子用魯年月辨孔子用魯左傳載之不詳惟定公十年書相夾谷郤萊兵十二年書命申句須樂頎伐費人史記孔子世家以墮三都為十三年事由大司冦與聞國政及季桓子受女樂去齊為十四年事考之春秋十三年夏書築蛇淵囿書大搜于比蒲十四年秋復書大搜于比蒲夫築蛇淵志逸遊也大搜志僭天子禮且明三卿専兵也其時設孔子得聞國政必無是事魯世家則以墮三都去魯皆序于十二年年表亦以受齊女樂書十二年愚謂魯世家是而孔子世家非也何以言之孔子欲得志于魯必先用三家用三家必先用季氏夫季氏雖専可以禮服也臣無藏甲大夫無百雉之城孔子既昌言之于朝而桓子以陽虎侯犯之叛深患費郈強固墮都之舉雖仲由主之亦季氏意也及公山不狃叔孫輒帥費人襲魯孔子命申句須樂頎伐而敗之既順季孫之欲又張公室之威桓子蓋隂為孔子用而不覺是舉也聲勢震動義服鄰國齊人懼而惡之犂鉏之計得行遂以女樂文馬來饋三日不朝桓子之意荒矣能無行乎經于是年夏書隨郈墮費十二月書公圍成蓋桓子耽于淫樂志不在疆埸之事而一時阿附三家者如公斂處父之徒且以為無成非孟氏利無成非孟氏利則無郈無費亦豈叔季氏利哉桓子惑于其説必于孔子之所為深疑且畏所以圍成之役三卿不行而使公行明知公之必不足以墮成也不然使孔子用魯桓子信任不衰則成乃蕞爾邑何忌又學于孔子者仲由専其謀申句須樂頎奮其力克之乎何有乃至頓兵而不下哉公羊傳云孔子行乎季孫三月不違蓋自攝相至去魯不能浹嵗圍成之時孔子已微罪行矣余丙仲云魯郊在十月孔子以郊祭膰俎不致而行是行時正值有事于郊之日公之圍成不克自在十二月不相及也此可與吾説相證明胡文定乃言圍成之時孔子雖用事未能専得魯政也越明年始由大司冦攝相事豈非承史記疏謬而強為之説哉又按定公十年孔子忽用于魯論語左傳皆不言其故獨孟子云于季桓子見行可之仕蓋定公初年意如卒陽虎専政五年囚桓子八年又將殺之僅而獲免是時季氏不振甚矣必與國人謀為靖亂之道而孔子年已五十餘弟子多來自列國桓子心服其賢乃舉而歷試之已而政聲四達齊歸侵疆至十二年任之以墮三都之事及齊人行間桓子之志中移遂去魯適衛是孔子之用舍皆由桓子也金吉父論之頗詳特以齊歸女樂在圍成不克之後猶未能考正史文之失周人禘嚳辨祭法曰周人禘嚳而郊稷鄭氏謂禘嚳者祀昊天于圜丘而以嚳配之也王肅則云大祭于廟而以嚳為祖之所自出夫周人以后稷為太祖七廟至稷而止又推而上之曰后稷生于薑嫄乃立薑嫄之廟曰先妣薑嫄帝嚳之妃而特立廟是帝嚳無廟矣無廟則無主無主則無以禘將禘于后稷之廟耶是以父而下食于子孫之廟非禮也蘇子由詩傳致疑于此故非肅而取鄭然如鄭之説則禘與郊相亂且商周未聞以嚳配天愚謂周人之于嚳蓋以天事之也天無廟而南郊則設主配之以稷嚳無廟而大祭則設主配之以稷是等嚳于天也何不可哉趙伯循謂魯禘本無文王廟止有周公廟只是臨時立文王主與尸而祭之周之禘嚳當亦如是耳至禘祫之分諸儒尤聚訟鄭氏謂禘三年祫五年禘大于四時而小于祫此據緯書夫祭未有大于禘者矣禘帝也三王始祖皆古帝之苗裔王者追祭始祖所自出之帝故曰禘非審諦昭穆之謂也今世所尊信者謂禘祭不兼羣廟之主以其疏逺不敢褻此趙伯循之説也三年一祫五年一禘此張純答光武問之説也然稽之經典實無明文惟曽子問云祫祭于祖為無主祫祭則廟虛而無主而不及禘王肅謂禘祫皆殷祭舉祫則禘可知不言禘不合食也公羊文二年傳云大事者何大祫也五年而再殷祭蓋謂三年一祫五年再祫以象閏不言禘以何年也康成臆揣為禘祫相因之論又妄引春秋魯禮及緯書以文致其説其謬可勝辨哉及考禮記大傳則禘祫本一祭而異名大傳曰王者禘其祖之所自出以其祖配之諸侯及其太祖諸侯不敢禘但祫于太祖之廟大夫士省于其君干祫及其髙祖大夫士不敢祫必有勳勞見察于君乃得與祫四世及其髙祖致堂胡氏謂王者祭其所出之帝為東向之尊餘主合食于前此之謂禘諸侯無所自出之帝則于太祖廟合羣廟之主而食此之謂祫天子禘諸侯祫大夫享上下之殺也禮所謂不王不禘者也程子説禘祫與此同魯侯國當祫而以賜天子禮樂得行禘禮故春秋論語言禘不言夾也禘惟合祭其禮為重魯僭用之夫子故每每致譏非禘外又有祫也若王制所云春礿夏禘又云天子祫禘祫嘗祫蒸又云諸侯禘一犆一祫又云諸侯礿則不禘禘則不嘗其言棼錯無統紀蓋王制乃漢儒雜采傳記為之非孔氏之舊也又考詩序雍禘太祖也而其詩曰假哉皇考曰既右烈考亦右文母長發大禘也而其詩曰相土烈烈曰武王載斾以及與祭之阿衡則禘祭為合饗羣主明矣知禘祭之合饗羣主則禘祫非二祭復何疑乎朱子蓉曰禮經疑義一旦劃然功在康成之上愚菴小集卷十二
