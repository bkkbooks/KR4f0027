body:
  text: 愚菴小集卷五吳江朱鶴齡撰七言律清明日小集逺就閣用介白韻萬頃飛瀾湧嘯臺諸峰歷歷泛青來長空氣淨煙初散曠野雲低鶴未回人坐落花春樹老樽銜返景夕鐘催短笻不厭頻留駐寄語湖光取次開同包驚幾張九臨過友人村齋自鼓蘭橈問藥房方塘十里半垂楊桃花浪暖紅連岸竹徑隂深碧滿牀鶯語正愁詩律細篆煙時拂酒船香差池巾舄渾忘返倚杖看雲興轉狂無殊曰如初日芙蓉天然藻麗題沈留矦村齋踏盡溪雲草徑斜亂煙茆屋野人家竹間乳雀翻庭翠檻外間魚蹴浪花盡日采霞供筆格有時招霽護蘭芽即看此地饒濠濮豈羡雲門與若耶過周安期山中故居霜葉重重合翠微石苔行迹尚依稀身逃谷口名仍在賦就甘泉世已非書帶漫隨寒燒盡薜帷俄逐水煙飛白蓮耆舊多凋謝更與何人共釣磯介白曰悽惋之調丰致嫣然酬薑如須見寄支離一病嘆無憀經案繩牀對緑蕉猿鶴化來機漸息芝蘭焚後淚難消鹿門本自甘遺散臯里憑誰慰寂寥澤芷江蘺無限恨頻傳莫惜五湖遙寒月冷淡銀河夜氣清素娥應怯羽衣輕風庭摵葉飛聲急霜樹驚鴉散影明皎透晶屏燈失熖涼侵玉枕夢難成碧空萬里同含思何處髙樓最有情樵水曰穠麗得之溫李結意深長酬周侍御見寄風來梧片氣初涼讀罷南華隱石牀芳草故人頻入夢碧雲新句逺相將當年煆憶山陽柳此日吟分曲水觴密荇文魚濠上樂幾時蓮艇共回塘贈侯大將軍斫地悲歌撫劒鐔種瓜仍自選雲岑門臨大澤龍吟發枕對孤峰鹿徑深黃石祕符留蕙帳白猿雄術寄松林知君氣槩凌耿賈豈得懷鄉但越吟甫草曰雄渾有氣槩得老杜之一鱗片甲宿虎丘山房蕭瑟涼生澗底松隔林人語雜秋蛩亭留片石殘霞映劒去空潭碧蘚封燈鴿不聞僧禮磬幡幢惟見佛開容自經鐵馬笙歌歇獨對寒星候曉鐘山夜鐘寒崖寂歷四無聲斷續疏鐘徹曉更響出雲根巖壑動幽通梵力鬼神驚空林葉脫留烏影滿澗霜飛助月清身世窈然誰得繫頓從初地了無生禊日石湖社集祓除無異永和年玉雪遺坡賞倍妍髙眺鳥從遊舄度醉吟人倚落花眠緑楊影裏垂纎手紅藥欄前鬭綵箋惆悵日闌回畫舫沙堤只見草芊芊無殊曰清綺絶倫風調不乏唐瞿瞿老師過訪隱几何人問鶡冠忽來仙舫繫漁竿逢迎止覺兒童朴粗糲猶堪長者餐移簟接涼花氣永吹燈受月夜聲殘相看短鬢饒悲涕休訴人間行路難訪山中逸人層崖策杖此幽尋烏几髙間處士心挂壁雲蘿深在眼啄窗野鳥解當襟林梢葉落供茶竈竹徑風回響玉琴一自石門乘興至始知丘壑有清音安節曰五六幽韻天然韋柳集中特秀之句賦得天寒有鶴守梅花空林皓魄淡春姿冷艷偏宜瘦翮支素手不須尋翠羽霜衣正似啄瑶池光翻傍水渾難辨影亂臨風只對垂清唳九臯聲自逺休將玉笛更橫吹寄趙大庾先生擁褐空山道未貧蕭齋磬響一孤臣身埋豹霧真忘世樹長龍鱗始覺春錦字三年懷不滅輪腸百轉向誰陳天邊卧柳毿毿發寂寞荷衣但隱淪晚梅萬樹飄殘覆地香一枝深照讀書堂凍收露井方垂艷夢冷瑶臺更結芳自是韻孤嫌妬雪須知骨老為經霜亭亭獨靣斜陽立收拾春風意總長春日遣懷寄金孝章畏人甘自老墻東間卧繩牀數落紅蜂出暖沾桃葉露燕歸輕倚楝花風直鈎作釣終何得壤室編蓬可送窮賴有潛夫能枉訊應憐潘鬢已衰翁聞無殊自上沙遷光福有寄千林草樹總涵春為選幽巖更結鄰藝圃未須移舊竹搴芳還欲採新蘋苕顔爛漫延嘉客燕語逢迎得主人定賦小園同庾信覆杯花底莫辭頻𢎞人曰􅈺雅之章字字穩愜寄雲間王玠右名世機山雲樹鬱綿芊聞道徴君豹隱堅藥種東臯惟佐釀琴彈栗里不須絃筆蒲翠映長源架袍草煙和子敬氊知爾池塘多勝詠肻憑雁翼寄新箋阻雪雲窩林若撫胡白叔諸公偕集限用鵝字蕭齋擁膝動微哦剝啄欣聞長者過石凍有聲風葉亂窗寒無影雪花多論詩細覺心如髮對酒貪看色似鵝興永不知深漏盡髙歌無奈别離何寄題介白山居遍選林泉此地幽毿毿樹影抱溪流松廬寒枕過新瀑竹塢晴花聽午鳩四逺嵐光吟際合半空雲氣管中收知君采勝乘身健日坐峰頭稱冥搜安節曰山林詩能作溫麗語有王右丞風調詠菜花黃雲一望陌阡連偏稱村翁貰酒眠色粲金繩誰布地光連鶯羽欲浮天低風錦合千重障炙日香濃百和煙更羡麥畦青界道野花分綴亦嫣然送包朗威芒屩衝寒自擔簦送君南浦淚沾膺霜深古驛千行雁風急長河萬里氷易水孤津須暫駐燕臺落景莫輕登即看回策山花發叢桂應添翠幾層同陳確菴諸子集寶晉齋得誰字清簟疏簾倒接㒿髙文披賞共搘頥庭前花影魚爭啖壁上蟲書鳥慣窺避暍正宜林蔭滿徴歌頻訴酒行遲醉來散髮茆簷下野外風流笑屬誰過顧茂倫村居二首蒹葭積水浸蝸廬菜甲荒畦手自鋤花氣作霞來翠羽酒香成霧引文魚從封不發周南憤結客空傳濟北書坐挹朝暾晞短髮問竒誰過子雲居髙士逃名此灌園壯顔甘自憩丘樊浴鳬枉渚從風立卷蘀疏林帶雨翻時爇水沈開祕册獨招窗霽護蘭蓀桔橰機息渾無纍何謝龎公隱鹿門介白曰清事獨能寫出淡中見綺頗似嘉州謁三髙祠荒祠煙草接平沙千載髙風起嘆嗟霸氣蒼茫歸釣艇清名浩蕩落秋葭庭垂野蔓波紋動碑沒深苔日景斜擾擾塵纓自來往雪灘誰遣薦蘋花假我堂文宴蕭蕭落葉正愁豫哲匠髙論酒戒除飬拙自嗤同土木成書漫擬注蟲魚樽傳白墮揮渠碗饌具伊蒲佐蟹胥招隱桂叢今得主東皋十畝伴誅鋤重陽後一日宴集次韻籬外霜英綻幾時追歡還與素心期茰殘玉臂猶堪佩酒宿金樽好共持紅豆徴歌彈往淚朱絃泛響發遙悲寒城又聽秋砧發濩落愁看鬢已絲𢎞人曰雅極矣却帶悲涼此中晚人調燈花和顧麟士洞戶佳人未掩帷寒燈一穗正垂垂無端乍喜騰煙出有待還嫌結蘂遲焰滿銀屏從自落光沈雪幌莫輕吹朝來聽鏡音書到挑盡寒燈遲所思又作蘭膏剪罷復流妍也學春葩粲錦筵自蕚自跗寧有蒂俄開俄謝幾時鮮蘂連巧障寒檠照煤細終汚彩鳳箋最笑炧光垂欲盡撲蛾甘向火珠煎送陳孝則還雲間水漲桃花鼓枻遲友情尤重是臨岐泖峰雁字通鄉夢吳苑鶯歌攪客思共展霞箋騰洛誦獨攜雪卷返山籬海東煙島三春暮何處磯頭理釣絲南草曰停勻婉蒨情味悠然是錢劉一𣲖連理榆白榆厯厯種天維影落人間並幹竒發籟韻舍絃律吕衝星光映匣雄雌玉衡星散為榆合歡靈卉原同性並命仙禽許壓枝青蓋婆娑情不少勞生何事苦分離放生池佛日長懸曲沼頭遊鱗唼嚼葦花秋風吹細浪舒文藻月印寒沙起狎鷗悅性已寬吞餌厄忘機真失挺義愁白蓮開處龍吟寂濠上于今有十洲安節曰四詩婉約清新無雕刻之痕有雋永之味次和侯漕臺冬至日登金山陽律初回覽物華江天晴納海門霞浮空草樹迎騶唱跋浪魚龍避劒花雲氣近隨清梵出雁聲遙送暝煙斜不須候吏催官燭自有寒星伴使車友人過訪門對春塘亂柳花髙軒枉駐已棲鴉帽簷不礙疏簾入香印深移漏鼓撾漫道徑荒鋤栗里敢云玄草疏侯芭雙瓶欲盡愁無奈金井桐隂月色斜梅村先生過訪十年魚素杳江湘欲采芙蓉逺寄將忽訪席門驚上客旋彈瑶瑟奏清商鮮羮白芼園菘滑軟飯紅炊野稻香感往莫論吳社事耆英今已半雕亡時先生述吳社始末新月清光瀲瀲到髙樓旋漏松隂一點幽素女霓裳初鏤扇廣寒雲幔正懸鈎近人恐著新華鬢緣物應憐半敝裘却笑去家才百里何勞飛鏡攪深愁介白曰刻意標新晚唐詩之最工者雜興灞水橋邊記别離瓊枝百尺想光儀斑騅不返青絲鞚寶瑟空彈白紵詞拂靣晴花翻錦蝶薰衣香草浸華池那堪獨坐銷清晝強進玻璃遣鬱伊送洪學博之任永定地盡甌閩嶺萬重犢轅惟有短檠從儒林祭酒推何胤漢史神君頌魯恭吏牘擬將花管判訟堂間對岫雲封卧龍山外行春日應憶新宫五鬛松遣興二首虞山作歌舞誰將紀夢華園林罨畫每興嗟卧麟尚認前朝塜起柳偏依處士家水帶篆紋清不改山橫睂嫵翠交加簷花故忤愁人意時罥晴絲撲綘紗清關棐几淨無塵薲葉苕花刺眼新避債那求銀汞術防愁預買石榴春康成帶草當青箑栗里巾車勝皂輪獨抱遺經酬歲月吳差山下織簾人九臨曰沈鬱悲涼不使人一望知為學杜乃深于杜者也喜吳𢎞人聞夏歸里兼懷漢槎春生凍解負氷魚喜爾南旋慰索居天與雪霜才漸老世寬羅網日初舒梅坡舊徑邀鶯友竹院新隂理蠧書亭伯那堪猶北滯朔風回首更愁豫登快風閣萬頃波爛一望收披襟頓豁古今愁繞廊樹影連遙溆迎檻山光湧碧流夾浦雲歸漁市晚淞江雪滿荻花秋憑欄不盡滄洲興便欲蒲帆上釣舟又作傑閣崔嵬踞水隈長風疑送楚王臺波澄玉鏡窺鮫織月湧珠宫識蚌胎東海蜃樓當檻出西山霞綺照杯來涼生秪覺煙濤逺欲賦慙無宋玉才茂倫曰前作情景清幽後作氣象閎濶並一時偉搆寄徐昭法二首一别精廬歲月徂比來曾有宿舂無身窮壑谷能逃忌隱託文章不厭孤春院繁英傷錦繡秋風落葉感菰蒲稻粱那得縻黃鵠莫怪長飢化白鳬杜詩黃鵠髙于五尺童化為白鳬似老翁山館悽清五夜鐘知君鉛槧興難慵松龕火出書帷細草徑煙封筆格濃可為問竒量酒戶惟因讀史發辭鋒相思髣佛林梢月惆悵雲巒隔萬重寄安節江楓菴瓢笠蕭然似退僧每攜書卷寄三乘菴荒晝給伊蒲飯客散寒依丈室燈夾岸疏林明野燒背村淺水出漁罾如余亦是祇園侣欲遣塵勞愧未能丙午除夕卒歲無如此日難也須草草具辛盤衰容暗逐浮煙換薄態全從覆雨看乞食敢憑蒼玉珮駐顔難覓紫金丹欲驅貧鬼愁無術且爆簷前竹數竿丁未元旦曙光猶帶臘餘寒三素雲開卜履端梅吐玉鱗明淨榥柳含金縷曵朱欄年豐未若征徭減世泰先應網罟寬歲酒漫拈循故事低頭却愧野人冠介白曰悲惋之音翻成贍麗當于許渾劉滄間求之無題四首倦繡巡簷立景斜蘭風旖旎透窗紗撩愁最是宜男草罥恨無如解語花雲殢陽臺殘夢斷月明湘浦逺峰遮那堪離别人千里日見歸鴉趂晚霞夜合花開綺閣虛誰家陌上駐香車寶奩鏡掃螺紋細銀甲筝橫雁翅舒可奈雙棲梁紫燕生憎並蒂沼紅蕖鮫綃十幅空沾淚不見西來尺素書一葉梧桐墮井幹錦衾誰信此生單雲綃霧縠氷肌重桂燼香筒玉簟寒涼宇月輪凄絡緯綘河星采動闌干已知雞卜渾難定獨掩空閨聽漏殘短夢初回玳瑁牀博山沈水懶添香重幃月沁寒先覺洞户霜侵夜漸長彈罷瑶琴憑寫恨織成錦字寄誰將臨糚不禁悲填臆嫁日羅襦在玉箱安節曰情辭相傅不失唐音一味雕繪便入俗筆挽沈治佐童孺交遊盡此辰寢門彈淚欲沾巾幾時撤瑟音無訃隔歲披帷迹遂陳書帙蠧乾蒿里月筆牀塵鎖夜臺春修文同調知多少好譜新辭奏玉宸治佐工小令垂虹亭過徐太史公肅舟中魯望祠前繫桂舟逢迎半是素心儔白鷗對舞楓江暮紅葉初飛荻岸秋卷幔汀洲延逺眺移橈煙雨入冥搜金華羡爾鶱騰早應念泥塗雪滿頭寄陸孝山太守露冕風清海嶠秋一時文采動炎州丹梯峽寺皈初地畫鷁珠江咏勝遊挾策未知千石貴放衙惟對萬峯稠曲江祠屋今何處好薦蘋花駐碧油介白曰結語妙有風味過斜港嚴氏隱居四湖天外碧濤虛林樾重重覆古廬園似子山桐露潤徑同栗里菊籬疏花間滿引東臯釀石畔間看汜勝書我亦有懷棲十畝此身無計謝煩拿天香閣小飲文桂千層散晚芳小樓開眺促飛觴香鋪甲煎從風逺色爛金繩帶露涼仙子似移天竺種月娥疑捧帝臺漿拍浮正值雕胡美只此薌林是醉鄉無殊曰格調俊整五六用事妙在使人不覺蠟梅庾林先試鞠衣裝雅稱佳人畫額粧蒸栗色同偏耐凍旃檀香亞獨凌霜流黃機上光零亂金雀叉頭佩恰當最愛冷芳凝小院不隨春色點含章紅梅氷雪肌膚本絶塵胭脂淡抹倍宜人曉霞暈著春風靣紅玉嬌添半醉身逞艷故將朱點素憎寒須藉錦成禋漁郎若解東皇意悔向桃源更問津玉蘭一樹瑶光裹雪痕根移上苑玉溫黁門迎風乍拭何郎粉裛露新回素女魂縞袖揚去空春晼晚玉簫吹夢月黃昏香林寂寂疑無夜姑射山頭許共論西府海棠韻姿旖旎占春殘仙種西來覆井幹蕚吐嬌紅饒早豔葩舒淡冶怯餘寒玉環小睡肌全膩飛燕回風臉半丹贏得小亭遮麗色憑闌直作錦城看紫芍藥紫豔翻階殿衆芳洛陽魏后更凝粧熏衣欲染胭脂色照盞交融琥珀光瓣剪綘霞風正暖香籠錦幔日初黃麗華直得傾城國笑酹花神酒一觴玫瑰熖發丹跗與綘房花林難並此芬芳擎來色奪紅綾餤嗅去香流百蘊湯插髻麝熏勾謝女佩囊霞爛惜檀郎殘膏剩馥休相棄汁滓猶堪擅食方茉莉素馥纎纎海外芳千金攜得越來裝星離不異敷瓊屑露摘俄看滿玉筐新浴搔頭宜贈佩夕涼欹枕暗生香也知花意迎人意故韞瑶華待晚糚菊花籬間金蘂漫縱橫莫訝精神太瘦生種貴延年堪送老人能載酒可同傾甘馨露下含芳淡疏放燈前取影清杜詩菊蘂凄疏放陶徑不須愁落瓣靈均原自解餐英孝章曰詠物詩不切則泛太切則黏離即之間情景傅合旖旎香艷齒頰流芬諸作已擅其勝寄計甫草二首竹西歌吹近如何猶憶當年醉綺羅見説物華仍盛麗豈無陳迹感婆娑蕪城蔓草愁中度隋苑荒煙亂後多知爾賦才明逺敵江郵先寄慰漁蓑别君殘臘又春華煙月揚州自昔誇玉蘂觀前花亂發茱茰灣下鼓頻撾因人暫可趨公府覽古應深弔帝家義山詩欲取蕪城作帝家更喜逢迎多勝侣文樓會詠爛如霞檗菴和尚駐錫邑之大悲菴敬呈二律蕭然瓶鉢寄荒城三十年來頌政清花雨遍霑吳澤國法筵仍坐魯諸生雲窺丈室天香細月印寒林積水明浪説禪宗多老宿衲衣將相有誰爭法幢隨指素緇迎野外茒菴即化城噩夢醒來銷五濁晨鐘悟後得三生氷霜到老天難問風雨空山道始成覺路津梁知不逺獨慚潦倒俗塵嬰介白曰清沁絶塵純是禪悟和安節南村詩二首年來無地寄漁竿茆屋南村自可安竹外看山常曉櫛花邊隱几獨危冠禪心不待晨鐘悟世味真同木槿觀旁舍若容吾伴侣梧風蕉雨足盤桓便賦鷦鷯托此身心間何處少松筠林開水府氷綃淨座引嵐光翠髻勻屋角迎陽瓜種美籬門過雨藥苖新蕭條只憶徐髙士詞翰時親即比鄰嚴園作松篁不厭屢經過香霧氤氳此地多滿徑緑隂遮筆格半簾紅雨落庭莎花如垂手傾城笑鳥解臨軒宛轉歌便欲薰然解襟帶相看不飲奈愁何寄題張虞山草堂石板橋西一草堂淮流繞檻即滄浪雲霞曉色連書幌水木清暉泛隱囊奕罷嵐光方獻笑吟成竹影欲浮涼射陽只隔垂虹月乘興應須溯渺茫送嚴皓亭都諫月卿人望一時稀入對先還舊瑣闈九五方須調玉燭湖山豈得戀煙霏衣薰戊夜趨晨漏珮響丁東傍太微為屬封章頻上殿哀鴻今日滿江畿時頻年水旱讀梅村永和宫詞有感作永和妃子承恩最錦瑟銀筝亦暫娛翻幸未秋辭玉簟得從衰草奉珠襦思陵烈崩李賊自成藳葬之於貴妃塋旁松楸露冷蘭叢斷環珮聲悽月影孤莫道宸遊泥去歌舞椒宫從未卷龍鬚黃心甫曰老杜未聞夏殷衰中自誅褒妲昔人以為格意俱髙迥出樂天夢得之上余於此詩亦云生日自嘲生計惟憑一釣車浮名真笑槿朝華逢人欲下頭三拜用方干事得韻難成手八義用溫庭筠事鏡賣青銅長廢鑷書殘敝篋半侵蝸一生編纂曾何用只博他年覆甕賖送棐民弟司訓清河秋風五兩去片帆輕千里江楓引客程愧我藜牀難煮字多君綘幄好橫經淮山地接書門近楚澤波來泗水清料得寒齋供苜蓿咿唔猶是老諸生送友人北上春風拂拂試征襦攜手沙頭醉玉壺驥足自應馳萬里珠光今始照三都花髙上苑紅英發日射觚稜紫氣孤京洛故人多得意莫言公叔老樵蘇虎丘散步山光樹影褁樓臺誰問當時舊劫灰月幌清歌年少樂松隂細語麗人來香魂尚殢墳前草霸氣長埋石上苔日到落棠催客去滿江簫鼓正喧豗沈融谷曰三四清麗五六悲涼結語應起最有法寄毛大可落葉蕭森送短檠停雲東望倍含情辭華盡攬稽山秀筆翠紛披簜竹英冥冥魚龍秋作夜棼棼珉玉墨為兵何時對翦雞窗燭詩苑憑君定品衡贈周伯衡觀察公瑾聲名海內馳行軒惟見錦囊隨論詩細欲分宫徴愛士真如解渴飢故苑雲霞吞綵筆新春花鳥候清巵杜陵千首能同讀載酒還期共析疑贈陳賡明十年傾倒未通郵欲寄蘋花隔逺洲書著幽求慚土木名騰洛誦仰曹劉清流盡入平輿論佚簡還從石戶搜自笑越人憔悴甚何應得上鄂君舟過華及堂酬晉賢次韻君家兄弟氣如虹比興抽毫句並工玉斚乍揮浮竹葉金徽徐引泛松風共看劒氣連書屋不覺霜華上井桐醉後放談彌滚滚渾忘今夕是衰翁詠史海録遺編手自披百年丁運欲何之鐵函怨史文難滅釣瀨狂歌鬼亦悲匹馬居庸符白雀雙丸淮右整朱旗不知王戴諸山叟王逢戴良輩底事終身痛黍離寄王太常煙客先生盛代元臣奕世昌東田容與玩年芳天家鼎軸留耆舊海外神仙接溟茫漫許龍媒空馬肆敢將魚目混珠光先生盛推余文為弇州後一人故云還期伏勝傳經日函丈追趨捧鶴觴丙辰元旦匡牀晏起自由身又見青陽轉大鈞梅蕊暖移階靣日椒花香破甕頭春畏聞羽檄喧南國時閩中告警愁説泉臺半故人睂生笻在確菴孝章甫草相繼訃至步健且乘晴昊出東風輕揚柳塘新徐季重曰風致純近元白送海曙客越州兼呈許竹隱二守西風吹上鬢毛斑萬壑十巖指顧間豈作阮瑜淹記室自同禽慶訪名山雲生禹穴疑圭璧月冷耶溪想珮環玄度若詢垂釣客為言窮獨老柴關丁巳除夕有感作雪鬢驚心歲臘終辛勤蠧簡策何功天為故國留羸老人笑名山飽厄窮守道任逢圗鼎魅折躬甘作叩頭蟲寒宵擁褐難成寐坐待牆東曉色融戊午元日寒威偏劇野人家歲酒逡巡老倍嗟甲子瞥過同綘縣衣冠藏弆尚元嘉藥開舊裹扶衰病詩覓新箋待物華密霰隂雲交罨戶南枝何處訪梅花贈九臨白髮江南有幾人多君被褐老松筠甘陵久挂清流籍洛社今推獨行身讀易亢龍常廢卷誦詩離黍倍傷神庭花爛發知春在獨倚樓中眺望新張居獨倚樓取杜詩行藏獨倚樓為名酬張大行稚恭張關中人平子文章擅石渠每于謦咳借光譽夏聲夙仰三峰秀新句欣傳五色書經術敢云希子政賦心還欲訪相如儀刑咫尺懸情切肯許柴門候掃除錢宫聲過訪留小飲清才驚喜接應徐病起繩牀興有餘筐庋欲傾新解佩笠車追數舊相於尊銜落景林花笑燭剪深更夜月虛安得步兵三百斛泥君長醉遣居諸送徐健菴宫諭服闋還朝偉長才譽早嶙峋十載辭臣侍玉宸讀禮素冠多論撰趨朝黃閣綰絲綸離情旅館銀鐙亂祖帳排江畫鷁新旦晚回翔龍尾地可能憶及緯蕭人歲暮雜詩六首獻書未逹九重天澤鷺浮沉二十年章甫早知難適越蒯緱無分迥遊燕羌山髙士稱同學沈麟士隱吳羌山注釋五經至八十不倦江上漁翁許並船江上漁翁見宋史隱逸傳若得姓名垂異代不知青簡共誰編舊物相隨止角巾長貧恥作逐貧人拋書始識間中趣習靜稍安病裏身綘雪駐年何處覔藜羹適口且全真餘生萬事都零落猶自朝朝禮玉宸蕞殘何事尚拳拳編緝偏教疾病纒敝榻有緣同寄繭清宵無夢到鈞天勤看魄影依窗入倦聽鐘聲向枕傳鼎鼎百年虛歲月敢將述作比前賢顧亭林魏叔子稱余經學諸書可為先儒羽翼汪鈍翁稱余毛詩通義當與嚴氏詩緝並傳故云褐衣晨擁坐簷端羽箑捐來未覺寒歲燠冬深稀肅殺民窮榖賤轉艱難茶園稅欲荒山渚陸龜蒙有顧渚茶園下潠租應惱上官陶淵明穫田下潠藥物裹殘兼槖罄空庭徙倚百憂攢知交海內一亭林避爵飄然太華隂久别芝顔成北客時貽帳祕勝南金亭林極推余書傳左鈔為細校訛字以所著百餘條惠貽增入龍蛇厄至誰能贖山水人亡遂絶音書種後來可得繼夢回枯眼淚霪霪筋力全衰強自持爐錘大冶任盈虧鼠肝蟲臂原無著寶鏡珠囊亦有涯花供膽瓶充飫目月來籬落玩搘頤耋嗟缶鼓心均纍一卷南華是我師愚菴小集卷五
