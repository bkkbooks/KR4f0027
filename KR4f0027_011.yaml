body:
  text: 愚菴小集卷十一吳江朱鶴齡撰論周公居東論古之大臣敉寧社稷居則內總樞機出則外靖疆圉其身乃安危所繫况當主少國疑人心騷動之日未有可以擇便自投輕為去就者也金縢稱三叔流言周公居東東征之說先儒既已闢之蔡仲默傳但言居國之東而不詳其地夫周都豐鎬自陜以東皆東也不詳其地則周公似負罪狼狽而出退居散地豈惟三叔疑之國人亦疑之矣惟鄭康成謂避居東都吾謂此說是也夫周公出居非徒避謗逺嫌亦欲身處要害為訓兵翦除之計武王克商遷九鼎于洛邑雖未定都已有營洛之志矣三塗嶽鄙之間地據中原河山險固周公之出也官屬侍衛必依舊自隨移鎮其地隱然示天下之重使挻亂之徒相顧而不敢竊發非畏恐謝事如後世大臣引咎角巾歸第者比也况武庚三叔連衡舉事渡河而南即是鞏洛鞏洛一有變則華山桃林以東反者四起周事尚可為哉故公居東都所以收地險靜人心隂為鎮撫王室之深謀也應武庚者徐奄淮夷皆在東方而鞏洛以南晏然無恐實公為之控扼所以二年之久武庚雖聲勢甚盛末嘗發一矢西向也武庚兵出吾知公必有以待之使東都無公則勢亦岌岌矣然方是時內則少主懷疑外則四國煽亂二年之間公得以從容坐鎮者亦恃有二公為師保同心調護于內也後世權臣安敢輕去君側出則禍不旋踵矣此又論周公者所當知也近世茅坤乃謂居東是返而居魯如漢時大臣罷免歸國殊不知徐奄與魯接壤公歸魯而徐奄反謀如故恐事理所不宜有况魯去豐鎬甚逺何以繫屬天下之人心哉揚雄論西京儒者自董江都劉中壘下必推揚子雲子雲著述桓君山稱為度越諸子抱朴子方之仲尼韓退之與孟荀竝列司馬君實至作潛虛以擬太𤣥獨蘇子瞻譏其好為艱深以文淺易自朱子綱目特筆書莽大夫揚雄死而子雲之論遂定余嘗考其生平凡三變焉當成帝時賦甘泉陳羽獵則詞章之士也及哀平間甘落拓草太𤣥則經術之儒也逮乎靦顔事莽浮湛天祿則又與甄豐王舜為徒者也學者或耽其文辭而護其逆節則為之說曰子雲年數與莽不相及投閣恐谷永事永亦字子雲也或又據李善甘泉賦注引漢書云王音薦雄待詔歲餘為郎中給事黃門卒桓談新論云雄作甘泉賦始成夢腸出收而內之明日遂卒談親炙于雄所紀必實或又引孫明復云太𤣥明隂陽推厯度蓋疾莽而作也美新不劇漢而劇秦法言不曰繼漢而曰安漢其微指可見以愚核之皆瞽說也七略引子雲家牒云雄以甘露元年生天鳳五年卒葬安陵坂上侯芭負土作墳號𤣥冡按天鳳五年為王莽篡漢之九年自宣帝甘露元年戊辰至莽天鳳五年戊寅止七十一載與漢書本傳正合何得云不相及谷永為大司農歲餘卒未見莽革命何得以投閣加之乎雄在哀帝時官黃門侍郎其劇秦美新稱諸吏中散大夫臣雄稽首再拜上漢書亦云久次轉為大夫何得謂以黃門侍郎終乎西京雜記云雄著太𤣥經夢吐鳳凰集𤣥之上俄頃而滅此與納腸之說皆好事者為之豈足據乎紫色蛙聲俶擾天紀始建天鳳之間此何等時也而􅏌然立于其朝今日頌阿衡明日上符命謂之疾莽風莽其誰信乎疾之風之曷若優游𤣥亭返其初服逺而去之之為愈乎然則雄何以刺謬若此余曰雄僞儒也所云清靜寂寞皆求以成名而非真有得于內者也雄為郎中本大司馬王音所薦其霑丐五侯之門蓋有日矣給事黃門侍郎漢制掌侍從左右關通中外玉堂金馬官非冗散何清靜寂寞之云乎雄雖三世不徙官然哀平短祚不過十年其時同谷永劉歆輩接跡金華占風紫禁安知其不以清靜為榮梯以寂寞為譽餌者一旦國鼎潛移符瑞大作而雄遂翺翔顯秩與四輔五威相頡頏以為清靜寂寞其效固如此矣不然雄之好學深思夫豈不明于理亂之數君臣之分與出處進退之宜者何以始則居賢莽之間噤不一語既則從舜秀之後恬不知羞吾故曰雄僞儒也巧于沽名而非真有得于內者也吾嘗論西漢之文景以黃老致治其後乃以周公孔子亡非黃老治而周孔亂也則真與僞之别也王莽以周公僞者也起明堂復井田藏金縢作大誥無事不託周公當世亦以周公信之而其實乃漢之大賊揚雄以孔子僞者也稱典謨述雅頌太𤣥擬易法言擬論語無事不效孔子後世猶以孔子疑之而其實乃賊莽之佐命元臣而已矣使其沒于居攝以前人豈得推見其僞而比其書于吳楚僭稱王且加之以亂臣賊子之誅哉是以君子寧寶寸璣蒼璧而不愛尋尺之碔砆寧收才人負俗之纍而無取緣飾古義皎皎為名高者誠懼之也誠恥之也錢礎日曰只將考亭綱目作斷案便可盡情翻剝直令子雲無處躲閃周公孔子一假尤為妙論解頥陶潛論論隱逸者不難於承平之時而難於易姓之代蠱上九曰不事王侯高尚其事夫古之君子莫不秉道濟時羡鴻儀而卑蠖伏不事王侯豈所樂哉惟時不可以有為道又不容以苟屈不得已而長遁丘園其跡已鄰于亢矣故上九之象曰高尚其事志可則也夫志藏于中必有拊膺填臆隱忍不能自白者以其風節攸存故曰可則事則變也而非正也非正則雖高不可訓也且吾觀易姓之代其主類猜忍自雄而左右之者又多甄豐華歆輩于此而孑孑然自明其高是深中其所忌也吾為修潔而彼即以修潔罪之吾為委蛇而彼即以委蛇罪之韋思祖之於赫連勃勃司空圖之于朱全忠未嘗敢與時忤然而大者誅夷小亦困辱豈非高則鄰亢亢則生悔剛陽居上非匹士之所宜有耶嗚呼明乎蠱之時義者然後可以言隱逸矣沈約陶潛傳云潛自以曾祖晉世宰輔恥復屈身後代義熙以前書晉氏年號永初以來惟云甲子而已後世因仍其說宋人有辨其不然者謂淵明之詩題甲子者始庚子訖丙辰皆晉安帝時作至宋高祖庚申受禪凡二十年豈有二十年之前便恥事二姓而不書年號之理謝叠山則云晉隆安四年庚子劉牢之使劉裕討孫恩元興二年裕平桓𤣥改元義熙淵明賦歸去來詞實義熙元年也十四年裕為相國恭帝即位改元元熙二年庚申禪宋恭帝之言曰桓𤣥之時晉氏已亡天下重為劉公所延將二十載今日之事本所甘心則劉氏篡位之基實始自隆安元興間淵明庚子以後即題甲子蓋逆知末流之必至于此也叠山之論固核然吾觀淵明之意有進于是者彼夫劉裕之猜忌傅亮謝晦諸人之賣國不難以司馬天子為機上肉其肯容晉室遺臣傲然削新朝之帝號而優游以羲皇上人終老耶况淵明之祖烈淵明之清名又諸人所深惡而思欲媒蘖其短者耶故其詩之止書甲子者所以存其恥事二姓之心書甲子而始于二十年以前者又所以泯其不書年號之跡王𢎞之要路可就也顏延年之酒錢可納也任天下以羸疾弃我曠逹容我絶不以養高釣名疑我夫然後可以逍遙容與卒全此生于東籬北牖之間不然而洵如沈約所稱其有不嬰宋氏之網羅者幾希矣前乎淵明有孫登亦隱于魏晉之間者也其規稽康曰火生而有光而不用其光得薪所以保其耀人生而有才而不用其才識真所以保其才淵明為古今隱逸詩人之宗者其亦以識勝也夫唐肅宗論春秋之法國君即位不以正則不書後世統緒不明儒者自當引經而斷然事勢處于不獲已又當有變通之論權衡其間唐肅宗即位靈武范氏祖禹以叛父罪之吾嘗詳考其實肅宗非叛父也事勢蓋有不得不然者何以明之西京傾陷天子西奔中原故地率非唐有斯時討賊之任專責太子中興之望咸歸太子父老之遮留既切羣臣之勸進又堅肅宗即避尊位人情其能已乎史稱𤣥宗次馬嵬宣㫖欲傳位太子太子號泣不受然則靈武即位本遵馬嵬之成命耳當宣㫖時設有深識逺見者從旁力贊則父子之間傳襲甚正惜扈從諸人倉卒不及此而非肅宗之罪也靈武距成都不下萬里山谷崎嶇奏請道絶軍機進止立斷斯須撫軍監國之號非所施于此日又况所控御者西北諸胡所制置者李郭僕固諸大帥所驅䇿者關內思歸之將士不居尊位以臨之則威命不行威命不行則衆心離沮雖欲建興復之業將誰與共功乎逮夫即位之後親總元戎制命諸將二京克復九廟不移迎上皇居興慶纍表請避位東宫不許而後受之肅宗于人子之道未為失也元結中興頌所云太子即位亦據事直書豈有譏乎夫天子之孝以安國家定禍難為大耳苟能安國家定禍難雖冒不韙之名君子猶將恕之况馬嵬又命之于先乎吾故曰肅宗之即位事勢蓋有不得不然者不當以是為深罪也然則肅宗烏乎罪曰肅宗之罪莫甚乎宣政受冊以後使讒間得行考史上皇還京御殿冊命者再親著黃袍手授國寶其慈亦至矣肅宗于此時使克修寢門之問不改家人之禮兩宫無阻情愛交通奚至上元初有移仗之事哉劫遷西內高陳貶斥上皇寖以成疾悒悒崩殂豈非肅宗子道不終晨昏闕節遂使輔國良娣得投其隙而媒蘖之耶所以然者肅宗本非撥亂之才天資惛儒略近高中二宗牽私昵而忽逺圖樂因循而少夬决始以輔國之讒言殺其愛子既以輔國之箝制疏其慈父此誠可為後世人主溺晨牝恣宫奴之戒然說者因是而遂以輔國之惡歸之肅宗謂靈武擅立猜忌其父并猜忌其父相房琯至比之商臣楊廣則又不然琯喪師陳陶律以漢法罷免為幸如謂鈎父諸臣以為黨崔圓亦𤣥宗相也何獨久任耶太子諸王分鎮討賊此最為謬計劉晏貽琯書謂諸王出深宫一旦望桓文功不可得永王璘之反其明鑒也以罷琯而實肅宗之罪因以實肅宗即位之罪為此說者亦太深文矣哉吾故斷之曰肅宗得罪其父在宣政受冊以後而不在靈武即位之日庶幾得其平云甫草曰宋史李綱傳云金人渝盟議以太子監國綱曰肅宗靈武之事不建號不足以復邦而建號不出于明皇至今惜之又云大敵入攻安危存亡在呼吸間此時猶守監國常禮可乎讀伯紀數語正可與此論相發明李綱論曲禮曰國君死社稷義之正也雖然有權焉勢可以固守則守之可守而不守是棄其宗廟社稷也勢不可以固守則去之不可守而不能死又不去是以其君豫敵也嗚呼死社稷可易言哉周秦以來其能慷慨引决不汙敵手者惟朱梁之友圭完顏之守緒耳苟其主無必死之心國有必亡之勢為之臣者徒執古義而不知通變以圖存卒致以大朝天子幽囚屈辱為萬世笑此謀國者之失也靖康初斡里雅布入寇李綱力主固守京師欽宗從之幸而金人旋退京師無虞綱亦罷去矣至冬復入寇何桌日人人又力主綱議且引蘇軾所論周之失計未有如東遷之甚者帝以足頓地誓死社稷未幾舉族北轅身死沙漠嗚呼徽欽豈死社稷之人哉昔者太王避狄孟子嘗以之告滕文矣𤣥宗幸蜀以避祿山代宗幸陜以避吐蕃德宗幸奉天以避朱泚皆賴勤王之師四集卒能再造帝室使三君者亦惑于死守之說則靖康之烈禍已早見于李唐之代矣况乎汴京四逹非有長安之固也种師道姚古諸將其才不逮子儀光弼李晟也斡里雅布尼瑪哈合兵深入其勢又不啻祿山吐蕃朱泚也彼二帝之積懦積昏將何恃以固守當時亟上疏請速幸長安以避賊鋒者种師道也建議暫詣襄陽以圖幸秦雍者張叔夜也密言于帝天子在外可以號召四方宜幸西洛連據秦雍親將兵圖興復者唐恪也恪固不足道師道老將知兵豈無見而云然使帝早從其言而不為何某所惑急召李綱委以留守之任命康王為元帥統河北諸道之兵掎角進擊則宋事猶可為也豈至有青城之辱哉然則綱之勸帝固守非歟曰是也綱之進議固在靖康之初也方是時兩河未陷國勢尚全入援之師麕至城下金人純以虛聲恐喝使非李邦彥撓亂于中敵不難破也逮乎兩軍合攻危同絫卵守禦之備無一足恃者而欲以不戰之衛士六甲之郭京抗數十萬方張之敵其將能乎此而言死守社稷豈非以天子為孤注乎是則青城之辱非綱議貽之實誤守綱議者貽之也吾故曰謀國者當權其勢之可守與不可守而不當徒執古義以其君豫敵也然則平王東遷蘇軾何以云失計曰驪山之難西周已亡矣非至平王而始衰也西戎交侵攜王姧命平王不遷將覆亡之不暇奚止于衰而已乎平王之失在于遷洛之後不能自强而以岐雍之地拱手授之嬴秦謂周之因遷而衰者此目論也軾本輕于發論而何某遂援之以誤徽欽後之君子不可以不監也無黨論國之有黨猶木之有螙螙之齧木也不齧其外而齧其心日朘月蝕中心雕喪而枝幹從之厯觀漢唐宋以來之黨禍未有不猶是者也漢唐之黨以擊宦官宋之黨以爭新法其始皆成于君子其禍皆極于小人若明季之黨則又異焉東林首庸非不亷正有守及名盛而附之者衆于是小人之雄或隂託君子之籍𤣥黃之戰一勝一負屢勝屢負而國運隨之以盡斯蓋合漢唐宋之黨禍為一者也或者謂君子小人之黨如陰陽然雖聖王無如之何余曰大易云渙其羣元吉洪範云無黨無偏王道平平孔子亦云君子羣而不黨人皆比肩事主國爾忘家公爾忘私何從有黨黨固非小人之幸亦豈君子之福哉夫有黨必立同異同乎已者援之惟恐不廣援之廣小人間工其術以媚我亦為所中而不覺矣異乎已者鋤之惟恐不力鋤之力小人必合其類以㢋我終為所困而不勝矣即如三案之事東林諸賢所斥為邪說者自今觀之未必不可從長采録乃若諸賢所持如龍鮓之不可食雖其義甚正其名甚高識者反以為迂闊而多事其氣節誠足以揭日月驅風霆然于國事何補哉况乎小人植黨君子勝之亦以黨角立之勢終必兩傷歐陽子有言小人所好者利達所貪者財貨今自東林數公而外其有不急利達者誰乎有不滓財貨者誰乎我之所為無以過乎彼之所為而徒欲抗持正說絀服匪人即彼亦安肯以匪人自待其激而橫決勢所必至吾故曰有黨非君子之福正以附和君子者不皆君子也或者又謂君子無黨何以勝小人余曰小人非可勝亦服之以虛公而已今夫鑑于止水者雖醜形不怒惟其公也復讐不折鏌干忮心不怨飄瓦惟其虛也虛則是非之見勿橫據于胸中而一衷乎理之至當公則德怨之私勿偏持于當局而一協乎理之共安如是則小人之心服矣小人之中魁傑不過數人其庸流觀望者吾以泰之包荒處之其隂附翕張者吾以夬之惕號處之而又取其魁傑者任使之以䇿勵其材利祿之以順適其意時收其名實而使之不疑時謹其絛籠而使之帖息如是則小人之類孤矣何事齕齕然與之角立而爭勝也哉昔者欒武子遇楚師時軍佐十一人欲戰者甚衆惟知莊子范文子韓獻子不可武子從之曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎聽言者法此則是非何弗定范昭子之臣王生惡張柳朔言諸昭子使為柏人昭子曰夫非而讐乎對曰私讐不及公及范氏出栁朔謂其子爾從王勉之我將死此王生授我矣遂死于柏人用人者法此則德怨何弗平是非定德怨平不惟可以弭伏小人更可以變化小人其何黨之有吾故曰黨非君子之福而善勝小人者必非以黨也吳修齡曰永叔論朋黨為人主辨君子小人言也子瞻續論朋黨為君子去小人言也此作言君子不可有黨乃為道學諸公而發晰理甚精當與歐蘇二作並傳愚菴小集卷十一
