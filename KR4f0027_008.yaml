body:
  text: 愚菴小集卷八吳江朱鶴齡撰序二史弱翁詩集序嗟乎士之能以文章著述成名於後世者豈非天為之哉余少嬰沈瘵勉習舉子業弗好也顧獨喜談說騷選及西京大家之文見有服奇嗜古不牽世俗趨舍者必折節而與之遊弱翁其一也弱翁尊君某甫登賢書而殁弱翁艱窶萬狀遂發憤為詩文絶意干祿之學俗子疾其所為以為古文之道如盲者之於鑑秃者之於櫛甌越人之於章甫安所貿衣食者而沾沾為交口姍笑之且排窄之弱翁卒岸然不顧京口潘木公稱道之於諸公間名稍稍起於是泝長河遊燕邸眺覽帝京宫闕之雄燕然碣石涿易滹沱山川起伏鬱紆磅礴之氣勢以及荆卿漸離悲歌擊筑子美南池太白酒樓諸故蹟盤桓徙倚慷慨感激一發之於詩章歸而抵永嘉寓金陵所與唱和者如顧與治邢孟貞楊龍友方爾止輩皆名士是時寇起三秦殘躪中土弱翁感時諷譏刺刺不休每過余蕭齊出所作相示談及門户箝結盜賊披猖之故未嘗不太息欷歔繼之以泣也弱翁之詩崢泓蕭瑟初值鍾談主盟相率為凄聲促節未能自振於古後居東湖與惕齊聨和則全法少陵格律日進及遭崩坼之變方期偕余輩數人晞髮湖濵修谷音海録之故事而未幾死矣惜哉弱翁歾十餘載蒸嘗不續遺書散落人間其所著鹽法志燕京遺事松陵耆舊傳無能搜討所在僅得詩若干首為評選而欲梓之以多故不暇每一興念輒用憮然嗟乎服奇嗜古之士世不多見也幸有其人矣而復丁屯蹇既窮餓其身促其年以死死而復奪其𦙍又將雕零磨滅其所著之書使之無可表見於後世何天於服奇嗜古之士虐之如此其酷也天虐之酷而於人之姍笑而排窄之也又何憾焉宋既庭曰純是故舊凋落之感悲涼紆折學歐陽而得其神韻送董處士歸湖濵序勢榮者人慕之道榮者人疑之厭膏腴欺紈縠高車大蓋夸耀州閭宗黨間此勢榮也身都儒雅與時進退抗顔千古之林雄覽萬物之表此道榮也充於勢而詘於道古人猶有塵垢軒裳逃之寂寞之濵以為快者况乎乘危抵巇苟竊旦夕之光曜於蜩螳沸羮之中此如操漏舟以試洪濤䇿敗轅而上峻坂方沈溺顚覆之不暇又何榮辱之足云哉董次公張西廬處子之秀者也先朝以高才生困頓場屋近乃沈研經術著書自娛西廬足不入州府次公以井稅至邑治必訪余寤言跫然足音致足樂也今年秋余抱先子之戚讀禮江灣草菴次公拏舟來唁流連晨夕商榷古今每至析疑領要則油然以喜又悄然以悲喜者喜吾道之不孤悲者悲歲月易徂而修名之不立也將歸湖濵次公起曰子何以益我余告之曰子瞻有言人不可以苟富貴亦不可以徒貧賤貧賤之樂舍通經味道曷尚焉阮嗣宗陶元亮居晉宋之間皆偃蹇不與世接吾獨惜其未能聞道而徒以曠懷高致稱也夫使二子者有志聖賢之學則述作當日益進又何暇逃名於麯蘖放意於沈冥耶今我與子以遁處之身詁訓風雅探索皇墳亦既優柔而浸漬之矣由此而升其堂而嚌其胾譬若登山然不陟陘躋崿弗可以止也修之墨墨寶之仡仡視彼汨喪於詞章之末聲利之場者不過如甕中蠛蠓經宿即化耳而豈以易吾樂哉次公曰㫖哉斯言敢不夙夜加殖以實子道榮之說遂抗手而别并識此語諗西廬用相警發焉送徐介白移居上沙序隱居之必於山林也猶之應龍必蟠積水之淵威鳳必翔寥廓之表也又猶之崇蘭紫芝非託根于深巖大谷則無以藴幽貞而表秀異也自昔人有大隱朝市小隱山林之說而脂韋汨沒與俗浮湛者反借之以藉口嗚呼通才逹節之不可幾于世也久矣虯龍踡曲汙津與蝘蜓何異乎鸞皇降處丘樊不為虞羅所中乎芝蘭生於盆盎世且與蔓草嫣花同玩又安知荃蕙之不化而為茅幽蘭之不變而為菉葹蕭艾也乎此吾深歎介白之考槃山居浩然長往為不可及也介白少以風雅標持嶔崎歷落格韻在東野閬仙之間時復㸃染毫素縹眇煙雲咫尺萬里而又皈命瞿曇夙通宗㫖熏修斷欲衲子難能夫詩也畫也禪也三者皆丘壑中物即使介白志遂風雲身名雨泰猶當託尚山林有衣冠巢許之目况世棄君平矣君平安得不棄世哉上沙接武靈巖湖山環抱緇素名流往往萃止以介白織簾抱甕其間香草夾徑嵐翠撲衣麥雉朝飛村舂互答皆吾詩情也松濤瀑雨逺近爭飛雲木虹泉晨昏變色皆吾畫態也逺寺霜鐘發人深省空林野火可悟無生弔響屧之幽魂悲琴臺之故址興亡一揆死生同夢皆吾禪心道味也然則介白之隱洵無忝戴顒宗測介白之上沙安知不與龎公之鹿門鄭敬之蟻陂杜景齊之始寧山舍竝傳千秋史䇿也哉余久厭塵勞每思於松林深處誅茅小築讀書嘯咏其中而家纍殢人刺促與雞鶩同食此吾於介白之長往既深歎之又深愧之而不敢但以離羣為悲也他日向平願畢便當僦舍東鄰衡宇相接與介白隱素木几酌斑蠡杯誦正則女蘿之章歌小山叢桂之句庶幾東臯子之仲長子光也介白其許我乎尤展成曰葱蒨馥郁近初唐文字今人學歐蘇者漸流制舉一路吾寧取此種贈洪廣文計偕序六書者經籍之權輿也聖人以之該三才之理備萬彚之情俗學罔探源委好出私見穿鑿由是經解晦塞沿訛失真士而欲考古正今必自六書始矣夫鳥跡之降而大篆也大篆之降而小篆也小篆之降而楷𨽻八分也勢也然周官設太史氏以掌書契秦吏人多誦爰歷之篇漢制能通急就者為郎則猶知重之也後世考正無專司教異學殊曲說四出蓋自唐孝明詔衛包改古𨽻為今𨽻小楷行而聖籍古文不可復睹㸃畫轉易意義乖離尚書之文於六經為最古而訛誤不一如擾而毅之與俶擾天紀一當從如招切一當從與擾同此訛在混淆者也兖州厥賦下下下下轉為正正又轉為貞此訛在變易者也舉二端而全書可知也舉一經而他經可知也干祿之家既薄文字為璅節耆師宿儒以專家稱者亦不過稍稍曉音讀涉訓詁而已嗟嗟生今之世為今之學而欲是正典文汰俗說而復古義其將何塗之從耶歙州洪氏代有聞人陜翁先生尤精六書之理自爾雅說文以逮陸德明吳棫黃公紹鄭樵周伯琦諸家之說靡不博覽而沈研之其司教吾邑也諸生以制舉義來質者必進之以經學以經學來質者必進之以篆𨽻古文凡音韻清濁形體豐殺義解淺深流俗相沿未正者一經講明皆粲然有緒世謂廣文片席特優游就閒之地為療饑謀耳其能與子襟之徒商榷制藝者已少况進而經學乎又况進而篆𨽻古文之學乎如先生者誠可尚也已雖然愚願竊有請也許氏一書為字林金科玉律乃其重復闕佚僻戾而未可信者尚多有之古籀二文宋景濓疑吕忱參入其間非復許氏之舊今誠祖古籒而宗說文參之以徐氏繫傳又博采諸家之說訂訛補佚勒成一編他日校書石渠如蔡中郎正定六經鐫石太學門外故事俾後儒晚學咸取準焉其有功古籍甚大以較口陳手畫教行於松江笠澤之間者相去豈不徑庭也哉余不敏於六書精藴未窺一斑先生屢枉荒廬因得咨質疑義曠如發䝉今將與計偕入京師不可以無言輒泚筆書此以為繞朝之贈贈徐處士序好名非古也逃名尤非古也三代之時賢能俊造皆鄉大夫所書而升之進則流茂實於本朝而非以為烈也退則卷姱修於窮巷而非以明高也名士之目其始於魏晉之間乎蓋自漢季不綱孝弟力田之科既廢士之登用者多出於九品中正之一塗於是矜聲華而競標榜遂有刲股廬墓以為孝敝卓羸馬以為亷茹芝飲澗以為潔者而名與實始判為二矣然當時品目猶斤斤乎慎之諸葛孔明綸巾羽扇指揮三軍司馬宣王嘆曰諸葛君可謂名士矣夫孔明之兼伊吕失蕭曹千古無兩而始以名士許之則名士之矜重何如也袁侍中謂韓康伯門庭蕭寂居然有名士風流王孝伯言但使常得無事痛飲熟讀離騷便足稱名士夫名下必干要津必走熱客而反曰無事曰蕭寂則名士之所標置又何如也世固有姓氏滿於人間而不得謂之名士亦有從子三十年不知而不得不謂之名士然則名士之所以居名者其必有道焉而必非好之而即來逃之而可去也蓋章章已吾友徐子俟齊遁跡空山逾二十載户屨無聞炊烟不接翛然環堵與袁閎之土室焦先之蝸廬無異此其人好名者耶抑逃名者耶以為好名則今之高軒大蓋燀赫當塗者絶不聞有所謂徐子者也以為逃名則徐子之窮年汲汲著書等身自六經諸史之言下逮稗官雜說無不淹通而煆冶此其意豈欲以山澤之臞與浮埃委翳同其銷滅者哉嗚呼今之所謂名士者吾知之矣非藉門廕則不名非廣交遊則不名非豐脯醢則不名非樹柴柵則不名非操衡纊則不名非騖通都大邑則不名王睂子輕其叔何有名士但終日妄語而今非游談詼誕則不名宜識者以名士為羶途為僞府岸然掉臂而不顧然則徐子之所逃逃羶耳逃僞耳而豈以逃名也耶且夫名亦烏可逃也人有避影而之乎日中者避愈疾影愈多使名而可逃則沒世無聞不當為君子之所疾屈平放逐行赴汨羅矣而猶曰惡修名之不立此何以稱焉今以徐子之行誼確苦皎然不欺其志所著文章又無不可傳千秋而俟百世者吾知道北之周顒終南之种放徐子且曠然不屑况於挾牛腰卷軸請謁奔走藉口陶公乞食者烏足當劍首之一吷哉然則他時太史欲采真隱傳高士即不於徐子屬而誰屬也雖謂今之好名人莫徐子若焉其亦可也孝章曰古以高士名士為一今以高士名士為二然天下有名而不高者矣未有高而不名者也吾讀此文有深感爛溪㑹詠序夫道存丘壑非縞紵無以攄懷侣集簪裾必詠歌方能見志是以南皮雅製高擅鄴中曲水新篇爭傳上已至若漢隂衡宇歡情接於漁梁陶令琴尊勝社聨于廬阜杜陵蒿徑求羊聚塵外之蹤甫里茶園皮陸結散人之契是皆情有所寄則侔軒舉于伏鵠離鸞地無可容爰傲陸沈于高山流水清風尚矣嘉話邈焉吾友侍御周子投簪末造抱甕清溪家有賜書丹鉛不輟徑無俗駕嘯咏為勞選勝事于花朝送牢愁于文宴履綦接跡香浮庾信之園枕簟投林花滿謝公之墅于時碧流繞砌幽鳥變聲烟雲羃于階除竹柏清其顧盼青蘋㸃㸃遙生入座之風朱草垂垂似助含毫之色叶宫商于腕下貫珠貝于行間招楚客之魂則庭悽别鶴寫湘君之怨則樹咽奔濤桐葉分題列組之章備矣石欄斜㸃粲花之筆斐然俄而日隱西軒烟橫逺浦嘉羞屢進清斚分曹對蘿月以狂吟撫簷花而長嘯支頤散髮同期北郭之隱淪解帶披襟共雪新亭之涕淚户外之盲風墨霧都遣沈冥階前之白石清泉盡收眺咏嗟乎曲高寡和翻見笑于巴人身隱焉文非所安於吾黨篇章互答陶寫不孤與此盟言何俟揮嵇絃而蠟阮屐登斯風雅洵可居竈北而老牆東以視疏雨微雲嗟稱止孟公之句椒園竹館屬和惟裴迪之章既興㑹之異方亦鏗鏘之具美者已不佞黽勉盤匜追趨杖屨悅同心之追琢悲大化之推遷金谷寒渠空對銅駝之陌蘭亭峻址尚傳蠶繭之書不假濡翰曷留陳跡遂無辭乎首簡冀有述於將來爾思舊詩序夫情深疇昔則金石為移感切音容斯河山增邈是以橋公墓道遲回孟德之車中散舊廬惻愴鄰人之笛又况時丁板蕩代隔風流茹芝貫薜高其標碎首納肝厲其節者哉吾友徐子楨起系出偉長才同孝穆英年作賦陪華轂于李君茂采蜚聲對清樽於北海乘車戴笠共堅白水之期交吕攀嵇皆屬青雲之器俄而虞淵漸薄斷梗俱漂或銜精衛之寃或寫靈均之怨或鑿壞而力傭井臼或寄繭而肥遁山阿陽嵗未周哲人幾殄日斜庚子沈沈賈傅之魂徑斷西州慘慘羊曇之慟白楊成抱難求挂劍之延陵碧海移情莫遇賞音之鍾子鶯莊爛漫泣盡湘纍甓社荒涼夢回泉壤此徐子所為追舊遊而發喟援柔翰以申懷者也夫燕公五咏寄愁嶽浦之雲子美八哀雪涕巴東之峽是知感隨境而悽咽情緣人以纒綿豈惟風今實亦勸後音徽未沫何必訪遺貌于虎賁風義難渝即可播德聲于金版傳諸樂府式流彤管之芳播在輿人永備輶軒之採庶幾安仁之誄釋怨窮泉有道之碑爭光浩劫爰題首簡急命殺青夀黃母六十序古之為孝也易今之為孝也難三代之時德藝升之閭門士苟一行可稱莫不有升斗之祿以養其父母故曰其為孝也易近代專重科目小儒剽綴斐然即可立登巍膴其時命不猶者雖行同曾閔無由以自進寸草春暉有感歎至白首者矣故曰其為孝也難若黃子叙九有足異者叙九固世所稱讀書好古人也入其室翛然澄淡巾瓶卷策之外别無長物若將以仲長樂志終其身者人皆曰叙九賢雖然叙九所為政難耳叙九母某孺人以名家女早厲氷檗操今年且六十煢煢衰白矣凡酒漿縫紉朝夕井臼之所須無一不倚辦于叙九叙九失怙苦學既不能藝黍稷牽車牛修歲時洗腆之敬所恃以衣且食者惟村孰數童子而硯田所收恆值儉歲瓶之罄矣維罍之恥使孺人有幾微不平之意見于詞色為之子者則奈何乃吾聞孺人於此固愈愈如也適適如也數勉其子以為學人無為聞人為端士無為夸士謹治機織潔修盎齊使叙九得殫力課誦而不貽之以高堂甘毳之憂然則叙九之賢實其母有以成之也吾嘗謂袁閎土室管寧藜牀志士自處之道也非所以事親王介甫則云祿與位庸夫所待以為榮賢者道弸於中而襮之以藝雖無祿位以夀其親其親亦喜無量嗚呼介甫之說特有見於祿位之不可必姑言此以慰子心耳而豈可望之常情哉今觀於孺人則介甫之說果信使天下之讀書好古者皆無慕於不可必之榮而并不致憾于三代以下單門寒胄祿養其親之為難吾以謂孺人之賢尤足風也故因叙九來請夀言輒書此以贈之歸元恭曰既以教為子者又以勸為母者如此作夀文求之者必寡王吏部西樵詩集序顧子茂倫選山左四家詩西樵先生自京邸郵寄編年諸刻茂倫分體詮次彚為一集刻成以先生命屬不佞齡綴詞首簡乃拜手而系之以言曰昔杜樊川論文以意為主氣為輔辭采為兵衛而其序李長吉詩則以為騷之苗裔理雖不及詞則過之又曰使少加以理奴僕命騷可也夫樊川所云理豈非謂命意期于淳深而無取踳駮乎鼓氣期於綿聨而無取梗澀乎摛詞擷采期於雅馴期于麗則而無取詭僻填綴乎指事陳情不有天然之杼軸乎籠形挫物不有日新之爐鞲乎長吉之詩天才瑰異而陶冶之功未至程之以理則蕪音纍氣往往而見樊川所以深致惜乎斯人也嘗觀杜陵之論詩矣一則曰意愜關飛動篇終接混茫一則曰妙取筌蹄棄高宜百萬層一則曰毫髮無遺憾波瀾獨老成杜陵之言愜言高言老成即樊川之所謂理也是主之以奴僕命騷者也論至於此自非别裁僞體轉益多師掣鯨魚於碧海者其孰能備美無憾雖長吉猶難言之况如盧同馬異輩之孑孑自異者哉西樵先生生于于鱗之鄉而又承季木公之家學其為詩也抗墜抑揚含情悱惻蓋深有得于騷人之㫖若其淡而多風怨而不激豔而能雅咀百氏之英華而汰其疵纇樊川之所致惜於長吉者至先生而無少歉焉則可謂之彬彬矣今海內詩家絶盛麗色繁聲怡賞不給而按其中則枵然無有譬諸隋宫剪綵不終夕而銷滅惟其理之不足也懸先生詩於都市以為刮膜之金箆庶幾開元大厯之風可復振已乎乃不佞齡竊有感者昔于鱗稱社燕都茂秦實以布衣執牛耳今先生與懿弟阮亭先生竝官輦轂揚扢風雅一時荔裳周量愚山繹堂諸公篇章唱酬當復有五子七子之目自愧草澤支離無能䇿蹇走都下操三寸不律與諸公角藝文壇如茂秦故事所以讀先生之詩為之口沫手胝不能自已於歎慕者也俞無殊詩集序唐孟郊賈島之徒皆以詩而窮其詩又皆以窮而工今之窮於詩者率不能工何也亂離之厄其身羈孤疲苶之挫其氣往往神智耗沮而不能發間有所發矣而或學短才弱枯毫燥吻又無以寫其中感概悲愁之致而極人情之所難言若是者豈非能詩而不能窮之故耶是故其人非矯志厲學冡筆巢書者不能窮非簡棲遙集淡泊自守者不能窮視其能窮與否而其詩可知也已吾友俞子無殊少承羡長先生家學以詩鳴於時與弱翁介白君服諸子鏃礪文筆世變以後􅖦遁空山荆扉土銼穅籺不充意顧蕭然安之據槁梧煨榾柮時出其清文麗句與山光雲影相映發于薌林藥谷之間其氣靜故其音和平而肆好其神閒故其體窈窕而善變蓋吳中之詩自啓禎以來正聲不絶求其嫺雅融潤兼含衆妙未有如無殊者也無殊之詩非所謂能窮而益工者耶嗟乎詩之為道冶性靈陶物變必叩寂求音遺落世事汲古刻厲而後得之是故致窮之物莫如詩既已從事于必窮之途而又拒之而不受心跡乖反噂沓紛紜其下者以是為獻諛之媒干澤之具聲利薰心繁華鑠骨如是其詩必不工雖工亦不傳吾益嘆無殊之能窮為深有得于詩道也且夫三致千金苦身力作與魯望之筆牀茶竈孰勞而孰逸駟馬高蓋上下坂折與無功之東臯北渚孰安而孰危然則無殊之晏坐空山長歌短詠所享受于烟嵐霞石水簾樹錦之樂者亦既富且奢矣而猶以世俗之窮窮之不幾鷦鵬翔而下視藪澤也乎送計甫草北遊序夫桑弧懸戶男子有志四方蓬葆戒塗壯夫寧甘三徑出門閭而揮手便隔關山辭親串以晨興誰同樽酒誦北征之賦魂實黯然咏西候之章悲難叙矣吾友計子甫草建標藝苑嚆矢清流蘭成射䇿之年早推玉價高密封侯之歲尚阻龍津雖復隱約清風宅帶陶潛之栁蕭條素業厨烹鮑照之葵然而流詠樹萱每嘆尸饔之不繼關心華黍欲資采椹以何堪爰擔遊趙之簦遂理入秦之屩指飛蓬而適逺目慘河梁凌密霰以長驅愁深雲樹霜辰旭旦感墜葉以驚心戍鼓津亭停征驂而弔古扁舟共載知同入洛之張憑假日消憂豈作依劉之王粲歲華荏苒即看别浦流澌曉色曈曨已睹青陽應律望鄉園而不見塵飛京洛之衣懷故國以長謡目斷鶯花之苑况復北堂草茁時倚盼于䦱門返哺烏啼尚恩勤于手線興言及此其能不顧逆旅而長盱撫棧車而心惻也哉嗟乎洛下聲名舊侣非少鄴中遊宴為歡幾時粟貸監河如捧毛公之檄鯖豐侯第當思考叔之羮林下灌園仍偕吾輩機中織錦莫别經年丹花艷日須禊汜以承觴紫燕迎風跂遊梁之返䇿瞻望弗及我勞如何陳其年曰在唐人中可方王子安閒情集序代自國風寖微離騷繼作其辭之詼詭瓌麗幽渺凌忽以視成周太史所陳誠有間矣然其𠂻情之纒綿悱惻實本於憂讒畏譏愛君憂國之思故太史公曰國風好色而不淫小雅怨誹而不亂離騷可謂兼之自漢魏至三唐才人叠跡綺靡之製窮極纎渺㳂波討源莫不同祖風騷亦猶之路鼗出於土鼓篆籀生於蟲書也李陽氷稱太白之詩言多諷興馳騁屈宋為風騷之後一人子美特變本加厲爾然其所推江湖萬古流者不越風騷漢魏是可得其指趣矣元白艷體聨珠綴玉先後一揆乃杜牧之獨以勸淫導媟重相詆諆何歟即牧之所自作語多絶艷所謂勸淫導媟者毋乃躬自蹈之歟松陵顧子茂倫夙號高才生其學上下千載於三楚兩京六朝以迄近代之詩無不綜覽而詮衡之謂唐人之詩妙於言情而理在其中宋人主意元人主詞去古皆逺惟勝國季迪睂庵昌穀諸公義合風雅語兼哀艷直可嗣響唐音稱騷人苗裔乃取三百年以來名家諸集擇其麗而有則者撰次成編名曰閒情集當湖陸子孝山復加參伍付之剞劂拾三閭之香草架孝穆之珊瑚馳函逺寄余京邸每讀一過流芬送馥目眩魂搖洵冊府中之木難火齊也已余觀古今隱逸詩人首推陶元亮乃其閒情一賦備極帷房旖旎之致揆厥風㫖正與悲士不遇賦同一寄託蕭統嗤為白璧微瑕所以來東坡之誚嗚呼能通乎元亮之意者斯可與讀茂倫茲集矣若夫玉臺賸彩香奩浮藻豈足與同日而論哉纈林集序徐子梥之掉鞅文場名滿吳越去歲讀書桐鄉與汪子晉賢篇章唱酬歡相得也四方賡和其詩者翕然響臻積成卷軸將以付梓顔曰纈林而問序於余余曰子之名纈林也何居徐子曰子不觀夫錦樹乎當夫句芒司令和風扇物弱栁繅烟夭桃暈雨凡諸卉木無不駭緑紛紅香氣蓊葧葳㽔搖曳原阜蔽虧佳人拾翠以娛懷遊子采蘭而蕩目大造之文章極于此矣未幾而朱明既謝秋風颯然霜露沾衣晶光旦肅起視中庭則高林含悽隕蘀滿徑如戰敗之軍旗鼓棄去裹創疾馳吏士皆鳥獸散耳向之所為嬌花雜樹殢粉沾香者洫然安往哉然自是而脆者堅潤者燥靡者徑華實斂藏結為絢爛鴨腳楓桕經霜作花紅葉翠陰參差綺縟當之者神寒望之者目眩此亦天下之壯觀絶采也使非秋氣坎壈寒威砭肌之後其何以得此哉吾怪夫今之人徒知夭桃弱栁獻媚春畦而不知凍樹丹青寒山錦繡尤可觀而可樂也白香山有云黃夾纈林寒有葉夾纈者唐成都錦名也昔者王公臞菴中蓋有纈林館而吾取之名詩不亦可乎子且以為奚若余曰善哉子之言詩進於道矣夫剝落者充實之因也閟藏者菁華之府也不剝落則秋氣何以凝不閟藏則寒暉何以發屈宋之騷些不至於江潭憔悴則不成子美之詩退之子瞻之文章不至於䕫州流落潮惠貶竄以後亦不能奇且變若是也今屈宋諸君子往矣而其瑰采麗辭琅琅照耀天地者古今之大纈林不在是哉吾與子試往觀焉窮思維斷攀涉恐終身䠥􅍷而未有已也何臞菴之足云徐子曰善請書之遂書其卷端并以示汪子沈睂生曰鋪藻揚棻都歸實理此豈時手能辦南州草堂集序往歲在茂倫齊中見徐子電發詩嘆其天才駿發有豪宕邁往之氣因語茂倫曰此今之郭功甫也世有王荆公定當激賞其才邀致為上客耳未幾電發客遊皖城逶迤泝大江過采石蟂磯夢探天柱峯洞穴則詩益工已而為燕遊縱覽京都之雄聲名文物之輻輳與名公巨卿相過從弔荆卿投丸漸離擊筑諸故蹟則詩又益工已復遊河朔往來齊魯間眺南池酒樓之址而悲李杜之不可作也歷黃河泰岱明湖趵突之奇而歎東方之壯觀極於此也則詩又益工及歸而復遊武林客冶湄令君所冶湄文雅好士鳴絃之暇鈎簾憑几一觴一詠無不共之其詩之工抑且與露桃靧面風栁矜腰相映發于西子湖心馬塍花畔而電發之遊於是乎不窮嗚呼遊道難言之矣奇勝交加蕩心駴目筆不能追情不給賞苟非胸吞雲夢曷以賦擅驪珠則題詠之難也昔人論用兵寧為拙速毋為巧遲維詩亦然坫楹迭唱奚暇撚髭宫徵急宣齊矜叩鉢必多造次之華始負通人之目則應捷之難也詩冶性靈豈拘篇什之多寡與字句之短長今則務矜博于千言好窘人以仄韻儷青嫓白易來羔袖之嗤絫牘連章或致重儓之誚則夸多之難也必才如電發始可以免於三者之患已乎雖然天下奇山水無盡文士粲花之管與之角勝于引商刻羽者亦無盡西泠六橋特電發杖屨間物耳浸假而為天台雁宕之遊又浸假而為三湘七澤瞿唐灧澦之遊吾知其詩之工且奇奇且富必有十百于此者寧苐如郭功甫之金山諸詠見賞于荆公已哉華及堂詩槀序新安之詩莫盛于汪伯玉先生伯玉當嘉隆間以文章聲勢奔走天下士與琅琊歷下稱鼎足百餘年來谼中顯仕多萃汪族而文采風流則罕聞于代甚哉詩道大而家學之難興也往歲梥之自雲間歸傳示王先生玠右與汪子晉賢酬倡詩因言晉賢為伯玉先生近屬年少有雋才而傾心好士桂枝片玉要當為國秀余心識其言適有事嘉禾遂往造焉對案咿唔連辰諧賞交分桐葉之題細舉匏尊之酌意氣歡甚時晉賢方選詩風徵余作詩要指余告之曰楊仲𢎞有言取材于選效法於唐此詩家律令也不讀選而希風漢魏是猶之濟洪流而舍棑筏也不法唐而旁及宋元是猶之厭家雞而求野鶩也晉賢首肯余言今年早秋余避地同川晉賢逺寄華及堂詩稿于時晨露泫珠新梧垂乳疾讀一過清風颯然目中英妙之姿能詩衆矣然俊情麗語絡繹奔赴鮮有及晉賢者得非深有契于仲𢎞之論詩而心摹手追以幾及之者耶即伯玉先生抗衡琅琊歷下亦惟是選體唐音奉為質的而導揚之以發其菁華咀潄之以窮其變化今晉賢齒方逾冠鏃礪括羽修綆汲深益進于古人舉伯玉之弧蝥而重建之以角中原之壇坫愚雖老猶願執殳以為之前驅也梁大司農詩集序唐貫休云乾坤有清氣散入詩人脾而歸太僕又言詩文者天地之元氣清氣之與元氣有以異乎曰有異清氣如遊澄潭靜渚之間淪漪映空蔚藍同色盥濯者爭就焉然而潦盡霜清不免有易涸之憂元氣如葭琯陽回勾芒律動山川俄焉增絢草木為之改觀一任紅英紫艷白萼緑跗紛紛籍籍隨物變色而莫知化工之所由然是故得清氣者為勞臣志士之幽情為羈人思婦之苦語哀怨凄切或至如候蟲之鳴與寒蟬相應若夫得元氣者西清東觀之間振其步武明堂清廟之上戛其聲音煌煌乎山龍藻火之采爛焉琅琅乎璆璜衝牙之響發焉惟其受之于天者全故凡音不得與之競工拙也三十年來海內之以名公巨卿主持風雅者南為芝麓龔先生北為蒼巖梁先生二先生著作近懸秦市逺走雞林梁先生在今則巋然魯靈光也先生之詩未窺全豹茂倫山子梓行其集始得受而卒業焉筋力成就在高岑王孟間七言近體兼撮歷下之勝有正容劘切之志而不改其和平有掞天藻麗之辭而不流于靡蕩蓋先生家承世閥學有淵源一門羣從接武華要太行滹沱山川秀杰之氣盡萃于一氏以故擅材𢎞富抽發不窮愚所謂得元氣之全者非先生其誰耶抑又聞先生退食之餘即焚香靜坐蠧帙遺編窮搜不輟橫經藉史諷詠忘勞兼之汲引文流無遺韋布如登玉山鮮不收之瓊玖如過馬肆多特顧之驊騮通懷樂善于今無兩斯又先生得天之厚所以于已有文章著述之功于物無愆尤跋疐之纍者也不佞齡菰蘆下士屈首窮經未為入洛之遊猥辱逢人之問因是集剞劂告成僣綴蕪辭用塵卷首若夫先生臺閣鴻謨南宫偉略則載在史館非鯫生末簡揚扢可既故無及焉汪周士詩稿序韭溪之西古梧桐鄉有寓公焉為休陽汪仲子周士與叔子晉賢以詩文鳴吳越間四方之聞風造請者户屨相錯琴樽在左圖史在右從容獻酬無間晨夕談者以為顧氏玉山草堂不是過也周士之詩憶癸丑冬梥之攜以示余見其清舉韶令歎為時賢第一流今年冬往過其廬周士出一編相質清舉者加以精工矣韶令者進而深穩矣浮聲切響無不合度名章迥句時獲驪珠余方欣賞不置禹慶青士起曰周士才信美抑詩道有進此者乎余逡巡却席曰齡鄙人也何敢云知詩雖然嘗流覽古今詩之盛衰而得其說矣夫古之作者纂緒造端淪瀾百變而其中必有根柢焉上之補裨風化下之陶寫性情如伯玉感遇三十八首伯玉詩之根柢也太白古風五十九首太白詩之根柢也子美北征詠懷前後出塞及新安吏以下諸篇子美詩之根柢也退之南山秋懷退之詩之根柢也樂天續古詩秦中吟數十篇樂天詩之根柢也唐人論詩每云工于五言蓋以五言工則不必問其餘是五言古為諸體之根柢而五言古之根柢安在乎亦曰求之三百篇離騷以及昭明之選而已矣自近體盛行便于應酬干謁而世之辭人率以之代羔雁充筐篚于是五言古幾廢即披英散馥排比極工不過儷青妃白流連景光已爾于六義之道安取乎豈惟今人獻吉于鱗詩家之雄伯也其論五言古則愚有猜焉獻吉之言曰李杜大家不越唐調不敢目以漢魏何况三百于鱗因之云唐無五言古詩而有其古詩陳子昻以其古詩為古詩弗取也夫三百不得不變為屈宋屈宋不得不變為蘇李蘇李不得不變為曹劉曹劉不得不變為齊梁諸子齊梁不得不變為神龍景雲以至開元天寶其間格調雖殊所以補裨風化陶寫性情者源流則一今必專祖漢魏以時代限之而謂初盛之詩去古皆逺非通論也近世為五言古者多宗選然剽擬膚澤幾于像設不靈或遂概選體而嗤薄之子美云熟精文選理精其理者必有神明變化之功焉而豈徒掇拾其辭句規橅其步武哉學者誠取子美之所得深思之因以求漢魏離騷因以求三百則五言之根柢在是而三唐風軌皆可同條而共貫奚至如二李之論判為淄澠乎今大江南北以詩名者秋嶽蘧人顧菴大可氷修定九玠右無殊十數公周士皆與往來鳴和鈍翁蛟門又君家嗣宗試取鄙言質之未知諸公以為何如也高漢思曰如此論詩可謂探源星宿鈕貞父詩集序記有云先祖無美而稱之是誣也有善而弗知不明知而弗傳不仁蓋古之君子其不敢沒其親如是也手澤存焉書䇿不敢䙝口澤在焉杯棬不忍遺而况于所撰著之文章乎吾嘗習譜牒之學見吳中先賢之嘉言懿行往往筆而志之及問其後裔則懵然不省甚且舉其祖先之遺集而飽蟫魚易餅餌斯其罪比于粥及祭器斬及丘木者不啻倍之也貞父先生生正嘉盛時隱于醫以詩遊孫太初黃五嶽王履吉諸公間然其名不甚著愚于安期前輩邑乘中得其詩數首始亟稱之復為作傳今其四世孫斯來以五浮山人集示余則衆體皆備出入魏晉三唐使先生生于今世必當鼓吹風雅有雕龍繡虎之目當時罕所稱道豈非前人敦素履薄浮名不汲汲于標榜結納故耶先生之詩固可傳然非有哲𦙍藏弆之䖍表章之切亦安知不與陳根委翳共銷滅于寒烟夕燒中也由是而觀古名賢之制作其晦而不彰彰而不行行而不逺者蓋不可勝數也然則後死者之責豈不重哉豈不重哉汪季青詩稿序余之過華及堂也二稔于兹矣維時賔從如雲酬應紛沓周士晉賢與青士數子或拈韻長吟或揮杯滿引斗斜燈灺諧談如沸季青獨危坐其旁岸然有手弄白日頂摩青穹之意余固已心異之今春晤鈍翁先生先生語余曰子見季青詩乎殆天才也適季青以近作貽余㸃定余受而丹鉛之其光氣熊熊然其音節淵淵然其興㑹標舉又復軒軒然浩浩然蓋杼軸本之少陵而槎丫奡兀之致得之山谷放翁居多以視二昆之清文麗藻又别開一疆索仲智火攻得無直逼伯仁耶鈍翁稱為天才信不虛已李贊皇有言文人以才為命婦人以色為命越女之妖楚妃之艷雖粗服亂頭嫣然一笑而陽城下蔡皆迷惑豈區區在裙裾粉澤間耶色之不足而後矜梳掃以為姿恃鉛華以為媚抑末矣是故才者造物之美器不輕畀人其得之者如琪枝瑶草舉世稱瑞焉豫章出地已欲干霄驥子試塗便齊飛兔古今文士其得之天授與得之人力者生死工拙之分相去奚啻尋丈哉今季青年方弱耳既負絶人之才而又性耽烟霞目飽緗素一門之內嗈嗈和鳴從此泛學海陟文山舉修步于長塗窮壯觀于絶景余請以兹編為嚆矢焉董太史豫遊草序董子方南省親歸里得見其燕臺詩思入風雲詞諧金石侍從宜春既發掞天之藻獻酬羣彥復多肆好之風竊歎臺閣體固應如是今夏鼓楫為豫章之遊歸而以一編示余又皆哀怨抑揚之作蓋調近噍殺多羽聲焉或問董子以終賈之年射䇿甲科讀中祕書翺翔天路此豈不得志于時者奈何為此幽思窈眇之音乎余曰董子仁孝人也觀其采蘭眷戀以白華之潔行戒養南陔非有意為汗漫游也一旦以甘毳之不給而出逺涉江湖冒嗔鼉獺二孤之懸流馬當之奇嶮昔人以比太行吕梁左蠡瀰漫分風上下過之者能無垂堂之戒乎哉况軍興孔棘羽檄交馳荆棘載塗蜚鴻滿野宗衮焦思旅人蒿目遙睇江山皆增怊悵矣弔孺子之墟墓式柴桑之故廬又能無睪然高望而逺志哉宜其見之詠歌者恫乎以悲悄乎以栗哀氣感而羽聲多也昔人稱張燕公為大手筆自居嶽陽詩更悽惋蓋情因境遷非可一致若夫羈旅之作多激楚山林之音多愁寂此豈所以擬吾董子耶宗定九全集序嘗讀淵明詩云養真衡茆下庶以善自名而昭明之序其集亦曰語懷抱則曠而且真蓋古人文章無不以真得傳者有真感傷而後有阮公正字之詩有真節概而後有工部吏部之詩有真豪宕而後有青蓮之詩有真閒適而後有左司香山之詩乃後之作者見諸公之成家在是也遂相率而橅效之以為名高不情之歌哭隨衆之祧禰縱極嘈囋無關性靈何以感情激聽叶鐘律而壯風雲也子美云别裁僞體親風雅今之詩文其為僞體也多矣能無待于别之裁之也乎淮南宗子定九夙以才藻擅場余嘗取其前後集分體詮次之佩實銜華兼工衆制人歎定九之才何善變如是余請一言蔽之曰真而已夫矯訛翻淺還宗經誥此劉協之所尚也補衲拘攣蠧文為甚此鍾嶸之所譏也定九博極羣書而學有原本縆幅道義鈎貫經史優柔浸潤灑然出之當其少年盛氣搖筆飛揚寄懷香草追風勺藥之篇託興佳人侔麗靈均之作為六朝則真六朝也已乃漸謝鉛華舉陳胸臆開元大厯之遺響奔命行間杜陵白傅之偏師直摩前壘為三唐則真三唐也䢴關故金粉地定九厭而逃之東原泛艇無謝花津高柳垂檐何殊栗里任東鄰之撲棗看西舍之通池以言丘樊則真丘樊也定九交滿天下韋布搢紳久要如一雖孝亷之船時覓郡教馬軍之酒走送花間而視之泊如以言臭味則真臭味也有定九之真詩文而世之矜燕石綴駢枝規規挾其蕞殘玉屑以為至寶之不匱者咸攦指退矣有定九之真丘樊真臭味而世之高談黃綺猶求潤于冷炙殘杯好結雷陳曾莫問夫練裙葛帔者不亦皇然汗下已乎或者曰以定九之才使得早遇于時經國大業當與海內共見之今顧使為逃虛寂寞之子能不為世道惜雖然定九而遇必將直廬視草日俯首東華軟紅中安得有此真詩文之樂與真臭味真丘樊之樂從容偃息于謝墅庾村之間軒渠拄䇿曠然怡情而適志也哉然則天之待定九不為不厚余又安庸以天之厚定九者而反為之咨嗟太息也朱致一曰真字可為救時針砭豈獨詩文愚谷詩稿序三十年來士多好言隱逸其所為隱逸之詩類以吳宫花草晉代衣冠託之悲悼而余弗謂善蓋其音響是而性情非也及讀晞髮集與白石樵唱則神骨凜然頓覺風雨晦冥山鬼夜泣詩之能感人如是耶㫖哉范蔚宗之論逸民以親魚鳥樂林泉歸之性分所至非可矯飾為也鹿城吳中奧區冠蓋之盛往時嘗當大藩今乃萃於東海一氏疑山川靈秀發泄過多而吾友季重先生獨以潛確勿耀稱陳留諸阮安可無嗣宗高致提唱其間耶季重詩筋力成就都得之少陵而弔故宫之禾黍感仙仗於崆峒實從深情至性激射而出故能使讀之者凄然愾然留連往復而不能自已吾嘗謂少陵當時若無靈武回鑾之事其詩不知作何悲咽今以季重觀之其引義陳辭恐亦不過爾爾而說者定謂今人不如古人豈非目論耶季重淹洽史籍嘗輯三百年隱士人為之傳斯可得其志意之所存然隱未易言也其人非有深情至性超然塵壒之表而徒任放為名高則山澤之臞行吟帶索者皆厠其林矣甚且如田遊巖盧藏用輩以為仕宦之捷徑矣余亦有志于隱而深病充隱之徒為煙霞泉石所笑也故因序季重詩而并及之寒山集序寒山集者愚菴叟選啓禎以來之詩專取幽清淡逺掃盡俗葷者倣元次山篋中集之例人不别仕隱品不分通介起曹學佺訖徐白得二十人詩三百首綴為一集時省覽焉客有見而問者曰此諸君子之詩乃世所嗤鍾談體為鬼趣為兵徴亡國之音也夫子何取乎爾叟笑曰不然此樂所謂羽聲者也傳曰大不踰宫細不過羽又曰絲聲哀哀以立亷宫絃八十一絲羽絃四十八絲其清濁輕重大小懸矣以絲聲操羽調則沈伏幼眇失其和平此樂記所謂急微噍殺之音子産所謂中聲以降五降之後不容彈矣者也然此非人之過也聲音之理通乎世運感乎性情譬如焚輪扶搖之風起于青蘋之末俄而調調而刁刁而翏翏小和大和萬竅怒號此孰使之然耶諸君子生濡首之時值焚巢之遇則觸物而含悽懷清而激響怨而怒哀而傷固其宜也且而不聞十二律旋相為宫之說乎以宫徵商羽角隔八相生之序言之則十二管皆可為宫十二管之宫皆可應以羽先王之不能廢羽聲而成八音也猶饔人不能舍醯醢鹽梅而濟五味也五子之歌必録于夏書黍離之詠不刪于王國皆此物此志也今諸君子之言具在音節雖殊皆與唐人相上下淡以永者昭文之鼓琴也熛以揚者師曠之清徵也鏗鏘感動者趙簡子之鈞天也噌吰鏜鞳者周景王之無射魏獻子之歌鍾也羽聲而近中聲不戾乎變風變雅即尼父復出刪詩亦將取焉而安得以木客之悲吟幽獨君之冥語漫比而訾斥之哉左太冲云山水有清音何必絲與竹夫清音未有不諧乎絲竹者也山月高寒木葉欲脫吾將手此一編爇水沈烹䝉茁正容盥手而誦之必當山鳴谷應潛虯舞而哀猿啼也竹笑軒詩集序自萬厯之季海內尸祝鍾談人挾詩歸一策其教以幽深孤峭為宗直取性靈不使故實一時附和之者往往入于僻澀無理以俚率為清真以晦䝉為奧異誠如說者所譏然幽深孤峭唐人名家多有此體譬諸屠門大嚼後啜䝉頂紫茁一瓷無不神清氣滌此種風味亦何可少今人以詩歸流弊羣然集矢于竟陵而并廢唐人之幽深孤峭于是僞王李之餘波宿燼復出而乘權于世豈非持論者矯枉而失其平之過耶介白詩入門亦自鍾談而能不熏染其流弊吾嘗見其平時手少陵集不置又游泳出沒於孟東野賈閬仙司空表聖陸魯望皮襲美諸家皆咀其膏液脫其渣滓以故其詩幽而不晦清而不貧孤而不過于削淡而不失于枯魚山天梵響戛清霄庾嶺寒梅香飛夜月讀介白詩亦作如是觀可矣介白為人磊砢自異峭岸不為俗所喜蓋馮敬通梁鴻趙一一流山居之後不異頭陀鐘夕香朝意頗自適猶之淵明隱逸自出天性非盡以不臣劉裕為高也怛化未幾廬井蕩然崖枯木落山鬼夜號其人睂宇欲出梅村弔趙凡夫詩古佛為鄰佑名山作子孫其殆為介白詠歟余往見介白有太湖落日賦為陳給事卧子所激賞今集中無之又山居以前詩多未見疑散佚者多然此已足傳矣適與崑山葉子九來謀刻其遺集泚筆書此欷歔久之愚菴小集卷八
